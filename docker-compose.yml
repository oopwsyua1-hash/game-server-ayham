version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: hanijar_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: hanijar
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  app:
    build: .
    container_name: hanijar_app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/hanijar
      JWT_SECRET: your-secret-key-2024
      NODE_ENV: production
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  default:
    name: hanijar_network