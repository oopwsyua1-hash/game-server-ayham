name: Auto Fix & Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci || npm install
          npm install -D @capacitor/cli @capacitor/core @capacitor/android eslint prettier @typescript-eslint/parser @typescript-eslint/eslint-plugin

      - name: Auto Fix Code Issues
        run: |
          echo "Running ESLint auto fix..."
          npx eslint. --ext.js,.ts,.jsx,.tsx,.vue --fix || true
          echo "Running Prettier format..."
          npx prettier --write. || true

      - name: Auto Fix Capacitor/Android
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build APK with Auto Recovery
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace || {
            echo "Build failed, clearing gradle cache and retrying..."
            cd..
            rm -rf ~/.gradle/caches
            rm -rf android
            npx cap add android
            npx cap sync android
            cd android
           ./gradlew clean assembleDebug --no-daemon
          }

      - name: Commit Auto Fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add.
          git commit -m "🤖 Auto fix: format, lint, and rebuild android" || echo "No changes to commit"
          git push || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
