name: AI Auto Fix & Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Deps
        run: |
          npm ci || npm install
          npm install -D @capacitor/cli @capacitor/core @capacitor/android eslint prettier

      - name: AI Auto Fix - Code & Format
        run: |
          echo "🔍 Checking code issues..."
          npx eslint. --ext.js,.ts,.jsx,.tsx --fix || true
          npx prettier --write. || true
          echo "✅ Code formatted"

      - name: AI Auto Fix - Android Platform
        run: |
          echo "🔍 Checking Android platform..."
          rm -rf android
          npx cap add android
          npx cap sync android
          echo "✅ Android platform rebuilt"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build APK with Auto Recovery
        run: |
          cd android
          chmod +x gradlew
          
          ./gradlew clean assembleDebug --no-daemon || {
            echo "❌ Build failed. Running recovery..."
            cd..
            rm -rf ~/.gradle/caches
            rm -rf android
            npx cap add android
            npx cap sync android
            cd android
          ./gradlew clean assembleDebug --no-daemon
          }
          echo "✅ Build success"

      - name: Commit Fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add.
          git commit -m "🤖 Auto-fix: lint, format, rebuild android" || echo "No changes"
          git push || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
