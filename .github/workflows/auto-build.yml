name: Auto Fix & Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm install -D @capacitor/cli @capacitor/core @capacitor/android eslint prettier

      - name: Auto Fix Code
        run: |
          npx eslint. --ext.js,.ts,.jsx,.tsx --fix || true
          npx prettier --write. || true

      - name: Rebuild Android
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon || {
            cd..
            rm -rf ~/.gradle/caches
            npx cap sync android
            cd android
          ./gradlew clean assembleDebug --no-daemon
          }

      - name: Commit Fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add.
          git commit -m "🤖 Auto fix" || echo "No changes"
          git push || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
