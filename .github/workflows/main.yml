name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find and Build Android Project
      run: |
        # البحث عن المجلد الذي يحتوي على ملفات بناء الأندرويد
        GRADLE_DIR=$(find . -name "gradlew" -exec dirname {} \;)
        
        if [ -z "$GRADLE_DIR" ]; then
          echo "❌ لم يتم العثور على مشروع أندرويد أو ملف gradlew في المستودع!"
          exit 1
        fi
        
        echo "✅ تم العثور على مشروع الأندرويد في المسار: $GRADLE_DIR"
        cd "$GRADLE_DIR"
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: empire-sab3-app
        path: "**/build/outputs/apk/debug/*.apk"
