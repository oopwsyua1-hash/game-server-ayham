<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الادمن</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
    body { background: #0d0d0d; color: #fff; }
.header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 1px solid #333; }
.container { padding: 15px; }
.stats-box { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
.stats-box h3 { color: #2ecc71; margin-bottom: 10px; }
.online-names { font-size: 14px; color: #aaa; }
.user-card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.user-info { display: flex; align-items: center; gap: 10px; flex: 1; }
.user-info img { width: 40px; height: 40px; border-radius: 50%; }
.user-name { font-size: 16px; }
.user-id { font-size: 12px; color: #aaa; }
.banned { opacity: 0.5; }
.btn-group { display: flex; gap: 5px; }
.btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; }
.btn-ban { background: #e74c3c; color: #fff; }
.btn-unban { background: #2ecc71; color: #fff; }
.btn-admin { background: #f39c12; color: #000; }
.btn-remove-admin { background: #95a5a6; color: #000; }
.tag { padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-right: 5px; }
.tag-admin { background: #f39c12; color: #000; }
.tag-banned { background: #e74c3c; color: #fff; }
.tag-online { background: #2ecc71; color: #000; }
  </style>
</head>
<body>
  <div class="header"><h2>لوحة الادمن - ادارة المستخدمين</h2></div>
  <div class="container" id="usersList"></div>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';
    async function loadUsers() {
      const [usersRes, onlineRes] = await Promise.all([
        fetch('/api/admin/users', { headers: { 'Authorization': 'Bearer ' + token } }),
        fetch('/api/admin/online', { headers: { 'Authorization': 'Bearer ' + token } })
      ]);
      if (!usersRes.ok) {
        document.getElementById('usersList').innerHTML = '<div style="text-align:center;padding:50px">غير مصرح - انت مو ادمن</div>';
        return;
      }
      const users = await usersRes.json();
      const onlineUsers = await onlineRes.json();
      const onlineIds = onlineUsers.map(u => u.userId);
      document.getElementById('usersList').innerHTML = `
        <div class="stats-box">
          <h3>المتصلين الآن: ${onlineUsers.length}</h3>
          <div class="online-names">${onlineUsers.map(u => u.username).join(' • ') || 'لا احد متصل'}</div>
        </div>
        ${users.map(u => {
          const isOnline = onlineIds.includes(u.userId);
          const lastSeenAgo = u.lastSeen? Math.floor((Date.now() - new Date(u.lastSeen)) / 60000) : 999;
          return `
          <div class="user-card ${u.banned? 'banned' : ''}">
            <div class="user-info">
              <img src="${u.avatar}" onerror="this.src='https://i.ibb.co/3pPYj6V/default-avatar.png'">
              <div>
                <div class="user-name">
                  ${u.username}
                  ${u.isAdmin? '<span class="tag tag-admin">ادمن</span>' : ''}
                  ${u.banned? '<span class="tag tag-banned">محظور</span>' : ''}
                  ${isOnline? '<span class="tag tag-online">اونلاين</span>' : ''}
                </div>
                <div class="user-id">ID: ${u.userId} • اخر ظهور: ${isOnline? 'الآن' : lastSeenAgo + ' دقيقة'}</div>
              </div>
            <div class="btn-group">
              ${u.isAdmin? `<button class="btn btn-remove-admin" onclick="removeAdmin('${u.userId}')">سحب ادمن</button>` : `<button class="btn btn-admin" onclick="makeAdmin('${u.userId}')">ترقية لادمن</button>`}
              ${u.banned? `<button class="btn btn-unban" onclick="unbanUser('${u.userId}')">فك الحظر</button>` : `<button class="btn btn-ban" onclick="banUser('${u.userId}')">حظر</button>`}
            </div>
          </div>
        `}).join('')}`;
    }
    setInterval(loadUsers, 10000);
    async function banUser(userId) {
      if (!confirm('متأكد تبي تحظر هاد المستخدم؟')) return;
      await fetch('/api/admin/ban/' + userId, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
      loadUsers();
    }
    async function unbanUser(userId) {
      await fetch('/api/admin/unban/' + userId, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
      loadUsers();
    }
    async function makeAdmin(userId) {
      if (!confirm('متأكد تبي تعطي هاد المستخدم صلاحية ادمن؟')) return;
      await fetch('/api/admin/make-admin/' + userId, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
      loadUsers();
    }
    async function removeAdmin(userId) {
      if (!confirm('متأكد تبي تسحب صلاحية الادمن؟')) return;
      await fetch('/api/admin/remove-admin/' + userId, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
      loadUsers();
    }
    loadUsers();
  </script>
</body>
</html>
