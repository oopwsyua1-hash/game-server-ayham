<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - إمبراطورية السبع</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #050a0f;
            color: #ffffff;
            font-family: 'Segoe UI', 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        .auth-card {
            background: #1a1a2e;
            width: 90%;
            max-width: 450px;
            padding: 25px;
            border-radius: 25px;
            border: 2px solid #a855f7;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
            text-align: center;
        }

        .logo-area h1 {
            color: #f1c40f;
            font-size: 26px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.6);
        }

        .input-group {
            text-align: right;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #a855f7;
            font-weight: bold;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #f1c40f;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f1c40f, #d4af37);
            border: none;
            border-radius: 15px;
            color: #000;
            font-weight: bold;
            font-size: 17px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.3);
            margin-top: 10px;
        }

        .error-container {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            border: 1px solid #ef4444;
            display: none;
            font-size: 13px;
        }

        #ageDisplay { color: #f1c40f; font-size: 12px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-area">
        <h1>👑 وكالة السبع</h1>
        <p style="color: #ccc; font-size: 14px; margin-top: -5px;">إمبراطورية السبع V3</p>
    </div>

    <form id="registerForm">
        <div class="input-group">
            <label><i class="fas fa-user"></i> اسم المستخدم</label>
            <input type="text" id="regName" placeholder="مثال: السبع الحلبي" required>
        </div>

        <div class="input-group">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
            <input type="email" id="regEmail" placeholder="example@gmail.com" required>
        </div>

        <div class="input-group">
            <label><i class="fas fa-lock"></i> كلمة السر</label>
            <input type="password" id="regPass" placeholder="••••••••" required>
        </div>

        <div class="input-group">
            <label><i class="fas fa-venus-mars"></i> الجنس</label>
            <select id="regGender" required>
                <option value="ذكر">ذكر ♂️</option>
                <option value="أنثى">أنثى ♀️</option>
            </select>
        </div>

        <div class="input-group">
            <label><i class="fas fa-globe"></i> الدولة</label>
            <select id="regCountry" required>
                <option value="">-- اختر دولتك --</option>
                <option value="سوريا 🇸🇾">سوريا 🇸🇾</option>
                <option value="تركيا 🇹🇷">تركيا 🇹🇷</option>
                <option value="السعودية 🇸🇦">السعودية 🇸🇦</option>
                <option value="العراق 🇮🇶">العراق 🇮🇶</option>
                <option value="مصر 🇪🇬">مصر 🇪🇬</option>
                <option value="فلسطين 🇵🇸">فلسطين 🇵🇸</option>
                <option value="الأردن 🇯🇴">الأردن 🇯🇴</option>
                <option value="لبنان 🇱🇧">لبنان 🇱🇧</option>
                <option value="الكويت 🇰🇼">الكويت 🇰🇼</option>
                <option value="الإمارات 🇦🇪">الإمارات 🇦🇪</option>
                <option value="قطر 🇶🇦">قطر 🇶🇦</option>
                <option value="البحرين 🇧🇭">البحرين 🇧🇭</option>
                <option value="عمان 🇴🇲">عمان 🇴🇲</option>
                <option value="اليمن 🇾🇪">اليمن 🇾🇪</option>
                <option value="المغرب 🇲🇦">المغرب 🇲🇦</option>
                <option value="الجزائر 🇩🇿">الجزائر 🇩🇿</option>
                <option value="تونس 🇹🇳">تونس 🇹🇳</option>
                <option value="ليبيا 🇱🇾">ليبيا 🇱🇾</option>
                <option value="السودان 🇸🇩">السودان 🇸🇩</option>
                <option value="ألمانيا 🇩🇪">ألمانيا 🇩🇪</option>
                <option value="السويد 🇸🇪">السويد 🇸🇪</option>
            </select>
        </div>

        <div class="input-group">
            <label><i class="fas fa-calendar-day"></i> تاريخ الميلاد</label>
            <input type="date" id="regBirth" required onchange="calculateAge(this.value)">
            <span id="ageDisplay"></span>
        </div>

        <button type="submit" class="btn-submit">إنشاء الحساب الملكي</button>
    </form>

    <div id="errorContainer" class="error-container"></div>
</div>

<script>
    const API_URL = 'https://game-server-ayham.onrender.com/api';
    let calculatedAge = "";

    function calculateAge(birthDate) {
        if (!birthDate) return;
        const birth = new Date(birthDate);
        const now = new Date();
        let age = now.getFullYear() - birth.getFullYear();
        if (now.getMonth() < birth.getMonth() || (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate())) age--;
        calculatedAge = age + " سنة";
        document.getElementById('ageDisplay').innerText = "العمر: " + calculatedAge;
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorBox = document.getElementById('errorContainer');
        errorBox.style.display = 'none';

        const userData = {
            username: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPass').value,
            gender: document.getElementById('regGender').value,
            country: document.getElementById('regCountry').value,
            birth_date: document.getElementById('regBirth').value,
            age: calculatedAge
        };

        try {
            const response = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            if (response.headers.get("content-type")?.includes("application/json")) {
                const result = await response.json();
                if (response.ok) {
                    alert("تم التسجيل بنجاح يا سبع!");
                    window.location.href = 'login.html';
                } else {
                    throw new Error(result.message || "فشل التسجيل");
                }
            } else {
                throw new Error("خطأ في استجابة السيرفر");
            }
        } catch (err) {
            errorBox.innerText = err.message;
            errorBox.style.display = 'block';
        }
    });
</script>
</body>
</html>
