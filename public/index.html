<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية السبع V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes nameGlow {
            0% { text-shadow: 0 0 5px #fff, 0 0 10px #3498db; }
            50% { text-shadow: 0 0 20px #3498db, 0 0 30px #2980b9; color: #d4e6f1; }
            100% { text-shadow: 0 0 5px #fff, 0 0 10px #3498db; }
        }
        @keyframes rotateVerify {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        body {
            background-color: #050a0f;
            color: #ffffff;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        .auth-container {
            max-width: 450px;
            margin: 20px auto;
            padding: 25px;
            background: rgba(18, 27, 38, 0.95);
            border-radius: 20px;
            border: 1px solid rgba(52, 152, 219, 0.3);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: fadeInScale 0.5s ease-out;
        }
        .auth-container h2 {
            text-align: center;
            color: #3498db;
            margin-bottom: 20px;
            font-size: 22px;
            animation: nameGlow 3s infinite ease-in-out;
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tab-btn {
            background: none;
            border: none;
            color: #8e99a3;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .tab-btn.active {
            color: #3498db;
            border-bottom: 3px solid #3498db;
        }
        .form-group {
            margin-bottom: 15px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #8e99a3;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 15px;
            box-sizing: border-box;
            background: rgba(28, 42, 58, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .form-group select option {
            background: #121b26;
            color: #fff;
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .profile-container {
            display: none;
            position: relative;
            z-index: 1;
            animation: fadeInScale 0.7s ease-out;
        }
        .cover-area {
            height: 180px;
            background: #1a2a3a;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .avatar-wrapper {
            position: absolute;
            bottom: -45px;
            right: 20px;
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #f5d496, #e2b35c);
            border-radius: 50%;
            padding: 4px;
        }
        .avatar-wrapper img {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid #070d14;
            object-fit: cover;
        }
        .user-details { padding: 55px 20px 10px; text-align: right; }
        .name {
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: nameGlow 3s infinite ease-in-out;
        }
        .verify-gold { color: #f1c40f; animation: rotateVerify 2s infinite ease-in-out; }
        .id-badge {
            display: inline-block;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #8e99a3;
        }
        .card {
            background: rgba(18, 27, 38, 0.9);
            margin: 12px;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .info-item {
            background: rgba(28, 42, 58, 0.7);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            margin: 12px;
            float: left;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="auth-container" id="authSection">
        <h2>إمبراطورية السبع V3</h2>
        <div class="tabs">
            <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">تسجيل الدخول</button>
            <button class="tab-btn" id="registerTab" onclick="switchTab('register')">إنشاء حساب</button>
        </div>
        <div id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="loginEmail" placeholder="example@test.com">
            </div>
            <div class="form-group">
                <label>كلمة السر</label>
                <input type="password" id="loginPassword" placeholder="******">
            </div>
            <button class="auth-btn" onclick="handleLogin()">دخول</button>
        </div>
        <div id="registerForm" style="display: none;">
            <div class="form-group"><input type="text" id="regUser" placeholder="الاسم الأول"></div>
            <div class="form-group"><input type="text" id="regLast" placeholder="اسم العائلة"></div>
            <div class="form-group"><input type="email" id="regEmail" placeholder="البريد الإلكتروني"></div>
            <div class="form-group"><input type="password" id="regPassword" placeholder="كلمة السر"></div>
            <div class="form-group"><input type="number" id="regAge" placeholder="العمر"></div>
            <div class="form-group">
                <select id="regGender">
                    <option value="male">ذكر</option>
                    <option value="female">أنثى</option>
                </select>
            </div>
            <div class="form-group">
                <select id="regCountry">
                    <option value="تركيا">تركيا</option>
                    <option value="سوريا">سوريا</option>
                    <option value="العراق">العراق</option>
                    <option value="السعودية">السعودية</option>
                    <option value="مصر">مصر</option>
                    <option value="الأردن">الأردن</option>
                    <option value="الإمارات">الإمارات</option>
                    <option value="فلسطين">فلسطين</option>
                </select>
            </div>
            <div class="form-group">
                <label style="margin-top:5px;">تاريخ الميلاد</label>
                <input type="date" id="regBirthDate">
            </div>
            <button class="auth-btn" onclick="handleRegister()">تسجيل حساب جديد</button>
        </div>
    </div>
    <div class="profile-container" id="profileSection">
        <div class="cover-area" style="background-image: url('https://via.placeholder.com/800x400/1a2a3a/ffffff');">
            <div class="avatar-wrapper"><img src="https://via.placeholder.com/150" id="avatarImg"></div>
        </div>
        <div class="user-details">
            <div class="name"><span id="userName">جاري التحميل...</span><i class="fas fa-certificate verify-gold"></i></div>
            <div class="id-badge">ID: <span id="userID">000000</span></div>
        </div>
        <div class="card">
            <h3>المحفظة والرصيد</h3>
            <div class="info-grid">
                <div class="info-item">كونزات: <span id="userCoins">0</span></div>
                <div class="info-item">الماسي: <span id="userDiamonds">0</span></div>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()">خروج</button>
    </div>
    <script>
        const SERVER_URL = 'https://game-server-ayham.onrender.com';
        
        window.onload = async function() {
            const token = localStorage.getItem('user_token');
            if (token) {
                try {
                    const res = await fetch(`${SERVER_URL}/api/profile`, {
                        method: 'GET',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if(data.user_id) { showProfile(data); }
                    else { localStorage.removeItem('user_token'); }
                } catch(e) { console.log('خطأ الفحص التلقائي للتوكن'); }
            }
        };
        
        function switchTab(type) {
            document.getElementById('loginTab').classList.toggle('active', type==='login');
            document.getElementById('registerTab').classList.toggle('active', type==='register');
            document.getElementById('loginForm').style.display = type==='login'?'block':'none';
            document.getElementById('registerForm').style.display = type==='register'?'block':'none';
        }
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch(`${SERVER_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if(data.token) { localStorage.setItem('user_token', data.token); showProfile(data.user); }
                else { alert(data.error || 'خطأ في الدخول'); }
            } catch(e) { alert('خطأ في السيرفر'); }
        }
        async function handleRegister() {
            const username = document.getElementById('regUser').value;
            const lastName = document.getElementById('regLast').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const age = parseInt(document.getElementById('regAge').value);
            const gender = document.getElementById('regGender').value;
            const country = document.getElementById('regCountry').value;
            const birthDate = document.getElementById('regBirthDate').value || '2026-01-01';
            try {
                const res = await fetch(`${SERVER_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, lastName, email, password, age, country, gender, birthDate })
                });
                const data = await res.json();
                if(data.token) { localStorage.setItem('user_token', data.token); showProfile(data.user); }
                else { alert(data.error || 'فشل التسجيل'); }
            } catch(e) { alert('خطأ في السيرفر'); }
        }
        function showProfile(user) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('profileSection').style.display = 'block';
            document.getElementById('userName').innerText = `${user.username} ${user.lastName}`;
            document.getElementById('userID').innerText = user.user_id;
            document.getElementById('userCoins').innerText = user.coins || 0;
            document.getElementById('userDiamonds').innerText = user.diamonds || 0;
        }
        function logout() { localStorage.removeItem('user_token'); window.location.reload(); }
    </script>
</body>
</html>
