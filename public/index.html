<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>السبع الحلبي</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    
    <h1 class="welcome-text">
      <span>السبع</span>
      <span>الحلبي</span>
      <span>يرحب</span>
      <span>بكم</span>
    </h1>

    <div class="form-box">
      <div class="button-box">
        <div id="btn"></div>
        <button type="button" class="toggle-btn pulse" onclick="login()">تسجيل دخول</button>
        <button type="button" class="toggle-btn pulse" onclick="register()">انشاء حساب</button>
      </div>

      <form id="login" class="input-group">
        <input type="text" id="loginUser" class="input-field" placeholder="اسم المستخدم او الايميل او الرقم" required>
        <input type="password" id="loginPass" class="input-field" placeholder="كلمة السر" required>
        <button type="submit" class="submit-btn pulse">دخول</button>
        
        <div class="social-login">
          <button type="button" class="gmail-btn">الدخول عبر Gmail</button>
          <button type="button" class="phone-btn">الدخول عبر رقم الهاتف</button>
        </div>
      </form>

      <form id="register" class="input-group">
        <input type="text" id="firstName" class="input-field" placeholder="الاسم" required>
        <input type="text" id="lastName" class="input-field" placeholder="الكنية" required>
        <input type="number" id="age" class="input-field" placeholder="العمر" min="13" max="100" required>
        <input type="date" id="birthdate" class="input-field" required>
        
        <select id="gender" class="input-field" required>
          <option value="" disabled selected>اختر الجنس</option>
          <option value="ذكر">ذكر</option>
          <option value="انثى">انثى</option>
        </select>

        <select id="country" class="input-field" required>
          <option value="" disabled selected>اختر البلد</option>
          <option value="سوريا">سوريا</option>
          <option value="تركيا">تركيا</option>
          <option value="السعودية">السعودية</option>
          <option value="الامارات">الامارات</option>
          <option value="مصر">مصر</option>
          <option value="الاردن">الاردن</option>
          <option value="لبنان">لبنان</option>
          <option value="العراق">العراق</option>
          <option value="فلسطين">فلسطين</option>
          <option value="الكويت">الكويت</option>
          <option value="قطر">قطر</option>
          <option value="البحرين">البحرين</option>
          <option value="عمان">عمان</option>
          <option value="اليمن">اليمن</option>
        </select>

        <textarea id="bio" class="input-field" placeholder="السيرة الذاتية" rows="3"></textarea>
        
        <input type="text" id="regUser" class="input-field" placeholder="اسم المستخدم" required>
        <input type="email" id="regEmail" class="input-field" placeholder="الايميل" required>
        <input type="tel" id="regPhone" class="input-field" placeholder="رقم الهاتف" required>
        <input type="password" id="regPass" class="input-field" placeholder="كلمة السر" required>
        
        <button type="submit" class="submit-btn pulse">انشاء حساب</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
