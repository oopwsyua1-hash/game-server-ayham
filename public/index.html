<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية السبع - دخول</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a14; color: #fff; min-height: 100vh; overflow: hidden; }
        #welcomeScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; animation: fadeOut 1s ease 6s forwards; }
        .welcome-text { font-size: 42px; font-weight: bold; text-align: center; background: linear-gradient(90deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; z-index: 2; position: absolute; top: 8%; }
        .dance-video { width: 100%; height: 100%; object-fit: cover; position: absolute; filter: brightness(0.7); }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; opacity: 0; animation: fadeIn 1s ease 6.5s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        .form-box { background: #141428; border: 2px solid #ff00ff; border-radius: 15px; padding: 25px; box-shadow: 0 0 20px rgba(255, 0, 255, 0.3); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ff00ff; border-radius: 8px; background: #0f0f1e; color: white; outline: none; }
        button { width: 100%; padding: 14px; margin-top: 15px; background: linear-gradient(90deg, #ff00ff, #9d00ff); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        #customAlert { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .alert-box { background: #141428; border: 2px solid #00ffff; border-radius: 15px; padding: 30px; text-align: center; }
    </style>
</head>
<body>
    <div id="welcomeScreen">
        <div class="welcome-text">السبع الحلبي يرحب بكم</div>
        <video class="dance-video" autoplay muted loop playsinline><source src="https://assets.mixkit.co/videos/8713/8713-720.mp4" type="video/mp4"></video>
    </div>
    <div id="customAlert"><div class="alert-box"><h3 id="alertTitle"></h3><p id="alertMsg"></p><button onclick="closeAlert()">حسناً</button></div></div>
    <div class="container">
        <div style="text-align: center; font-size: 32px; margin: 20px 0; color: #ff00ff;">إمبراطورية السبع</div>
        <div class="form-box">
            <div id="loginForm">
                <h2>تسجيل الدخول</h2>
                <input type="email" id="loginEmail" placeholder="الإيميل">
                <input type="password" id="loginPassword" placeholder="كلمة السر">
                <button onclick="handleAuth('/api/login')">دخول</button>
            </div>
        </div>
    </div>
    <script>
        function showAlert(msg, title='تنبيه') { document.getElementById('alertTitle').innerText=title; document.getElementById('alertMsg').innerText=msg; document.getElementById('customAlert').style.display='flex'; }
        function closeAlert() { document.getElementById('customAlert').style.display='none'; }
        async function handleAuth(url) {
            const response = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ test: true }) });
            const data = await response.json();
            if(data.redirect) { window.location.href = data.redirect; } else { showAlert(data.message); }
        }
    </script>
</body>
</html>
