<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق السبع</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a14; color: #fff; min-height: 100vh; overflow-x: hidden; }
        #welcomeScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; animation: fadeOut 1s ease-in-out 6s forwards; overflow: hidden; }
        .welcome-text { font-size: 42px; font-weight: bold; text-align: center; background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 2s ease infinite, scaleIn 1s ease; margin-bottom: 30px; text-shadow: 0 0 30px rgba(255, 0, 255, 1), 0 0 60px rgba(0, 255, 255, 0.8); padding: 0 20px; z-index: 2; position: absolute; top: 8%; }
        .dance-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; filter: brightness(0.7); }
        #welcomeScreen::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes scaleIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        #customAlert { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .alert-box { background: #141428; border: 2px solid #00ffff; border-radius: 15px; padding: 30px; text-align: center; box-shadow: 0 0 30px rgba(0, 255, 255, 0.5); animation: popIn 0.3s ease; max-width: 350px; margin: 20px; }
        .alert-box h3 { color: #00ffff; font-size: 22px; margin-bottom: 15px; }
        .alert-box p { color: #fff; font-size: 16px; margin-bottom: 20px; }
        .alert-box button { padding: 10px 30px; background: linear-gradient(90deg, #ff00ff, #9d00ff); border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; opacity: 0; animation: fadeIn 1s ease 6.5s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        .logo { text-align: center; font-size: 32px; font-weight: bold; margin: 20px 0; background: linear-gradient(90deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-box { background: #141428; border: 2px solid #ff00ff; border-radius: 15px; padding: 25px; box-shadow: 0 0 20px rgba(255, 0, 255, 0.3); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ff00ff; border-radius: 8px; background: #0f0f1e; color: white; font-size: 16px; outline: none; }
        input:focus, select:focus { border-color: #00ffff; box-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
        input:read-only { background: #1a1a2e; cursor: not-allowed; }
        label { color: #ff00ff; font-size: 14px; display: block; margin-top: 10px; margin-bottom: -5px; }
        button { width: 100%; padding: 14px; margin-top: 15px; background: linear-gradient(90deg, #ff00ff, #9d00ff); border: none; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.03); box-shadow: 0 0 15px rgba(255, 0, 255, 0.6); }
        .switch { text-align: center; margin-top: 15px; color: #aaa; }
        .switch span { color: #00ffff; cursor: pointer; font-weight: bold; }
        h2 { color: #ff00ff; text-align: center; margin-bottom: 20px; }
        #loginForm { display: block; }
        #registerForm { display: none; }
    </style>
</head>
<body>
    <div id="welcomeScreen">
        <div class="welcome-text">السبع الحلبي يرحب بكم</div>
        <video class="dance-video" autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/8713/8713-720.mp4" type="video/mp4">
        </video>
    </div>
    <div id="customAlert">
        <div class="alert-box">
            <h3 id="alertTitle">تطبيق السبع</h3>
            <p id="alertMsg"></p>
            <button onclick="closeAlert()">حسناً</button>
        </div>
    </div>
    <div class="container">
        <div class="logo">CYBER CARDS</div>
        <div class="form-box">
            <div id="loginForm">
                <h2>تسجيل الدخول</h2>
                <input type="email" id="loginEmail" placeholder="الإيميل">
                <input type="password" id="loginPassword" placeholder="كلمة السر">
                <button onclick="login()">دخول</button>
                <div class="switch">ما عندك حساب؟ <span onclick="showRegister()">انشاء حساب</span></div>
            </div>
            <div id="registerForm">
                <h2>انشاء حساب</h2>
                <input type="text" id="regUsername" placeholder="اسم المستخدم">
                <input type="text" id="regLastName" placeholder="الكنية">
                <input type="email" id="regEmail" placeholder="الإيميل">
                <input type="password" id="regPassword" placeholder="كلمة السر">
                <label>الدولة:</label>
                <select id="regCountry">
                    <option value="">اختر دولتك</option>
                    <option value="سوريا">سوريا</option>
                    <option value="السعودية">السعودية</option>
                    <option value="الإمارات">الإمارات</option>
                    <option value="مصر">مصر</option>
                    <option value="العراق">العراق</option>
                    <option value="الأردن">الأردن</option>
                    <option value="لبنان">لبنان</option>
                    <option value="فلسطين">فلسطين</option>
                    <option value="الكويت">الكويت</option>
                    <option value="قطر">قطر</option>
                    <option value="البحرين">البحرين</option>
                    <option value="عمان">عمان</option>
                    <option value="اليمن">اليمن</option>
                    <option value="ليبيا">ليبيا</option>
                    <option value="تونس">تونس</option>
                    <option value="الجزائر">الجزائر</option>
                    <option value="المغرب">المغرب</option>
                    <option value="السودان">السودان</option>
                    <option value="تركيا">تركيا</option>
                    <option value="امريكا">امريكا</option>
                    <option value="بريطانيا">بريطانيا</option>
                    <option value="المانيا">المانيا</option>
                    <option value="فرنسا">فرنسا</option>
                    <option value="روسيا">روسيا</option>
                    <option value="الصين">الصين</option>
                    <option value="اليابان">اليابان</option>
                    <option value="الهند">الهند</option>
                    <option value="اخرى">اخرى</option>
                </select>
                <label>تاريخ الميلاد:</label>
                <input type="date" id="regBirthDate" onchange="calculateAge()">
                <input type="text" id="regAge" placeholder="العمر" readonly>
                <label>الجنس:</label>
                <select id="regGender">
                    <option value="">اختر الجنس</option>
                    <option value="male">ذكر</option>
                    <option value="female">أنثى</option>
                </select>
                <button onclick="register()">انشاء حساب</button>
                <div class="switch">عندك حساب؟ <span onclick="showLogin()">تسجيل دخول</span></div>
            </div>
        </div>
    </div>
    <script>
        // ===== التعديل 1: اذا مسجل دخول روح على me.html =====
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = '/me';
        }
        // ===== نهاية التعديل 1 =====

        function showAlert(msg, title = 'تطبيق السبع') {
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMsg').textContent = msg;
            document.getElementById('customAlert').style.display = 'flex';
        }
        function closeAlert() {
            document.getElementById('customAlert').style.display = 'none';
        }
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
        function calculateAge() {
            const birthDate = document.getElementById('regBirthDate').value;
            if (birthDate) {
                const today = new Date();
                const birth = new Date(birthDate);
                let age = today.getFullYear() - birth.getFullYear();
                const monthDiff = today.getMonth() - birth.getMonth();
                if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                    age--;
                }
                document.getElementById('regAge').value = age + ' سنة';
            } else {
                document.getElementById('regAge').value = '';
            }
        }
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const lastName = document.getElementById('regLastName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const country = document.getElementById('regCountry').value;
            const birthDate = document.getElementById('regBirthDate').value;
            const age = document.getElementById('regAge').value.replace(' سنة', '');
            const gender = document.getElementById('regGender').value;
            if (!username || !lastName || !email || !password || !country || !birthDate || !gender) {
                showAlert('عبي كل الحقول يا وحش', 'تنبيه');
                return;
            }
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, lastName, email, password, country, birthDate, age: parseInt(age), gender })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    showAlert('تم تسجيل الدخول بنجاح', 'تطبيق السبع');
                    setTimeout(() => window.location.href = '/me', 1500); // التعديل 2
                } else {
                    showAlert(data.error || 'صار خطأ', 'خطأ');
                }
            } catch (error) {
                showAlert('خطأ بالاتصال بالسيرفر', 'خطأ');
            }
        }
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) {
                showAlert('عبي الإيميل وكلمة السر', 'تنبيه');
                return;
            }
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    showAlert('تم تسجيل الدخول إلى تطبيق السبع', 'أهلاً وسهلاً');
                    setTimeout(() => window.location.href = '/me', 1500); // التعديل 3
                } else {
                    showAlert(data.error || 'الإيميل او كلمة السر غلط', 'خطأ');
                }
            } catch (error) {
                showAlert('خطأ بالاتصال بالسيرفر', 'خطأ');
            }
        }
    </script>
</body>
</html>
