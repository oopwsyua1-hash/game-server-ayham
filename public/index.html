<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السبع الحلبي - تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        
        /* نبضات الخلفية */
        .pulse-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .pulse-bg span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(102, 126, 234, 0.3);
            animation: pulse 4s linear infinite;
            border-radius: 50%;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(0) translateY(0);
                opacity: 1;
            }
            100% {
                transform: scale(4) translateY(-1000px);
                opacity: 0;
            }
        }
        
        .pulse-bg span:nth-child(1) { left: 10%; animation-delay: 0s; }
        .pulse-bg span:nth-child(2) { left: 20%; animation-delay: 1s; animation-duration: 5s; }
        .pulse-bg span:nth-child(3) { left: 30%; animation-delay: 2s; }
        .pulse-bg span:nth-child(4) { left: 40%; animation-delay: 0.5s; animation-duration: 6s; }
        .pulse-bg span:nth-child(5) { left: 50%; animation-delay: 1.5s; }
        .pulse-bg span:nth-child(6) { left: 60%; animation-delay: 2.5s; animation-duration: 4s; }
        .pulse-bg span:nth-child(7) { left: 70%; animation-delay: 0.8s; }
        .pulse-bg span:nth-child(8) { left: 80%; animation-delay: 1.8s; animation-duration: 5.5s; }
        .pulse-bg span:nth-child(9) { left: 90%; animation-delay: 0.3s; }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo img {
            width: 140px;
            height: 140px;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(102, 126, 234, 0.6);
            animation: float 3s ease-in-out infinite;
            object-fit: cover;
            border: 3px solid rgba(102, 126, 234, 0.5);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 30px;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 5px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            color: #999;
            transition: all 0.3s;
            border-radius: 8px;
        }
        
        .tab.active {
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: white;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 14px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
            display: none;
            font-weight: 500;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
            animation: fadeIn 0.4s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- نبضات الخلفية -->
    <div class="pulse-bg">
        <span></span><span></span>
        <span></span><span></span>
    </div>
    
    <div class="container">
        <div class="logo">
            <!-- صورة حفلة متحركة GIF بنات وشباب عم يرقصو -->
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExcXQ3ZnZ2dWZ3dXJ6eWJ6cGJ5dGJ5dGJ5dGJ5dGJ5dGJ5dCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKMt1VVNkHV2PaE/giphy.gif" alt="حفلة السبع الحلبي">
        </div>
        
        <h1>🎮 السبع الحلبي</h1>
        <p class="subtitle">أهلاً فيك! سجل دخولك أو اعمل حساب جديد</p>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">تسجيل دخول</button>
            <button class="tab" onclick="showTab('register')">حساب جديد</button>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" class="form active">
            <div class="form-group">
                <label>📧 الإيميل</label>
                <input type="email" id="loginEmail" required placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label>🔒 كلمة السر</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            <button type="submit" id="loginBtn">تسجيل الدخول</button>
        </form>
        
        <!-- Register Form -->
        <form id="registerForm" class="form">
            <div class="form-group">
                <label>👤 اسم المستخدم</label>
                <input type="text" id="registerUsername" required placeholder="اسمك باللعبة">
            </div>
            <div class="form-group">
                <label>📧 الإيميل</label>
                <input type="email" id="registerEmail" required placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label>🔒 كلمة السر</label>
                <input type="password" id="registerPassword" required placeholder="6 أحرف على الأقل">
            </div>
            <button type="submit" id="registerBtn">إنشاء حساب</button>
        </form>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            hideMessage();
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
        }
        
        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }
        
        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'جاري تسجيل الدخول...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    showMessage(`أهلاً ${data.username} ❤️ تم تسجيل الدخول بنجاح`, 'success');
                    setTimeout(() => {
                        window.location.href = '/game.html';
                    }, 1500);
                } else {
                    showMessage(data.message || 'خطأ بتسجيل الدخول', 'error');
                }
            } catch (error) {
                showMessage('خطأ بالاتصال بالسيرفر. تأكد من النت', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'تسجيل الدخول';
            }
        });
        
        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = 'جاري إنشاء الحساب...';
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('registerUsername').value,
                        email: document.getElementById('registerEmail').value,
                        password: document.getElementById('registerPassword').value
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    showMessage(`تم إنشاء حسابك يا ${data.username} 🎉`, 'success');
                    setTimeout(() => {
                        window.location.href = '/game.html';
                    }, 1500);
                } else {
                    showMessage(data.message || 'خطأ بإنشاء الحساب', 'error');
                }
            } catch (error) {
                showMessage('خطأ بالاتصال بالسيرفر. تأكد من النت', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'إنشاء حساب';
            }
        });
    </script>
</body>
</html>
