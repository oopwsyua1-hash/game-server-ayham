<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>السبع الحلبي يرحب بكم</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
    }
    .container {
      background: #1a1a2e;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(255, 0, 255, 0.3);
      border: 2px solid #ff00ff;
      width: 100%;
      max-width: 400px;
    }
    .title {
      text-align: center;
      font-size: 28px;
      margin-bottom: 30px;
      color: #ff00ff;
      font-weight: bold;
    }
    .tabs {
      display: flex;
      background: #0f0f1e;
      border-radius: 12px;
      margin-bottom: 25px;
      padding: 5px;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.3s;
    }
    .tab.active {
      background: linear-gradient(135deg, #ff00ff 0%, #9d00ff 100%);
      color: white;
    }
    .form-title {
      text-align: center;
      color: #ff00ff;
      font-size: 22px;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      background: #0f0f1e;
      border: 2px solid #ff00ff;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      outline: none;
    }
    input::placeholder {
      color: #666;
    }
    input:focus {
      border-color: #00ffff;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .btn-primary {
      background: linear-gradient(135deg, #ff00ff 0%, #9d00ff 100%);
      color: white;
    }
    .btn-gmail {
      background: #ff4500;
      color: white;
    }
    .btn-phone {
      background: #00ff88;
      color: #0f0f1e;
    }
    .password-wrapper {
      position: relative;
    }
    .eye-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 20px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">السبع الحلبي يرحب بكم 🎮</div>
    
    <div class="tabs">
      <button class="tab" id="registerTab" onclick="showRegister()">انشاء حساب</button>
      <button class="tab active" id="loginTab" onclick="showLogin()">تسجيل دخول</button>
    </div>

    <!-- تسجيل دخول -->
    <div id="loginForm">
      <div class="form-title">تسجيل الدخول</div>
      <input type="email" id="loginEmail" placeholder="الإيميل" autocomplete="off" value="">
      <div class="password-wrapper">
        <input type="password" id="loginPassword" placeholder="كلمة السر" autocomplete="new-password" value="">
        <span class="eye-icon" onclick="togglePassword('loginPassword')">👁️</span>
      </div>
      <button class="btn btn-primary" onclick="login()">دخول</button>
      <button class="btn btn-gmail">الدخول عبر Gmail</button>
      <button class="btn btn-phone">الدخول عبر رقم الهاتف</button>
    </div>

    <!-- انشاء حساب -->
    <div id="registerForm" class="hidden">
      <div class="form-title">انشاء حساب</div>
      <input type="text" id="regUsername" placeholder="اسم المستخدم" autocomplete="off" value="">
      <input type="email" id="regEmail" placeholder="الإيميل" autocomplete="off" value="">
      <div class="password-wrapper">
        <input type="password" id="regPassword" placeholder="كلمة السر" autocomplete="new-password" value="">
        <span class="eye-icon" onclick="togglePassword('regPassword')">👁️</span>
      </div>
      <button class="btn btn-primary" onclick="register()">انشاء حساب</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://game-server-ayham.onrender.com';

    function showLogin() {
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById('loginTab').classList.add('active');
      document.getElementById('registerTab').classList.remove('active');
    }

    function showRegister() {
      document.getElementById('registerForm').classList.remove('hidden');
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerTab').classList.add('active');
      document.getElementById('loginTab').classList.remove('active');
    }

    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    async function login() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        alert('عبي كل الحقول');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', data.username);
          window.location.href = '/profile';
        } else {
          alert(data.message);
        }
      } catch (error) {
        alert('خطأ بالسيرفر');
      }
    }

    async function register() {
      const username = document.getElementById('regUsername').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;

      if (!username || !email || !password) {
        alert('عبي كل الحقول');
        return;
      }

      if (password.length < 6) {
        alert('كلمة السر قصيرة');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/api/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', data.username);
          window.location.href = '/profile';
        } else {
          alert(data.message);
        }
      } catch (error) {
        alert('خطأ بالسيرفر');
      }
    }

    // اذا كان مسجل دخول قبل، حوله عالبروفايل دغري
    if (localStorage.getItem('token')) {
      window.location.href = '/profile';
    }
  </script>
</body>
</html>
