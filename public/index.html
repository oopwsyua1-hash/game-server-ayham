<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>السبع لايف - تسجيل دخول</title>
  <style>
    body {
      background: linear-gradient(180deg, #1a0000, #4a0000);
      color: #fff;
      font-family: 'Cairo', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
   .login-box {
      background: #00000080;
      border: 2px solid #FFD700;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      width: 300px;
    }
    h1 { color: #FFD700; margin-bottom: 30px; }
    button {
      background: linear-gradient(45deg, #FFD700, #FF00FF);
      color: #000;
      font-size: 20px;
      padding: 15px;
      border: none;
      border-radius: 15px;
      font-weight: bold;
      width: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>👑 السبع لايف</h1>
    <p style="color: #FFD700; margin-bottom: 20px;">غرف صوتية VIP</p>
    <button id="ownerLoginBtn">دخول المالك مباشر 👑</button>
  </div>

  <script>
    document.getElementById('ownerLoginBtn').onclick = async () => {
      const res = await fetch('/api/owner-login', { method: 'POST' });
      const data = await res.json();
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      // هاي الخدعة بتفعل الصوت لكل التطبيق
      const audio = new Audio();
      audio.play().catch(() => {});

      location.href = '/room.html';
    }
  </script>
</body>
</html>
