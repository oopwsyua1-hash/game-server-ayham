<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>السبع الحلبي</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="main-title pulse">السبع الحلبي يرحب بكم</h1>

    <div class="form-container">
      <div class="form-header">
        <button id="registerBtn" class="tab-btn">انشاء حساب</button>
        <button id="loginBtn" class="tab-btn active">تسجيل دخول</button>
      </div>

      <h2 id="formTitle" class="form-title pulse">تسجيل الدخول</h2>
      <p id="errorMessage" class="error-message"></p>

      <!-- فورم تسجيل الدخول -->
      <form id="loginForm">
        <input type="text" id="loginEmail" placeholder="اسم المستخدم او الايميل او الرقم" required>
        <div class="password-box">
          <input type="password" id="loginPassword" placeholder="كلمة السر" required>
          <span class="toggle-password" data-target="loginPassword">👁️</span>
        </div>
        <button type="submit" class="submit-btn pulse">دخول</button>
        <button type="button" class="gmail-btn">الدخول عبر Gmail</button>
        <button type="button" class="phone-btn">الدخول عبر رقم الهاتف</button>
      </form>

      <!-- فورم انشاء حساب -->
      <form id="registerForm" style="display:none;">
        <input type="text" id="firstName" placeholder="الاسم الاول" required>
        <input type="text" id="lastName" placeholder="الاسم الاخير" required>
        <input type="date" id="birthdate" required>
        <input type="number" id="age" placeholder="العمر" min="10" max="100" required>
        <select id="gender" required>
          <option value="">اختر الجنس</option>
          <option value="ذكر">ذكر</option>
          <option value="انثى">انثى</option>
        </select>
        <input type="text" id="country" placeholder="البلد" required>
        <textarea id="bio" placeholder="السيرة الذاتية - اختياري"></textarea>
        <input type="text" id="username" placeholder="اسم المستخدم" required>
        <input type="email" id="email" placeholder="الايميل" required>
        <input type="tel" id="phone" placeholder="رقم الهاتف" required>
        <div class="password-box">
          <input type="password" id="password" placeholder="كلمة السر" required>
          <span class="toggle-password" data-target="password">👁️</span>
        </div>
        <div class="password-box">
          <input type="password" id="confirmPassword" placeholder="تأكيد كلمة السر" required>
          <span class="toggle-password" data-target="confirmPassword">👁️</span>
        </div>
        <button type="submit" class="submit-btn pulse">انشاء حساب</button>
      </form>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
