<script>
async function loadRooms() {
    const res = await fetch('/api/rooms');
    const rooms = await res.json();
    const roomList = document.querySelector('.room-list');
    roomList.innerHTML = '';

    rooms.forEach((room, index) => {
        const topClass = index === 0? 'top1' : index === 1? 'top2' : index === 2? 'top3' : '';
        roomList.innerHTML += `
        <div class="room-card ${topClass}" onclick="enterRoom('${room._id}')">
            <div class="room-content">
                <div class="room-info">
                    <div class="room-name">${room.name} 🎉</div>
                    <div class="room-owner">
                        <span class="crown">👑</span> ${room.ownerName}
                        ${room.isVip? '<span class="vip-tag">VIP</span>' : ''}
                    </div>
                    <div class="room-users"><i class="fas fa-user"></i> ${room.users.length}</div>
                </div>
                <img src="${room.cover}" class="room-cover">
            </div>
        </div>`;
    });
}

function enterRoom(roomId) {
    window.location.href = `/room/${roomId}`;
}

// شغلها لما تفتح الصفحة
loadRooms();

// زر انشاء غرفة
document.querySelector('.create-room').onclick = async () => {
    const name = prompt('اسم الغرفة:');
    if (!name) return;
    const res = await fetch('/api/rooms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            name,
            ownerId: '123456', // هلق مؤقت. بعدين منجيبه من تسجيل الدخول
            ownerName: 'السبع الحلبي'
        })
    });
    const data = await res.json();
    if (data.success) {
        enterRoom(data.roomId);
    } else {
        alert('ما قدرنا نعمل الغرفة');
    }
};
</script>
