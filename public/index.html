<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حفلات السبع الحلبي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(135deg, #1a0b2e, #2d1b4e, #4a2c7a);
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .bg-party {
            position: absolute; width: 100%; height: 100%;
            background: url('https://i.imgur.com/8Qm3z8D.jpg') center/cover;
            opacity: 0.2; filter: blur(3px);
        }
        .container {
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            border: 2px solid #ffd700; border-radius: 20px; padding: 40px 30px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); z-index: 10;
        }
        .logo {
            font-size: 28px; font-weight: 900; color: #ffd700; margin-bottom: 10px;
            text-shadow: 0 0 15px #ffd700; animation: pulseText 2s infinite;
        }
        .welcome { color: #fff; font-size: 16px; margin-bottom: 30px; }
        .btn {
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ffd700;
            border-radius: 12px; background: rgba(255, 215, 0, 0.1); color: #ffd700;
            font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s;
            animation: pulse 2s infinite;
        }
        .btn:hover { background: #ffd700; color: #1a0b2e; box-shadow: 0 0 20px #ffd700; transform: scale(1.05); }
        @keyframes pulse {
            0% { box-shadow: 0 0 rgba(255, 215, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }
        @keyframes pulseText {
            0%, 100% { text-shadow: 0 0 15px #ffd700; }
            50% { text-shadow: 0 0 25px #ffd700, 0 0 35px #ffd700; }
        }
        .form { display: none; text-align: right; }
        .form.active { display: block; }
        .input-group { margin: 15px 0; }
        .input-group label { display: block; color: #ffd700; margin-bottom: 5px; font-weight: 700; }
        .input-group input {
            width: 100%; padding: 12px; border: 1px solid #ffd700; border-radius: 8px;
            background: rgba(0, 0, 0, 0.5); color: #fff; font-size: 16px;
        }
        .gender-btns { display: flex; gap: 10px; }
        .gender-btn {
            flex: 1; padding: 12px; border: 2px solid #ffd700; border-radius: 8px;
            background: transparent; color: #ffd700; cursor: pointer; transition: 0.3s;
        }
        .gender-btn.active { background: #ffd700; color: #1a0b2e; animation: pulse 2s infinite; }
        #backBtn { background: transparent; border: 1px solid #666; color: #999; animation: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="bg-party"></div>
    <div class="container">
        <div id="loginScreen">
            <div class="logo">حفلات السبع الحلبي 👑</div>
            <div class="welcome">ترحب بكم في افخم تطبيق حفلات</div>
            <button class="btn" onclick="alert('جاري ربط Google...')">تسجيل الدخول عبر Google 🔴</button>
            <button class="btn" onclick="alert('جاري ربط الرقم...')">تسجيل الدخول عبر الرقم 📱</button>
            <button class="btn" onclick="showRegister()">إنشاء حساب جديد ✨</button>
        </div>
        <div id="registerForm" class="form">
            <div class="logo">إنشاء حساب فخم ✨</div>
            <div class="input-group">
                <label>الاسم</label>
                <input type="text" id="firstName" placeholder="اكتب اسمك">
            </div>
            <div class="input-group">
                <label>الكنية</label>
                <input type="text" id="lastName" placeholder="اكتب كنيتك">
            </div>
            <div class="input-group">
                <label>تاريخ الميلاد</label>
                <input type="date" id="birthDate">
            </div>
            <div class="input-group">
                <label>الجنس</label>
                <div class="gender-btns">
                    <button class="gender-btn" onclick="selectGender('ذكر', this)">ذكر 👨</button>
                    <button class="gender-btn" onclick="selectGender('أنثى', this)">أنثى 👩</button>
                </div>
            </div>
            <button class="btn" onclick="register()">إنشاء الحساب 💎</button>
            <button class="btn" id="backBtn" onclick="showLogin()">رجوع</button>
        </div>
    </div>
    <script>
        let selectedGender = '';
        function showRegister() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('registerForm').classList.add('active');
        }
        function showLogin() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('registerForm').classList.remove('active');
        }
        function selectGender(gender, btn) {
            selectedGender = gender;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function register() {
            const data = {
                اسم: document.getElementById('firstName').value,
                كنية: document.getElementById('lastName').value,
                تاريخ_ميلاد: document.getElementById('birthDate').value,
                الجنس: selectedGender
            };
            if(!data.اسم || !data.كنية || !data.تاريخ_ميلاد || !data.الجنس) {
                alert('عبي كل الحقول يا سبع 👑');
                return;
            }
            alert('الواجهة جاهزة! الخطوة الجاية منربطها مع السيرفر 💎');
            console.log('بيانات التسجيل:', data);
        }
    </script>
</body>
</html>
