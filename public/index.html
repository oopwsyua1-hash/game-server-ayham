<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السبع الحلبي - تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            color: #999;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            margin-bottom: -2px;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 السبع الحلبي</h1>
        <p class="subtitle">أهلاً فيك! سجل دخولك أو اعمل حساب جديد</p>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">تسجيل دخول</button>
            <button class="tab" onclick="showTab('register')">حساب جديد</button>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" class="form active">
            <div class="form-group">
                <label>الإيميل</label>
                <input type="email" id="loginEmail" required placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label>كلمة السر</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            <button type="submit" id="loginBtn">تسجيل الدخول</button>
        </form>
        
        <!-- Register Form -->
        <form id="registerForm" class="form">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" id="registerUsername" required placeholder="اسمك باللعبة">
            </div>
            <div class="form-group">
                <label>الإيميل</label>
                <input type="email" id="registerEmail" required placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label>كلمة السر</label>
                <input type="password" id="registerPassword" required placeholder="6 أحرف على الأقل">
            </div>
            <button type="submit" id="registerBtn">إنشاء حساب</button>
        </form>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            
            hideMessage();
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
        }
        
        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }
        
        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'جاري تسجيل الدخول...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    showMessage(`أهلاً ${data.username} ❤️ تم تسجيل الدخول بنجاح`, 'success');
                    setTimeout(() => {
                        window.location.href = '/game.html'; // رح نعملها بعدين
                    }, 1500);
                } else {
                    showMessage(data.message || 'خطأ بتسجيل الدخول', 'error');
                }
            } catch (error) {
                showMessage('خطأ بالاتصال بالسيرفر. تأكد من النت', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'تسجيل الدخول';
            }
        });
        
        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = 'جاري إنشاء الحساب...';
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('registerUsername').value,
                        email: document.getElementById('registerEmail').value,
                        password: document.getElementById('registerPassword').value
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    showMessage(`تم إنشاء حسابك يا ${data.username} 🎉`, 'success');
                    setTimeout(() => {
                        window.location.href = '/game.html'; // رح نعملها بعدين
                    }, 1500);
                } else {
                    showMessage(data.message || 'خطأ بإنشاء الحساب', 'error');
                }
            } catch (error) {
                showMessage('خطأ بالاتصال بالسيرفر. تأكد من النت', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'إنشاء حساب';
            }
        });
    </script>
</body>
</html>
