<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff00ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="السبع الحلبي">
<link rel="apple-touch-icon" href="https://i.imgur.com/TqZFqXw.png">

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then((reg) => console.log('Service Worker مسجل'))
      .catch((err) => console.log('Service Worker فشل:', err));
  });
}
</script>
