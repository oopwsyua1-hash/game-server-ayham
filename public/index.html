<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السبع الحلبي - تسجيل الدخول</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{
  background:linear-gradient(135deg,#0a0a0f 0%,#1a1a2e 50%,#0a0a0f 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  position:relative;overflow:hidden
}
body::before{
  content:'';position:absolute;inset:0;
  background:url('https://i.ibb.co/7jXqZ4J/lion-bg.jpg') center/cover;
  opacity:0.15;z-index:0
}
.container{position:relative;z-index:1;width:100%;max-width:450px}
.logo{text-align:center;margin-bottom:30px}
.logo h1{
  font-size:50px;font-weight:900;
  background:linear-gradient(45deg,gold,#ff6b00,#ff0000);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 40px gold;animation:logoGlow 2s infinite
}
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 20px gold)}50%{filter:drop-shadow(0 0 40px gold)}}
.logo p{color:#a855f7;font-size:18px;margin-top:10px}

.form-box{
  background:rgba(26,26,46,0.95);backdrop-filter:blur(20px);
  padding:35px;border-radius:20px;border:3px solid #a855f7;
  box-shadow:0 0 50px rgba(168,85,247,0.5)
}
.tabs{display:flex;gap:10px;margin-bottom:25px}
.tab{
  flex:1;padding:15px;text-align:center;cursor:pointer;
  background:#0a0a0f;border-radius:12px;font-weight:bold;
  transition:0.3s;border:2px solid transparent
}
.tab.active{
  background:linear-gradient(135deg,#a855f7,#3b82f6);
  border-color:gold;box-shadow:0 0 20px #a855f7
}
.form{display:none}
.form.active{display:block}
.input-group{margin-bottom:18px}
.input-group label{display:block;color:#a855f7;margin-bottom:8px;font-size:14px;font-weight:bold}
.input-group input,.input-group select{
  width:100%;padding:14px;background:#0a0a0f;border:2px solid #2a2a3e;
  border-radius:10px;color:#fff;font-size:15px;transition:0.3s
}
.input-group input:focus,.input-group select:focus{
  outline:none;border-color:#a855f7;box-shadow:0 0 15px rgba(168,85,247,0.3)
}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{
  width:100%;padding:16px;background:linear-gradient(135deg,#a855f7,#3b82f6);
  border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:900;
  cursor:pointer;transition:0.3s;margin-top:10px
}
.btn:hover{transform:scale(1.05);box-shadow:0 0 30px #a855f7}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.error{
  background:#ef4444;color:#fff;padding:12px;border-radius:10px;
  margin-bottom:15px;display:none;text-align:center
}
.success{
  background:#10b981;color:#fff;padding:12px;border-radius:10px;
  margin-bottom:15px;display:none;text-align:center
}
.loading{display:none;text-align:center;color:#a855f7;margin:10px 0}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>👑 السبع الحلبي</h1>
    <p>وكالة الملوك</p>
  </div>

  <div class="form-box">
    <div class="tabs">
      <div class="tab active" onclick="switchForm('login')">تسجيل دخول</div>
      <div class="tab" onclick="switchForm('register')">حساب جديد</div>
    </div>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
    <div class="loading" id="loading">⏳ جاري التحميل...</div>

    <!-- تسجيل دخول -->
    <form class="form active" id="loginForm">
      <div class="input-group">
        <label>📧 الايميل</label>
        <input type="email" id="loginEmail" required placeholder="example@gmail.com">
      </div>
      <div class="input-group">
        <label>🔒 كلمة السر</label>
        <input type="password" id="loginPassword" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn">دخول 👑</button>
    </form>

    <!-- انشاء حساب -->
    <form class="form" id="registerForm">
      <div class="row">
        <div class="input-group">
          <label>👤 الاسم</label>
          <input type="text" id="regUsername" required placeholder="السبع">
        </div>
        <div class="input-group">
          <label>👤 الكنية</label>
          <input type="text" id="regLastName" required placeholder="الحلبي">
        </div>
      </div>
      <div class="input-group">
        <label>📧 الايميل</label>
        <input type="email" id="regEmail" required placeholder="example@gmail.com">
      </div>
      <div class="input-group">
        <label>🔒 كلمة السر</label>
        <input type="password" id="regPassword" required placeholder="8 احرف على الاقل">
      </div>
      <div class="row">
        <div class="input-group">
          <label>🌍 الدولة</label>
          <select id="regCountry" required>
            <option value="">اختر الدولة</option>
            <option value="السعودية">🇸🇦 السعودية</option>
            <option value="الإمارات">🇦🇪 الإمارات</option>
            <option value="الكويت">🇰🇼 الكويت</option>
            <option value="قطر">🇶🇦 قطر</option>
            <option value="البحرين">🇧🇭 البحرين</option>
            <option value="عمان">🇴🇲 عمان</option>
            <option value="مصر">🇪🇬 مصر</option>
            <option value="الأردن">🇯🇴 الأردن</option>
            <option value="لبنان">🇱🇧 لبنان</option>
            <option value="سوريا">🇸🇾 سوريا</option>
            <option value="العراق">🇮🇶 العراق</option>
            <option value="فلسطين">🇵🇸 فلسطين</option>
            <option value="اليمن">🇾🇪 اليمن</option>
            <option value="المغرب">🇲🇦 المغرب</option>
            <option value="الجزائر">🇩🇿 الجزائر</option>
            <option value="تونس">🇹🇳 تونس</option>
            <option value="ليبيا">🇱🇾 ليبيا</option>
            <option value="السودان">🇸🇩 السودان</option>
            <option value="موريتانيا">🇲🇷 موريتانيا</option>
            <option value="الصومال">🇸🇴 الصومال</option>
            <option value="جيبوتي">🇩🇯 جيبوتي</option>
            <option value="جزر القمر">🇰🇲 جزر القمر</option>
            <option value="تركيا">🇹🇷 تركيا</option>
            <option value="أمريكا">🇺🇸 أمريكا</option>
            <option value="كندا">🇨🇦 كندا</option>
            <option value="بريطانيا">🇬🇧 بريطانيا</option>
            <option value="فرنسا">🇫🇷 فرنسا</option>
            <option value="ألمانيا">🇩🇪 ألمانيا</option>
            <option value="إيطاليا">🇮🇹 إيطاليا</option>
            <option value="إسبانيا">🇪🇸 إسبانيا</option>
            <option value="السويد">🇸🇪 السويد</option>
            <option value="النرويج">🇳🇴 النرويج</option>
            <option value="الدنمارك">🇩🇰 الدنمارك</option>
            <option value="هولندا">🇳🇱 هولندا</option>
            <option value="بلجيكا">🇧🇪 بلجيكا</option>
            <option value="سويسرا">🇨🇭 سويسرا</option>
            <option value="النمسا">🇦🇹 النمسا</option>
            <option value="روسيا">🇷🇺 روسيا</option>
            <option value="الصين">🇨🇳 الصين</option>
            <option value="اليابان">🇯🇵 اليابان</option>
            <option value="كوريا">🇰🇷 كوريا</option>
            <option value="الهند">🇮🇳 الهند</option>
            <option value="باكستان">🇵🇰 باكستان</option>
            <option value="إيران">🇮🇷 إيران</option>
            <option value="أفغانستان">🇦🇫 أفغانستان</option>
            <option value="البرازيل">🇧🇷 البرازيل</option>
            <option value="الأرجنتين">🇦🇷 الأرجنتين</option>
            <option value="المكسيك">🇲🇽 المكسيك</option>
            <option value="أستراليا">🇦🇺 أستراليا</option>
            <option value="جنوب أفريقيا">🇿🇦 جنوب أفريقيا</option>
            <option value="نيجيريا">🇳🇬 نيجيريا</option>
            <option value="أخرى">🌍 أخرى</option>
          </select>
        </div>
        <div class="input-group">
          <label>🎂 العمر</label>
          <input type="number" id="regAge" required placeholder="25" min="13" max="100">
        </div>
      </div>
      <div class="row">
        <div class="input-group">
          <label>📅 تاريخ الميلاد</label>
          <input type="date" id="regBirthDate" required>
        </div>
        <div class="input-group">
          <label>⚧️ الجنس</label>
          <select id="regGender" required>
            <option value="">اختر</option>
            <option value="male">ذكر ♂️</option>
            <option value="female">انثى ♀️</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn">انشاء حساب 👑</button>
    </form>
  </div>
</div>

<script>
const API_URL = window.location.origin;

function switchForm(type) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(type + 'Form').classList.add('active');
  hideMsg();
}

function hideMsg() {
  document.getElementById('error').style.display = 'none';
  document.getElementById('success').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('success');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
}

function showLoading() {
  document.getElementById('loading').style.display = 'block';
  hideMsg();
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  showLoading();
  
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  
  try {
    const res = await fetch(`${API_URL}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    
    localStorage.setItem('token', data.token);
    localStorage.setItem('userId', data.user._id);
    localStorage.setItem('vipId', data.user.vipId);
    
    showSuccess('تم تسجيل الدخول بنجاح 👑');
    setTimeout(() => location.href = '/me', 1000);
  } catch (err) {
    showError(err.message);
  }
});

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  showLoading();
  
  const data = {
    username: document.getElementById('regUsername').value,
    lastName: document.getElementById('regLastName').value,
    email: document.getElementById('regEmail').value,
    password: document.getElementById('regPassword').value,
    country: document.getElementById('regCountry').value,
    birthDate: document.getElementById('regBirthDate').value,
    age: parseInt(document.getElementById('regAge').value),
    gender: document.getElementById('regGender').value
  };
  
  try {
    const res = await fetch(`${API_URL}/api/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    
    const result = await res.json();
    if (!res.ok) throw new Error(result.error);
    
    localStorage.setItem('token', result.token);
    localStorage.setItem('userId', result.user._id);
    localStorage.setItem('vipId', result.user.vipId);
    
    showSuccess('تم انشاء الحساب بنجاح 👑 ID: ' + result.user.vipId);
    setTimeout(() => location.href = '/me', 1500);
  } catch (err) {
    showError(err.message);
  }
});

if (localStorage.getItem('token')) {
  location.href = '/me';
}
</script>
</body>
</html>
