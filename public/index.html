<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية السبع</title>
    <style>
        body { background: #050a0f; color: gold; font-family: sans-serif; margin: 0; padding: 0; }
        .header { background: #101520; padding: 20px; border-bottom: 2px solid gold; }
        .lion-img { width: 120px; border-radius: 50%; border: 3px solid gold; margin-top: 10px; }
        .card { background: #161b29; margin: 20px; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .balance { font-size: 40px; font-weight: bold; color: white; display: block; margin: 10px 0; }
        input { width: 80%; padding: 10px; border-radius: 8px; border: 1px solid gold; background: #050a0f; color: white; margin-bottom: 10px; }
        button { background: gold; color: black; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 85%; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://i.ibb.co/3S4S1S/lion.jpg" class="lion-img"> <h2>إمبراطورية السبع 🦁</h2>
    </div>

    <div class="card" id="login-box">
        <h3>تسجيل دخول الإمبراطور</h3>
        <input type="text" id="user-id" placeholder="أدخل الآيدي الخاص بك">
        <button onclick="login()">دخول 🔥</button>
    </div>

    <div class="card" id="user-info" style="display:none;">
        <h3>مرحباً بك يا <span id="display-name">سبع</span></h3>
        <span>رصيدك من الكوينز:</span>
        <span class="balance" id="coin-balance">0</span>
        <p>آيدي الحساب: <span id="display-id">---</span></p>
    </div>

    <script>
        const API = ""; // خليه فاضي لأنه بنفس السيرفر

        async function login() {
            const id = document.getElementById('user-id').value;
            if(!id) return alert("دخل الآيدي!");

            const res = await fetch(`/user/${id}`);
            const data = await res.json();

            document.getElementById('login-box').style.display = 'none';
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('display-id').innerText = id;
            document.getElementById('coin-balance').innerText = data.coins || 0;
        }
    </script>
</body>
</html>
