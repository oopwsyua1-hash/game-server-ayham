<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الغرف الصوتية</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; margin: 0; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; }
    .room { background: #1e1e1e; padding: 20px; border-radius: 12px; margin: 10px 0; cursor: pointer; }
    .room:hover { background: #2a2a2a; }
    button { padding: 10px 20px; border: none; border-radius: 8px; background: #7c3aed; color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">
    <h2>اهلا <span id="username">...</span></h2>
    <button onclick="logout()">تسجيل خروج</button>
  </div>
  
  <h3>الغرف المتاحة:</h3>
  <div class="room" onclick="joinRoom('room1')">غرفة 1</div>
  <div class="room" onclick="joinRoom('room2')">غرفة 2</div>
  <div class="room" onclick="joinRoom('room3')">غرفة 3</div>

  <script>
    async function getMe() {
      const res = await fetch('/me');
      const data = await res.json();
      document.getElementById('username').innerText = data.username;
    }
    
    function joinRoom(id) {
      window.location.href = `/room?id=${id}`;
    }
    
    function logout() {
      window.location.href = '/logout';
    }
    
    getMe();
    
    // PWA Install
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
