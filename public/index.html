<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السبع الحلبي - تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        
        /* فيديو الخلفية - حفلة مالي الشاشة */
        #bgVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 0;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.4);
        }
        
        /* طبقة تعتيم فوق الفيديو */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 30, 0.6);
            z-index: 1;
        }
        
        .container {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(22, 33, 62, 0.95) 100%);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.7);
            width: 100%;
            max-width: 420px;
            border: 2px solid rgba(255, 20, 147, 0.5);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(15px);
        }
        
        .sound-btn {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff1493 0%, #8a2be2 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.8);
            z-index: 20;
            animation: pulse-btn 2s infinite;
        }
        
        @keyframes pulse-btn {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }
        
        h1 {
            text-align: center;
            color: #ff1493;
            margin-bottom: 20px;
            font-size: 28px;
            text-shadow: 0 0 15px rgba(255, 20, 147, 0.8);
        }
        
        .tabs {
            display: flex;
            margin-bottom: 25px;
            background: rgba(15, 15, 30, 0.8);
            border-radius: 12px;
            padding: 5px;
            border: 1px solid rgba(138, 43, 226, 0.3);
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            color: #999;
            transition: all 0.3s;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .tab.active {
            color: white;
            background: linear-gradient(135deg, #ff1493 0%, #8a2be2 100%);
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.6);
        }
        
        .form-title {
            text-align: center;
            color: #ff1493;
            font-size: 22px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.6);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        input, select {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid rgba(138, 43, 226, 0.3);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: rgba(15, 15, 30, 0.8);
            color: white;
            text-align: right;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #ff1493;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.4);
        }
        
        input::placeholder {
            color: #666;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff1493 0%, #8a2be2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.5);
        }
        
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.8);
        }
        
        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .extra-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            color: white;
        }
        
        .gmail-btn {
            background: #ff4500;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.4);
        }
        
        .phone-btn {
            background: #00ff7f;
            box-shadow: 0 0 15px rgba(0, 255, 127, 0.4);
        }
        
        .message {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
            font-weight: bold;
        }
        
        .message.success {
            background: rgba(0, 255, 127, 0.2);
            color: #00ff7f;
            border: 2px solid #00ff7f;
        }
        
        .message.error {
            background: rgba(255, 20, 147, 0.2);
            color: #ff1493;
            border: 2px solid #ff1493;
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .password-wrapper input {
            padding-left: 45px;
        }
        
        .toggle-password {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <!-- فيديو الخلفية - حفلة شباب وبنات عم يرقصو -->
    <video id="bgVideo" autoplay loop muted playsinline>
        <source src="https://cdn.coverr.co/videos/coverr-people-dancing-at-a-party-7521/1080p.mp4" type="video/mp4">
    </video>
    
    <!-- طبقة تعتيم -->
    <div class="overlay"></div>
    
    <!-- ملف الصوت - ترحيب بصوت شب -->
    <audio id="welcomeAudio" loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>
    
    <div class="container">
        <button class="sound-btn" onclick="toggleSound()">🔊 شغل الصوت</button>
        
        <h1>🎮 السبع الحلبي يرحب بكم</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">تسجيل دخول</button>
            <button class="tab" onclick="showTab('register')">انشاء حساب</button>
        </div>
        
        <div id="message" class="message"></div>
        
        <!-- Login Form -->
        <form id="loginForm" class="form active">
            <div class="form-title">تسجيل الدخول</div>
            
            <div class="form-group">
                <input type="email" id="loginEmail" required placeholder="yyqp555@gmail.com">
            </div>
            
            <div class="form-group password-wrapper">
                <input type="password" id="loginPassword" required placeholder="••••••••">
                <span class="toggle-password" onclick="togglePassword('loginPassword')">👁️</span>
            </div>
            
            <button type="submit" id="loginBtn">دخول</button>
            <button type="button" class="extra-btn gmail-btn">الدخول عبر Gmail</button>
            <button type="button" class="extra-btn phone-btn">الدخول عبر رقم الهاتف</button>
        </form>
        
        <!-- Register Form -->
        <form id="registerForm" class="form">
            <div class="form-title">انشاء حساب جديد</div>
            
            <div class="form-group">
                <input type="text" id="regName1" placeholder="سبع">
            </div>
            
            <div class="form-group">
                <input type="text" id="regName2" placeholder="سبع">
            </div>
            
            <div class="form-group">
                <input type="text" id="regDate" value="2026/04/23">
            </div>
            
            <div class="form-group">
                <input type="number" id="regNumber" value="0">
            </div>
            
            <div class="form-group">
                <select id="regGender">
                    <option value="ذكر">ذكر</option>
                    <option value="أنثى">أنثى</option>
                </select>
            </div>
            
            <div class="form-group">
                <input type="text" id="regCountry" placeholder="تركيا">
            </div>
            
            <div class="form-group">
                <input type="text" id="regStatus" placeholder="حب">
            </div>
            
            <div class="form-group">
                <input type="text" id="registerUsername" required placeholder="سبع">
            </div>
            
            <div class="form-group">
                <input type="email" id="registerEmail" required placeholder="yyqp555@gmail.com">
            </div>
            
            <div class="form-group">
                <input type="password" id="registerPassword" required placeholder="6 أحرف على الأقل">
            </div>
            
            <button type="submit" id="registerBtn">انشاء حساب</button>
        </form>
    </div>

    <script>
        const audio = document.getElementById('welcomeAudio');
        let soundOn = false;
        
        function toggleSound() {
            if (soundOn) {
                audio.pause();
                event.target.textContent = '🔊 شغل الصوت';
            } else {
                audio.play();
                event.target.textContent = '🔇 وقف الصوت';
            }
            soundOn = !soundOn;
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            hideMessage();
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
        }
        
        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }
        
        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        
        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الدخول...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    showMessage(`أهلاً ${data.username} ❤️`, 'success');
                    setTimeout(() => {
                        window.location.href = '/game.html';
                    }, 1500);
                } else {
                    showMessage(data.message || 'خطأ بالاتصال بالسيرفر', 'error');
                }
            } catch (error) {
                showMessage('خطأ بالاتصال بالسيرفر', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'دخول';
            }
        });
        
        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = 'جاري انشاء الحساب...';
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('registerUsername').value,
                        email: document.getElementById('registerEmail').value,
                        password: document.getElementById('registerPassword').value
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    showMessage(`تم انشاء حسابك يا ${data.username} 🎉`, 'success');
                    setTimeout(() => {
                        window.location.href = '/game.html';
                    }, 1500);
                } else {
                    showMessage(data.message || 'خطأ بالاتصال بالسيرفر', 'error');
                }
            } catch (error) {
                showMessage('خطأ بالاتصال بالسيرفر', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'انشاء حساب';
            }
        });
    </script>
</body>
</html>
