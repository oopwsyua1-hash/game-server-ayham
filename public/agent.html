<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مركز الوكيل</title>
    <style>
        body { font-family: 'Segoe UI'; background: #f5f5f5; padding: 20px; }
       .card { background: #fff; padding: 20px; border-radius: 10px; margin: 10px 0; }
       .coins { font-size: 32px; text-align: center; color: #FF9800; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin: 5px; }
        input { padding: 10px; width: 100%; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>مركز الوكيل</h2>
    <div class="card">
        <h3>رصيدك الحالي</h3>
        <div class="coins" id="coins">0 💰</div>
    </div>
    <div class="card">
        <h3>سحب رصيد</h3>
        <input type="number" id="withdrawAmount" placeholder="المبلغ">
        <button onclick="withdraw()">سحب</button>
    </div>
    <button onclick="window.location.href='/me'">رجوع</button>

<script>
async function loadCoins() {
  const token = localStorage.getItem('token');
  const res = await fetch('/api/profile', { headers: { 'Authorization': 'Bearer ' + token } });
  const data = await res.json();
  document.getElementById('coins').innerText = data.user.coins + ' 💰';
}

async function withdraw() {
  const amount = document.getElementById('withdrawAmount').value;
  const token = localStorage.getItem('token');
  const res = await fetch('/api/withdraw', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ amount: Number(amount) })
  });
  const data = await res.json();
  alert(data.msg || data.error);
  loadCoins();
}

loadCoins();
</script>
</body>
</html>
