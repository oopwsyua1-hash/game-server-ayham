<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية السبع - الملف الشخصي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* التنسيق الأساسي كما في صورتك */
        html, body { overscroll-behavior: none; overflow: hidden; width: 100%; height: 100%; background: #050a0f; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        .header-nav { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: #101520; }
        
        .cover-area { height: 180px; background: linear-gradient(to bottom, transparent, #050a0f), url('https://via.placeholder.com/800x400'); background-size: cover; position: relative; }
        
        .avatar-section { position: absolute; bottom: -40px; right: 20px; }
        .avatar-wrapper { width: 100px; height: 100px; background: linear-gradient(135deg, #ff00ff, #00ffff); border-radius: 50%; padding: 3px; position: relative; }
        .avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #050a0f; }
        .edit-icon { position: absolute; bottom: 0; left: 0; background: #00ffff; color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #050a0f; }

        .user-name-title { padding: 50px 20px 10px; text-align: right; }
        .id-tag { background: rgba(0,255,255,0.1); color: #00ffff; padding: 5px 15px; border-radius: 20px; font-size: 12px; display: inline-block; border: 1px solid #00ffff; }

        .menu-card { background: #101520; margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .section-title { color: #ff00ff; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        /* شريط البحث والأزرار */
        .search-box { width: 100%; background: #050a0f; border: 1px solid #333; padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-action { background: #1a2030; border: 1px solid #333; padding: 10px; border-radius: 10px; color: #fff; font-size: 12px; text-align: center; }

        /* شريط التنقل السفلي - هاد اللي كان ناقصك */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #101520; 
            display: flex; justify-content: space-around; padding: 12px 0; 
            border-top: 1px solid #333; z-index: 100;
        }
        .nav-item { text-align: center; color: #888; font-size: 12px; cursor: pointer; flex: 1; }
        .nav-item.active { color: #ff00ff; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header-nav">
        <i class="fas fa-arrow-right"></i>
        <div style="font-weight: bold;">إعدادات الحساب</div>
        <div style="width: 20px;"></div>
    </div>

    <div class="cover-area">
        <div class="avatar-section">
            <div class="avatar-wrapper">
                <img src="https://via.placeholder.com/150" alt="أبو نمر">
                <div class="edit-icon"><i class="fas fa-pen"></i></div>
            </div>
        </div>
    </div>

    <div class="user-name-title">
        <h2 style="margin:0;">أبو نمر ☀️</h2>
        <div class="id-tag">ID: 7084474</div>
    </div>

    <div class="menu-card">
        <div class="section-title"><i class="fas fa-users"></i> مركز الوكالات</div>
        <input type="text" class="search-box" placeholder="بحث عن وكالات...">
        <div class="action-grid">
            <div class="btn-action">انضم للوكالة</div>
            <div class="btn-action">إنشاء وكالة</div>
            <div class="btn-action">نقل وكالة</div>
        </div>
    </div>

    <!-- شريط التنقل السفلي - هاد اللي بيوديك للدردشة -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="alert('جاري الانتقال للغرف...')">
            <i class="fas fa-comments"></i>
            <span>الغرف</span>
        </div>
        <div class="nav-item" onclick="window.location.href='chat.html'">
            <i class="fas fa-paper-plane"></i>
            <span>الرسائل</span>
        </div>
        <div class="nav-item active">
            <i class="fas fa-user"></i>
            <span>أنا</span>
        </div>
    </div>

</body>
</html>
