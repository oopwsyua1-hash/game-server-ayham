<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية السبع - الملف الشخصي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* منع السحب والتحريك العشوائي للصفحة */
        html, body { 
            overscroll-behavior: none; 
            overflow-x: hidden; 
            position: fixed; 
            width: 100%; 
            height: 100%;
        }

        @keyframes nameGlow {
            0% { text-shadow: 0 0 5px #fff, 0 0 10px #ff00ff; }
            50% { text-shadow: 0 0 20px #ff00ff, 0 0 30px #9d00ff; color: #f5d496; }
            100% { text-shadow: 0 0 5px #fff, 0 0 10px #ff00ff; }
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        body { 
            background-color: #050a0f; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        /* الهيدر */
        .header-nav { display: flex; align-items: center; justify-content: space-between; padding: 15px; position: absolute; width: 100%; z-index: 10; box-sizing: border-box; }
        .btn-back { background: rgba(0,0,0,0.5); border: none; color: #00ffff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }

        /* منطقة الغلاف */
        .cover-area {
            height: 220px;
            background: linear-gradient(to bottom, transparent, #050a0f), url('https://via.placeholder.com/800x400/1a1a2e/ffffff?text=إمبراطورية+السبع');
            background-size: cover; background-position: center; position: relative;
            flex-shrink: 0;
        }
        
        /* ضبط صورة البروفايل لتكون ثابتة ومناسبة */
        .avatar-section { position: absolute; bottom: -45px; right: 20px; z-index: 5; }
        .avatar-wrapper { 
            width: 110px; height: 110px; 
            background: linear-gradient(45deg, #ff00ff, #00ffff); 
            border-radius: 50%; padding: 4px; position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }
        .avatar-wrapper::before {
            content: ""; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px dashed #00ffff; border-radius: 50%; animation: rotateGlow 15s linear infinite; opacity: 0.4;
        }
        .avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #050a0f; object-fit: cover; }
        .change-avatar-btn { position: absolute; bottom: 5px; right: 5px; background: #00ffff; color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #050a0f; font-size: 14px; }

        .user-header-info { padding: 60px 20px 10px; text-align: right; flex-shrink: 0; }
        .name-row { font-size: 26px; font-weight: bold; display: flex; align-items: center; gap: 10px; animation: nameGlow 3s infinite; }
        .id-badge { display: inline-block; background: rgba(0, 255, 255, 0.1); padding: 5px 15px; border-radius: 15px; font-size: 13px; color: #00ffff; margin-top: 8px; border: 1px solid rgba(0, 255, 255, 0.3); }

        /* القائمة ثابتة داخل مساحة العرض */
        .settings-list { padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; flex-grow: 1; }
        
        .menu-card {
            background: rgba(16, 21, 32, 0.8); border-radius: 18px; padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
        }

        .section-title { color: #ff00ff; font-size: 15px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        .agency-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-mini { background: #1a2030; border: 1px solid #333; padding: 12px 5px; border-radius: 12px; color: #fff; font-size: 11px; cursor: pointer; text-align: center; }
        
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .info-row span:first-child { color: #aaa; }

        .cash-box { 
            background: linear-gradient(135deg, #00b09b, #96c93d); 
            border-radius: 15px; padding: 20px; position: relative; overflow: hidden; 
        }

        .progress-bar { height: 10px; background: rgba(0,0,0,0.2); border-radius: 5px; margin-top: 12px; }
        .progress-fill { height: 100%; background: #fff; width: 65%; border-radius: 5px; box-shadow: 0 0 10px #fff; }

        .btn-logout { 
            background: linear-gradient(90deg, #ff4b2b, #ff416c); 
            color: white; border: none; padding: 18px; border-radius: 15px; 
            width: 100%; font-weight: bold; margin-bottom: 20px; cursor: pointer; 
        }

        /* ستايل التنبيه المخصص بدون رابط السيرفر */
        #custom-popup {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .popup-box {
            background: #141428; border: 2px solid #ff00ff; border-radius: 15px;
            padding: 25px; width: 80%; text-align: center;
        }
        .popup-box button { background: #00ffff; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="custom-popup">
        <div class="popup-box">
            <p id="popup-text"></p>
            <button onclick="closePopup()">حسناً</button>
        </div>
    </div>

    <div class="header-nav">
        <button class="btn-back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div style="font-weight: bold;">إعدادات الحساب</div>
        <div style="width: 40px;"></div>
    </div>

    <div class="cover-area" id="roomCover">
        <div class="avatar-section">
            <div class="avatar-wrapper">
                <img src="https://via.placeholder.com/150" id="userAvatar">
                <div class="change-avatar-btn" onclick="document.getElementById('avatarInput').click()">
                    <i class="fas fa-pen"></i>
                </div>
                <input type="file" id="avatarInput" hidden onchange="updateImage(this, 'userAvatar', false)">
            </div>
        </div>
    </div>

    <div class="user-header-info">
        <div class="name-row">
            <span id="displayName">أبو نمر</span>
            <i class="fas fa-certificate" style="color:#f1c40f;"></i>
        </div>
        <div class="id-badge">ID: <span id="displayID">7084474</span></div>
    </div>

    <div class="settings-list">
        <div class="menu-card">
            <div class="section-title"><i class="fas fa-users-cog"></i> مركز الوكالات</div>
            <div class="agency-buttons">
                <div class="btn-mini" onclick="showMsg('تم إرسال طلب الانضمام')">انضم للوكالة</div>
                <div class="btn-mini" onclick="showMsg('جاري إنشاء وكالتك')">إنشاء وكالة</div>
                <div class="btn-mini" onclick="showMsg('اختر الوكالة الجديدة')">نقل لوكالة</div>
            </div>
        </div>

        <div class="menu-card">
            <div class="section-title"><i class="fas fa-shield-alt"></i> معلومات الحساب</div>
            <div class="info-row"><span>البريد:</span><span style="color: #00ffff;">qusai@example.com</span></div>
            <div class="info-row"><span>الهاتف:</span><span style="color: #00ffff;">+90 5xx xxx xx</span></div>
        </div>

        <div class="cash-box" onclick="showMsg('سيتم مراجعة التارجت')">
            <h4><i class="fas fa-money-bill-wave"></i> سحب عبر شام كاش</h4>
            <span class="target-status">تم إغلاق 65% من التارجت</span>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <button class="btn-logout" onclick="handleLogout()">خروج من الإمبراطورية</button>
    </div>

    <script>
        // وظيفة لإظهار الرسائل بدون اسم السيرفر
        function showMsg(text) {
            document.getElementById('popup-text').innerText = text;
            document.getElementById('custom-popup').style.display = 'flex';
        }
        function closePopup() { document.getElementById('custom-popup').style.display = 'none'; }

        function updateImage(input, targetId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { document.getElementById(targetId).src = e.target.result; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function handleLogout() {
            if (confirm("خروج يا أبو نمر؟")) { window.location.href = '/'; }
        }

        window.onload = function() {
            const savedName = localStorage.getItem('username');
            if(savedName) document.getElementById('displayName').innerText = savedName;
        }
    </script>
</body>
</html>
