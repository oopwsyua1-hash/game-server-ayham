<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي - إمبراطورية السبع</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050a0f; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .cover-area { height: 200px; background: linear-gradient(to bottom, transparent, #050a0f), url('https://via.placeholder.com/800x400/1a1a2e/ffffff?text=السبع'); background-size: cover; position: relative; }
        .avatar-section { position: absolute; bottom: -40px; right: 20px; }
        .avatar-wrapper { width: 100px; height: 100px; background: linear-gradient(135deg, #ff00ff, #00ffff); border-radius: 50%; padding: 3px; }
        .avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #050a0f; }
        .user-header { padding: 50px 20px 10px; text-align: right; }
        .settings-list { padding: 15px; }
        .menu-card { background: #101520; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-logout { background: #ff4b2b; color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="cover-area">
        <div class="avatar-section"><div class="avatar-wrapper"><img src="https://via.placeholder.com/150"></div></div>
    </div>
    <div class="user-header">
        <div style="font-size: 24px; font-weight: bold;">أبو نمر 🦁</div>
        <div style="color: #00ffff;">ID: 7084474</div>
    </div>
    <div class="settings-list">
        <div class="menu-card"><h3>مركز الوكالات</h3><p>لا توجد وكالة حالياً</p></div>
        <div class="menu-card"><h3>شام كاش</h3><p>الرصيد: 0.00$</p></div>
        <button class="btn-logout" onclick="location.href='/'">تسجيل خروج</button>
    </div>
</body>
</html>
