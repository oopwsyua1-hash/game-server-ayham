<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية السبع - الملف الشخصي والإعدادات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* أنيميشن توهج الاسم */
        @keyframes nameGlow {
            0% { text-shadow: 0 0 5px #fff, 0 0 10px #ff00ff; }
            50% { text-shadow: 0 0 20px #ff00ff, 0 0 30px #9d00ff; color: #f5d496; }
            100% { text-shadow: 0 0 5px #fff, 0 0 10px #ff00ff; }
        }

        /* أنيميشن دوران الهالة خلف البروفايل */
        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* أنيميشن النبض للبطاقات */
        @keyframes cardPulse {
            0% { box-shadow: 0 0 5px rgba(255, 0, 255, 0.2); }
            50% { box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); }
            100% { box-shadow: 0 0 5px rgba(255, 0, 255, 0.2); }
        }

        body { 
            background-color: #050a0f; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        /* خلفية متحركة خفيفة */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #101520 0%, #050a0f 100%);
            z-index: -1;
        }

        /* الهيدر */
        .header-nav { display: flex; align-items: center; justify-content: space-between; padding: 15px; position: absolute; width: 100%; z-index: 10; }
        .btn-back { background: rgba(0,0,0,0.5); border: none; color: #00ffff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }

        /* منطقة الغلاف والبروفايل */
        .cover-area {
            height: 220px;
            background: linear-gradient(to bottom, transparent, #050a0f), url('https://via.placeholder.com/800x400/1a1a2e/ffffff?text=إمبراطورية+السبع');
            background-size: cover; background-position: center; position: relative;
        }
        .change-cover-btn { position: absolute; top: 70px; left: 15px; background: rgba(0,0,0,0.6); border: 1px solid #00ffff; color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .change-cover-btn:hover { background: #00ffff; color: #000; }
        
        .avatar-section { position: absolute; bottom: -45px; right: 20px; }
        .avatar-wrapper { 
            width: 110px; height: 110px; 
            background: linear-gradient(45deg, #ff00ff, #00ffff, #9d00ff); 
            border-radius: 50%; padding: 4px; position: relative;
            animation: cardPulse 3s infinite;
        }
        /* هالة الدوران */
        .avatar-wrapper::before {
            content: ""; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px dashed #00ffff; border-radius: 50%; animation: rotateGlow 10s linear infinite; opacity: 0.5;
        }
        .avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #050a0f; object-fit: cover; }
        .change-avatar-btn { position: absolute; bottom: 5px; right: 5px; background: #00ffff; color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #050a0f; font-size: 14px; z-index: 5; }

        .user-header-info { padding: 60px 20px 10px; text-align: right; }
        .name-row { font-size: 26px; font-weight: bold; display: flex; align-items: center; gap: 10px; animation: nameGlow 3s infinite; }
        .id-badge { display: inline-block; background: rgba(0, 255, 255, 0.1); padding: 5px 15px; border-radius: 15px; font-size: 13px; color: #00ffff; margin-top: 8px; border: 1px solid rgba(0, 255, 255, 0.3); letter-spacing: 1px; }

        /* القائمة الرئيسية */
        .settings-list { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        .menu-card {
            background: rgba(16, 21, 32, 0.8); border-radius: 18px; padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s;
            backdrop-filter: blur(10px);
            animation: cardPulse 5s infinite;
        }
        .menu-card:hover { transform: translateY(-3px); border-color: #ff00ff; }

        .section-title { color: #ff00ff; font-size: 15px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }

        /* مركز الوكالات */
        .agency-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-mini { background: #1a2030; border: 1px solid #333; padding: 12px 5px; border-radius: 12px; color: #fff; font-size: 11px; cursor: pointer; text-align: center; transition: 0.3s; }
        .btn-mini:hover { background: linear-gradient(45deg, #ff00ff, #9d00ff); border-color: transparent; }
        
        /* معلومات الحساب */
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .info-row span:first-child { color: #aaa; }
        .btn-action { color: #00ffff; font-size: 12px; cursor: pointer; background: none; border: none; text-decoration: none; font-weight: bold; }
        .btn-action:hover { text-shadow: 0 0 5px #00ffff; }

        /* شام كاش المطور */
        .cash-box { 
            background: linear-gradient(135deg, #00b09b, #96c93d); 
            border-radius: 15px; padding: 20px; position: relative; overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .cash-box::before {
            content: "\f3d1"; font-family: "Font Awesome 5 Free"; font-weight: 900;
            position: absolute; left: -10px; bottom: -10px; font-size: 80px; opacity: 0.2; transform: rotate(-20deg);
        }
        .cash-box h4 { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .target-status { font-size: 13px; margin-top: 10px; display: block; font-weight: 500; }
        .progress-bar { height: 10px; background: rgba(0,0,0,0.2); border-radius: 5px; margin-top: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .progress-fill { 
            height: 100%; background: #fff; width: 65%; border-radius: 5px; 
            box-shadow: 0 0 10px #fff;
            position: relative;
        }

        .btn-logout { 
            background: linear-gradient(90deg, #ff4b2b, #ff416c); 
            color: white; border: none; padding: 18px; border-radius: 15px; 
            width: 100%; font-weight: bold; margin: 25px 0; cursor: pointer; 
            font-size: 16px; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 75, 43, 0.3);
        }
        .btn-logout:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(255, 75, 43, 0.5); }
    </style>
</head>
<body>

    <div class="header-nav">
        <button class="btn-back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div style="font-weight: bold; letter-spacing: 1px;">إعدادات الحساب</div>
        <div style="width: 40px;"></div>
    </div>

    <div class="cover-area" id="roomCover">
        <button class="change-cover-btn" onclick="document.getElementById('coverInput').click()">
            <i class="fas fa-camera"></i> تغيير غلاف الغرف
        </button>
        <input type="file" id="coverInput" hidden onchange="updateImage(this, 'roomCover', true)">
        
        <div class="avatar-section">
            <div class="avatar-wrapper">
                <img src="https://via.placeholder.com/150" id="userAvatar">
                <div class="change-avatar-btn" onclick="document.getElementById('avatarInput').click()">
                    <i class="fas fa-pen"></i>
                </div>
                <input type="file" id="avatarInput" hidden onchange="updateImage(this, 'userAvatar', false)">
            </div>
        </div>
    </div>

    <div class="user-header-info">
        <div class="name-row">
            <span id="displayName">أبو نمر</span>
            <i class="fas fa-certificate" style="color:#f1c40f; filter: drop-shadow(0 0 5px #f1c40f);"></i>
        </div>
        <div class="id-badge">ID: <span id="displayID">7084474</span></div>
    </div>

    <div class="settings-list">
        
        <div class="menu-card">
            <div class="section-title"><i class="fas fa-users-cog"></i> مركز الوكالات</div>
            <input type="text" placeholder="بحث عن وكالات..." style="width:100%; background:#0a0a14; border:1px solid #333; padding:12px; border-radius:12px; color:#fff; margin-bottom:12px; outline: none; border-color: #ff00ff;">
            <div class="agency-buttons">
                <div class="btn-mini" onclick="alert('انضمام للوكالة يا سبع')">انضم للوكالة</div>
                <div class="btn-mini" onclick="alert('جاري إنشاء وكالتك الخاصة')">إنشاء وكالة</div>
                <div class="btn-mini" onclick="alert('اختر الوكالة الجديدة')">نقل لوكالة</div>
            </div>
        </div>

        <div class="menu-card">
            <div class="section-title"><i class="fas fa-shield-alt"></i> معلومات الحساب</div>
            <div class="info-row">
                <span>البريد المسجل:</span>
                <span id="userEmail" style="color: #00ffff;">qusai@example.com</span>
            </div>
            <div class="info-row">
                <span>رقم الهاتف:</span>
                <span style="color: #00ffff;">+90 5xx xxx xx</span>
            </div>
            <div style="display: flex; gap: 20px; margin-top: 12px;">
                <button class="btn-action" onclick="alert('سيصلك رمز التحقق على بريدك')">نسيت كلمة السر؟</button>
                <button class="btn-action" onclick="alert('تم حفظ البيانات بنجاح')">حفظ التغييرات</button>
            </div>
        </div>

        <div class="cash-box" onclick="alert('جاري مراجعة طلبات السحب...')">
            <h4><i class="fas fa-money-bill-wave"></i> سحب عبر شام كاش</h4>
            <span class="target-status">تم إغلاق 65% من التارجت الحالي (وحش!)</span>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <button class="btn-logout" onclick="handleLogout()">تسجيل خروج من الإمبراطورية</button>

    </div>

    <script>
        function updateImage(input, targetId, isBackground) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    if(isBackground) {
                        document.getElementById(targetId).style.backgroundImage = `url(${e.target.result})`;
                    } else {
                        document.getElementById(targetId).src = e.target.result;
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function handleLogout() {
            if (confirm("هل أنت متأكد من تسجيل الخروج يا أبو نمر؟")) {
                window.location.href = '/';
            }
        }

        window.onload = function() {
            // جلب البيانات من الـ LocalStorage إذا وجدت
            const savedName = localStorage.getItem('username');
            const savedEmail = localStorage.getItem('email');
            if(savedName) document.getElementById('displayName').innerText = savedName;
            if(savedEmail) document.getElementById('userEmail').innerText = savedEmail;
        }
    </script>
</body>
</html>
