<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 320px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: #2a2a2a; color: #fff; }
    button { width: 100%; padding: 12px; margin-top: 12px; border: none; border-radius: 8px; background: #7c3aed; color: #fff; font-weight: bold; cursor: pointer; }
    button:hover { background: #6d28d9; }
    a { color: #7c3aed; text-decoration: none; }
    .error { color: #ef4444; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>تسجيل الدخول</h2>
    <input id="email" type="email" placeholder="الايميل">
    <input id="password" type="password" placeholder="كلمة السر">
    <button onclick="login()">دخول</button>
    <p class="error" id="error"></p>
    <p>ما عندك حساب؟ <a href="/register.html">سجل حساب جديد</a></p>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      
      if (data.success) {
        window.location.href = '/';
      } else {
        document.getElementById('error').innerText = data.message;
      }
    }
  </script>
</body>
</html>
