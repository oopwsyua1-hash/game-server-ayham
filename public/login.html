<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0; 
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }
        h2 { 
            text-align: center; 
            color: #667eea;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
        .login-btn {
            background: linear-gradient(90deg, #4CAF50, #45a049);
            color: white;
        }
        .register-btn {
            background: linear-gradient(90deg, #ff00ff, #9d00ff);
            color: white;
        }
        .toggle {
            text-align: center;
            margin-top: 15px;
            color: #666;
            cursor: pointer;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="title">تسجيل الدخول</h2>
        <div class="error" id="error"></div>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="login-btn" id="submitBtn" onclick="submitForm()">دخول</button>
        <div class="toggle" onclick="toggleMode()">
            <span id="toggleText">ما عندك حساب؟ سجل الآن</span>
        </div>
    </div>

<script>
let isLogin = true;

function toggleMode() {
    isLogin = !isLogin;
    document.getElementById('title').innerText = isLogin ? 'تسجيل الدخول' : 'انشاء حساب';
    document.getElementById('submitBtn').innerText = isLogin ? 'دخول' : 'تسجيل';
    document.getElementById('toggleText').innerText = isLogin ? 'ما عندك حساب؟ سجل الآن' : 'عندك حساب؟ سجل دخول';
}

async function submitForm() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorDiv = document.getElementById('error');
    
    if (!username || !password) {
        errorDiv.innerText = 'ادخل الاسم وكلمة المرور';
        errorDiv.style.display = 'block';
        return;
    }
    
    const endpoint = isLogin ? '/api/login' : '/api/register';
    try {
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        
        if (data.success) {
            localStorage.setItem('token', data.token);
            window.location.href = '/me';
        } else {
            errorDiv.innerText = data.error || 'صار خطأ';
            errorDiv.style.display = 'block';
        }
    } catch (err) {
        errorDiv.innerText = 'خطأ في الاتصال';
        errorDiv.style.display = 'block';
    }
}

// لو عندك توكن صالح روح للملف مباشرة
window.addEventListener('load', async () => {
    const token = localStorage.getItem('token');
    if (token) {
        try {
            const res = await fetch('/api/profile', { 
                headers: { 'Authorization': 'Bearer ' + token } 
            });
            if (res.ok) {
                window.location.href = '/me';
            } else {
                localStorage.removeItem('token');
            }
        } catch {
            localStorage.removeItem('token');
        }
    }
});
</script>
</body>
</html>
