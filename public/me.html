<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a14; color: #fff; padding: 20px; text-align: center; }
        .profile-box { background: #141428; border: 2px solid #ff00ff; border-radius: 15px; padding: 30px; max-width: 400px; margin: 50px auto; }
        h1 { color: #ff00ff; }
        button { padding: 12px 30px; background: linear-gradient(90deg, #ff00ff, #9d00ff); border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="profile-box">
        <h1>اهلاً <span id="userName">...</span> 👋</h1>
        <p>نورت تطبيق السبع الحلبي</p>
        <button onclick="logout()">تسجيل خروج</button>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }

        fetch('/api/profile', {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('userName').textContent = data.user.username;
        })
        .catch(() => {
            localStorage.removeItem('token');
            window.location.href = '/';
        });

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }
    </script>
</body>
</html>
