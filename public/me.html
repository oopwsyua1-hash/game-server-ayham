<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملفي الشخصي - وكالة السبع</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #0a0a0a; color: #fff; }
        
        .back-btn {
            position: fixed; top: 15px; left: 15px; background: #333; 
            color: #fff; padding: 12px; border-radius: 50%; border: 2px solid gold; 
            cursor: pointer; z-index: 100; font-size: 18px;
        }
        
        .profile { max-width: 450px; margin: 0 auto; padding-bottom: 80px; }
        
        .cover { 
            width: 100%; height: 180px; background: #222; position: relative; 
            background-size: cover; background-position: center; 
            border-bottom: 3px solid gold;
        }
        .avatar { 
            width: 110px; height: 110px; border-radius: 50%; border: 4px solid gold; 
            position: absolute; bottom: -55px; right: 20px; background: #1a1a1a; 
            object-fit: cover; box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .info { margin-top: 70px; padding: 0 20px; text-align: center; }
        
        .username { 
            font-size: 26px; color: gold; margin: 10px 0; font-weight: bold;
            animation: pulseGold 2s infinite; text-shadow: 0 0 15px gold;
        }
        @keyframes pulseGold { 
            0%,100%{text-shadow:0 0 5px gold} 
            50%{text-shadow:0 0 20px gold, 0 0 30px gold} 
        }
        
        .userid { 
            font-size: 15px; font-weight: bold;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse 1.5s infinite, rainbow 3s linear infinite;
            background-size: 400% 400%; margin: 8px 0;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        @keyframes rainbow { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
        
        .bio { 
            margin: 15px auto; padding: 12px; background: #1a1a1a; border-radius: 10px;
            border: 1px solid #333; max-width: 90%;
            color: #00ff88; font-weight: bold;
            animation: slideText 10s linear infinite, pulse 2s infinite;
            white-space: nowrap; overflow: hidden;
        }
        @keyframes slideText { 
            0%{transform:translateX(100%)} 100%{transform:translateX(-100%)} 
        }
        
        .level-badge {
            display: inline-block; background: linear-gradient(45deg, #b8860b, #ffd700);
            color: #000; padding: 5px 15px; border-radius: 20px; 
            font-weight: bold; margin: 10px 0; font-size: 14px;
        }
        
        .stats { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin: 25px 20px; 
        }
        .stat { 
            background: #1a1a1a; padding: 15px; border-radius: 10px; 
            border: 1px solid #333; text-align: center;
        }
        .stat-num { font-size: 22px; color: gold; font-weight: bold; }
        .stat-label { font-size: 12px; color: #999; margin-top: 5px; }
        
        .edit-section { padding: 0 20px; margin-top: 20px; }
        .edit-btn { 
            width: 100%; padding: 14px; background: linear-gradient(45deg, #b8860b, #ffd700); 
            color: #000; border: none; border-radius: 10px; font-size: 16px; 
            font-weight: bold; cursor: pointer; margin: 10px 0;
        }
        .edit-btn:active { transform: scale(0.98); }
        
        #editForm { 
            background: #1a1a1a; padding: 15px; border-radius: 10px; 
            border: 1px solid #333; margin-top: 15px; display: none;
        }
        input, textarea { 
            width: 100%; padding: 12px; margin: 8px 0; background: #0a0a0a; 
            border: 1px solid #444; border-radius: 8px; color: #fff; 
            box-sizing: border-box; font-size: 14px;
        }
        input:focus, textarea:focus { border-color: gold; outline: none; }
        label { font-size: 13px; color: #999; margin-top: 10px; display: block; }
        .char-count { font-size: 11px; color: #666; text-align: left; }
        
        .error-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #ff3333; color: #fff; padding: 20px; border-radius: 10px;
            display: none; z-index: 10000; text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='/room.html'">⬅️</button>
    <div class="error-toast" id="errorToast"></div>
    
    <div class="profile">
        <div class="cover" id="coverPic">
            <img class="avatar" id="profilePic" src="">
        </div>
        
        <div class="info">
            <div class="username" id="username">جاري التحميل...</div>
            <div class="userid" id="userid">ID: ...</div>
            <div class="level-badge" id="levelBadge">ليفل 1</div>
            <div class="bio" id="bio">...</div>
            
            <div class="stats">
                <div class="stat">
                    <div class="stat-num" id="points">0</div>
                    <div class="stat-label">كونزات</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="wins">0</div>
                    <div class="stat-label">انتصارات</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="games">0</div>
                    <div class="stat-label">مباريات</div>
                </div>
            </div>
            
            <div class="edit-section">
                <button class="edit-btn" onclick="toggleEdit()">✏️ تعديل الملف الشخصي</button>
                
                <div id="editForm">
                    <label>السيرة الذاتية - 60 حرف</label>
                    <textarea id="editBio" maxlength="60" rows="2" placeholder="اكتب سيرتك..."></textarea>
                    <div class="char-count"><span id="bioCount">0</span>/60</div>
                    
                    <label>رابط الصورة الشخصية</label>
                    <input type="text" id="editProfilePic" placeholder="https://example.com/pic.jpg">
                    
                    <label>رابط صورة الغلاف</label>
                    <input type="text" id="editCoverPic" placeholder="https://example.com/cover.jpg">
                    
                    <button class="edit-btn" onclick="saveProfile()">💾 حفظ التعديلات</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const token = localStorage.getItem('token');
    
    if (!token) {
        window.location.href = '/login.html';
    }
    
    document.getElementById('editBio').addEventListener('input', function() {
        document.getElementById('bioCount').textContent = this.value.length;
    });
    
    async function loadProfile() {
        try {
            const res = await fetch('/api/profile', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            
            if (!res.ok) throw new Error('فشل تحميل الملف');
            
            const user = await res.json();
            
            document.getElementById('username').textContent = user.username;
            document.getElementById('userid').textContent = 'ID: ' + user._id.toString().slice(-5).toUpperCase();
            document.getElementById('bio').textContent = user.bio || 'لا يوجد سيرة ذاتية';
            document.getElementById('points').textContent = user.points || 0;
            document.getElementById('wins').textContent = user.wins || 0;
            document.getElementById('games').textContent = user.games || 0;
            document.getElementById('levelBadge').textContent = 'ليفل ' + user.level;
            
            if(user.profilePic) document.getElementById('profilePic').src = user.profilePic;
            if(user.coverPic) document.getElementById('coverPic').style.backgroundImage = `url(${user.coverPic})`;
            
            // تعبئة حقول التعديل
            document.getElementById('editBio').value = user.bio || '';
            document.getElementById('editProfilePic').value = user.profilePic || '';
            document.getElementById('editCoverPic').value = user.coverPic || '';
            document.getElementById('bioCount').textContent = (user.bio || '').length;
            
        } catch (error) {
            showError('خطأ بتحميل الملف الشخصي');
        }
    }
    
    function toggleEdit() {
        const form = document.getElementById('editForm');
        form.style.display = form.style.display === 'none'? 'block' : 'none';
    }
    
    async function saveProfile() {
        const bio = document.getElementById('editBio').value;
        const profilePic = document.getElementById('editProfilePic').value;
        const coverPic = document.getElementById('editCoverPic').value;
        
        try {
            const res = await fetch('/api/profile/update', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token 
                },
                body: JSON.stringify({ bio, profilePic, coverPic })
            });
            
            if (!res.ok) throw new Error('فشل الحفظ');
            
            showError('تم الحفظ بنجاح ✅');
            loadProfile();
            toggleEdit();
            
        } catch (error) {
            showError('خطأ بالحفظ');
        }
    }
    
    function showError(msg) {
        const toast = document.getElementById('errorToast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }
    
    loadProfile();
</script>
</body>
</html>
