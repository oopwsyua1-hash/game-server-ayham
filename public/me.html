<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا - CYBER CARDS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .top-bar {
            background: #fff;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #666;
        }
        .profile-header {
            background: #fff;
            padding: 15px;
        }
        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .user-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #FFD700;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #666;
            font-weight: bold;
        }
        .user-info .name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .user-info .id {
            font-size: 13px;
            color: #999;
        }
        .vip-tag {
            background: #e0e0e0;
            color: #666;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }
        .vip-tag.active {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #000;
        }
        .edit-profile {
            font-size: 13px;
            color: #999;
            cursor: pointer;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            text-align: center;
            padding: 10px 0;
        }
        .stat .num {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        .stat .label {
            font-size: 12px;
            color: #999;
            margin-top: 3px;
        }
        .club-banner {
            background: linear-gradient(90deg, #8B4513, #DAA520);
            margin: 15px;
            border-radius: 15px;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .club-banner .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .club-banner .peacock {
            font-size: 40px;
        }
        .menu-grid {
            background: #fff;
            margin: 15px;
            border-radius: 15px;
            padding: 20px 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            text-align: center;
        }
        .menu-grid-item i {
            font-size: 28px;
            margin-bottom: 8px;
            display: block;
            color: #999;
        }
        .menu-grid-item span {
            font-size: 13px;
            color: #666;
        }
        .wallet-row {
            background: #fff;
            margin: 15px;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .wallet-item {
            text-align: center;
        }
        .wallet-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .wallet-item .label {
            font-size: 13px;
            color: #999;
        }
        .feature-grid {
            background: #fff;
            margin: 15px;
            border-radius: 15px;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .feature-box {
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            background: #f8f8f8;
            color: #666;
        }
        .feature-box i { font-size: 20px; }
        .bottom-menu {
            background: #fff;
            margin: 15px;
            border-radius: 15px;
            overflow: hidden;
        }
        .bottom-menu-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            gap: 15px;
            cursor: pointer;
        }
        .bottom-menu-item:last-child { border-bottom: none; }
        .bottom-menu-item i { font-size: 20px; color: #666; }
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 8px 0;
            border-top: 1px solid #eee;
        }
        .nav-item {
            text-align: center;
            font-size: 11px;
            color: #999;
        }
        .nav-item.active { color: #4CAF50; }
        .nav-item i {
            font-size: 22px;
            display: block;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span id="location">غير محدد <i class="fas fa-map-marker-alt"></i></span>
        <span>الاتصال <i class="fas fa-signal"></i></span>
    </div>

    <div class="profile-header">
        <div class="user-row">
            <div class="user-left">
                <div class="avatar" id="avatar">?</div>
                <div class="user-info">
                    <div class="name">
                        <span id="username">...</span>
                        <span class="vip-tag" id="vipBadge">VIP 0</span>
                    </div>
                    <div class="id">ID:<span id="userId">...</span></div>
                </div>
            <div class="edit-profile" onclick="editProfile()">
                <span id="profilePercent">0%</span> <i class="fas fa-pen"></i>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat">
                <div class="num" id="visitors">0</div>
                <div class="label">زائر</div>
            </div>
            <div class="stat">
                <div class="num" id="followers">0</div>
                <div class="label">أتابع</div>
            </div>
            <div class="stat">
                <div class="num" id="following">0</div>
                <div class="label">التالية</div>
            </div>
            <div class="stat">
                <div class="num" id="friends">0</div>
                <div class="label">الأصدقاء</div>
            </div>
        </div>
    </div>

    <div class="club-banner">
        <div class="left">
            <div class="peacock">🦚</div>
            <div>
                <div style="font-weight:bold; font-size:16px;" id="clubName">لا يوجد نادي</div>
                <div style="font-size:12px; opacity:0.9;">انضم لنادي</div>
            </div>
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-grid-item">
            <i class="fas fa-shield-alt"></i>
            <span>عائلة</span>
        </div>
        <div class="menu-grid-item">
            <i class="fas fa-star"></i>
            <span>شارة</span>
        </div>
        <div class="menu-grid-item">
            <i class="fas fa-store"></i>
            <span>المتجر</span>
        </div>
        <div class="menu-grid-item">
            <i class="fas fa-crown"></i>
            <span>مستواي</span>
        </div>
    </div>

    <div class="wallet-row">
        <div class="wallet-item">
            <div class="value" id="beans">0</div>
            <div class="label">فول 🫘</div>
            <div style="font-size:11px; color:#999; margin-top:5px;">المصروفات</div>
        </div>
        <div style="width:1px; height:40px; background:#eee;"></div>
        <div class="wallet-item">
            <div class="value" id="coins">0</div>
            <div class="label">كونز 💰</div>
            <div style="font-size:11px; color:#999; margin-top:5px;">المحفظة</div>
        </div>
    </div>

    <div class="feature-grid">
        <div class="feature-box">
            <i class="fas fa-clipboard-check"></i>
            <span>مركز المهام</span>
        </div>
        <div class="feature-box">
            <i class="fas fa-user-tie"></i>
            <span>مركز الوكيل</span>
        </div>
        <div class="feature-box">
            <i class="fas fa-envelope"></i>
            <span>دعوة الأصدقاء</span>
        </div>
        <div class="feature-box">
            <i class="fas fa-coins"></i>
            <span>تاجر عملات</span>
        </div>
    </div>

    <div class="bottom-menu">
        <div class="bottom-menu-item">
            <i class="fas fa-question-circle"></i>
            <span>المساعدة</span>
        </div>
        <div class="bottom-menu-item">
            <i class="fas fa-plus-square"></i>
            <span>تابعنا</span>
        </div>
        <div class="bottom-menu-item" onclick="alert('قريباً: الاعدادات')">
            <i class="fas fa-cog"></i>
            <span>إعدادات</span>
        </div>
        <div class="bottom-menu-item" onclick="alert('قريباً: الحساب')">
            <i class="fas fa-user"></i>
            <span>الحساب</span>
        </div>
        <div class="bottom-menu-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            <span>تسجيل خروج</span>
        </div>
    </div>

    <div style="height:70px;"></div>

    <div class="nav-bar">
        <div class="nav-item active">
            <i class="fas fa-user"></i>
            <span>أنا</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-inbox"></i>
            <span>صندوق الوارد</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-compass"></i>
            <span>لقاء</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-home"></i>
            <span>حفلة</span>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        async function loadProfile() {
            try {
                const res = await fetch('/api/profile', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) {
                    localStorage.removeItem('token');
                    window.location.href = '/';
                    return;
                }
                const data = await res.json();
                
                document.getElementById('username').textContent = data.username;
                document.getElementById('avatar').textContent = data.username.charAt(0).toUpperCase();
                document.getElementById('userId').textContent = data._id.slice(-9).toUpperCase();
                document.getElementById('profilePercent').textContent = (data.profilePercent || 0) + '%';
                document.getElementById('followers').textContent = data.followers || 0;
                document.getElementById('following').textContent = data.following || 0;
                document.getElementById('friends').textContent = data.friends || 0;
                document.getElementById('visitors').textContent = data.visitors || 0;
                document.getElementById('coins').textContent = data.coins || 0;
                document.getElementById('beans').textContent = data.beans || 0;
                document.getElementById('location').firstChild.textContent = data.location || 'غير محدد ';
                
                if(data.vipLevel > 0) {
                    document.getElementById('vipBadge').textContent = 'VIP ' + data.vipLevel;
                    document.getElementById('vipBadge').classList.add('active');
                }
                
                if(data.clubName) {
                    document.getElementById('clubName').textContent = data.clubName;
                }

            } catch (err) {
                console.log('Error:', err);
            }
        }
        
        function editProfile() {
            window.location.href = '/edit-profile';
        }
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }
        
        loadProfile();
    </script>
</body>
</html>
