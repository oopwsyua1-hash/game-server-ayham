<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السبع الحلبي - بروفايلي</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 100%); color: #fff; min-height: 100vh; padding: 20px; }
.container { max-width: 500px; margin: 0 auto; }
.header { background: #141428; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 2px solid #ff00ff; box-shadow: 0 0 20px rgba(255,0,255,0.3); text-align: center; position: relative; }
.owner-glow { animation: ownerPulse 2s ease infinite; }
@keyframes ownerPulse { 0%, 100% { box-shadow: 0 0 20px #FFD700, 0 0 40px #ff00ff; } 50% { box-shadow: 0 0 40px #FFD700, 0 0 60px #ff00ff; } }

.avatar-container { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; }
.avatar { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(45deg, #ff00ff, #00ffff); display: flex; align-items: center; justify-content: center; border: 4px solid #FFD700; object-fit: cover; }

.edit-badge { position: absolute; bottom: 0; left: 0; background: #00ffff; color: #000; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid #141428; cursor: pointer; z-index: 10; }

.username { font-size: 24px; font-weight: bold; margin-bottom: 10px; color: #ff00ff; }
.level { display: inline-block; background: linear-gradient(45deg, #FFD700, #ff00ff); color: #000; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; margin: 5px; }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
.stat { background: #1a1a2e; padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; }
.stat-value { font-size: 24px; font-weight: bold; color: #00ffff; }
.stat-label { font-size: 12px; color: #aaa; margin-top: 5px; }
.btn { width: 100%; padding: 18px; background: linear-gradient(45deg, #ff00ff, #cc00cc); border: none; border-radius: 15px; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px 0; transition: 0.3s; }
.btn:hover { transform: scale(1.05); box-shadow: 0 0 20px #ff00ff; }
.btn-logout { background: linear-gradient(45deg, #ff0000, #cc0000); }
</style>
</head>
<body>

<input type="file" id="avatarFileInput" accept="image/*" style="display: none;">

<div class="container">
  <div class="header" id="header">
    <div class="avatar-container">
      <img class="avatar" id="avatar" src="https://via.placeholder.com/150" alt="👤">
      <div class="edit-badge" id="editAvatarBtn"><i class="fas fa-pen"></i></div>
    </div>
    <div class="username" id="username">جاري التحميل...</div>
    <div class="level" id="level">ID: ...</div>
    <div class="level" id="vip">VIP 0</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="coins">0</div>
      <div class="stat-label">العملات</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="diamonds">0</div>
      <div class="stat-label">الماس</div>
    </div>
  </div>

  <button class="btn" onclick="createRoom()">🎤 انشاء غرفة</button>
  <button class="btn btn-logout" onclick="logout()">تسجيل خروج</button>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) location.href = '/';

// دالة جلب البيانات المتوافقة مع الميدل وير والسيرفر الأصلي تبعك
function fetchUserData() {
    fetch('/api/profile', { 
        headers: { 'Authorization': 'Bearer ' + token } 
    })
    .then(r => r.json())
    .then(user => {
        if (user.error) {
            localStorage.removeItem('token');
            location.href = '/';
            return;
        }
        document.getElementById('username').textContent = user.username;
        document.getElementById('level').textContent = 'ID: ' + user.user_id;
        document.getElementById('vip').textContent = 'VIP ' + (user.vip_level || 0);
        document.getElementById('coins').textContent = user.coins;
        document.getElementById('diamonds').textContent = user.diamonds || 0;
        
        // عرض الصورة المرفوعة إذا كانت موجودة
        if (user.avatarUrl) {
            document.getElementById('avatar').src = user.avatarUrl;
        }

        if (user.role === 'ADMIN' || user.vip_level >= 10) {
            document.getElementById('header').classList.add('owner-glow');
            document.getElementById('avatar').classList.add('owner-avatar');
        }
    })
    .catch(() => { console.log("خطأ في الاتصال"); });
}

fetchUserData();

// عند الضغط على القلم يفتح الاستوديو مباشرة
document.getElementById('editAvatarBtn').addEventListener('click', function() {
    document.getElementById('avatarFileInput').click();
});

// تحويل الصورة المحددة ورفعها للسيرفر
document.getElementById('avatarFileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    if (file.size > 5 * 1024 * 1024) {
        alert('حجم الصورة كبير، اختر صورة أقل من 5 ميجا');
        return;
    }

    const reader = new FileReader();
    reader.onloadend = function() {
        const base64Image = reader.result;

        fetch('/api/profile/update', {
            method: 'PUT',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token 
            },
            body: JSON.stringify({ avatarUrl: base64Image })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert('تم تحديث صورتك الشخصية بنجاح! 🎉');
                fetchUserData(); 
            } else {
                alert('فشل حفظ الصورة: ' + data.error);
            }
        })
        .catch(() => alert('حدث خطأ أثناء الرفع'));
    };
    reader.readAsDataURL(file);
});

function createRoom() {
  const roomName = prompt("أدخل اسم الغرفة:");
  if(!roomName) return;
  fetch('/api/create-room', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ name: roomName })
  })
  .then(r => r.json())
  .then(data => {
      if(data.success) {
          location.href = '/room?roomId=' + data.room.room_id;
      } else {
          alert(data.error);
      }
  });
}
function logout() { localStorage.removeItem('token'); location.href = '/'; }
</script>
</body>
</html>
