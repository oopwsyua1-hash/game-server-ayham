<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملفي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma; background: #f5f5f5; margin: 0; padding: 0; }
      .cover { height: 200px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); position: relative; background-size: cover; background-position: center; }
      .cover button { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); color: #fff; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; backdrop-filter: blur(10px); }
      .header { display: flex; justify-content: space-between; align-items: flex-start; padding: 15px; margin-top: -80px; position: relative; z-index: 5; }

      .profile-left {
           display: flex;
           flex-direction: column;
           align-items: center;
           gap: 8px;
       }

      .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff00ff, #00ffff, #ff00ff, #9d00ff);
            background-size: 400% 400%;
            padding: 6px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255,0,255,0.5);
            animation: gradientMove 3s ease infinite, pulseGlow 2s ease-in-out infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 8px 25px rgba(255,0,255,0.5), 0 0 20px rgba(255,0,255,0.3); }
            50% { box-shadow: 0 8px 35px rgba(255,0,255,0.8), 0 0 40px rgba(0,255,255,0.5); }
        }

       .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #eee;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            color: #999;
            border: 3px solid #fff;
        }

       .avatar input {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 45px;
            height: 45px;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

       .avatar::after {
            content: '📸';
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: linear-gradient(135deg, #ff00ff, #9d00ff);
            border-radius: 50%;
            padding: 10px;
            font-size: 22px;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            pointer-events: none;
            animation: pulseIcon 1.5s ease-in-out infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

       .username-display {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 2s ease infinite, textPulse 2s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255,0,255,0.5);
        }

        @keyframes textPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

       .id-display {
            font-size: 14px;
            color: #666;
            font-weight: bold;
            background: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

      .stats {
           display: flex;
           gap: 12px;
           align-items: center;
           background: #fff;
           padding: 12px 15px;
           border-radius: 15px;
           box-shadow: 0 4px 15px rgba(0,0,0,0.1);
           margin-top: 30px;
       }
      .stat { text-align: center; }
      .stat-num { font-size: 16px; font-weight: bold; }
      .stat-label { font-size: 11px; color: #666; }
      .vip { background: #e0e0e0; padding: 4px 10px; border-radius: 15px; font-size: 12px; }

      .random-banner {
           background: linear-gradient(90deg,#c77700,#e89b00,#c77700);
           background-size: 200% 200%;
           padding: 18px;
           border-radius: 15px;
           margin: 15px;
           color: #fff;
           text-align: center;
           box-shadow: 0 4px 20px rgba(199,119,0,0.4);
           animation: gradientMove 3s ease infinite, bannerPulse 2s ease-in-out infinite;
       }

       @keyframes bannerPulse {
           0%, 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(199,119,0,0.4); }
           50% { transform: scale(1.02); box-shadow: 0 6px 30px rgba(199,119,0,0.6); }
       }

      .random-banner h3 {
           margin: 0;
           font-size: 20px;
           text-shadow: 0 2px 10px rgba(0,0,0,0.3);
       }

      .icons { display: grid; grid-template-columns: repeat(4,1fr); gap: 15px; text-align: center; margin: 20px 15px; }
      .icon-box { font-size: 24px; }
      .icon-label { font-size: 12px; margin-top: 5px; }
      .balance { display: flex; justify-content: space-around; margin: 20px 15px; }
      .balance-item { text-align: center; }
      .balance-num { font-size: 24px; font-weight: bold; }
      .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px; padding-bottom: 80px; }
      .card { background: #fff; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
      .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #ddd; z-index: 10; }
      .nav-item { text-align: center; font-size: 12px; }
      .nav-item.active { color: #4CAF50; }
        #editModal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; }
      .modal-content { background: #fff; margin: 50px 20px; padding: 20px; border-radius: 10px; }
      .modal-content input,.modal-content select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
      .modal-content button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; }
      .save-btn { background: #4CAF50; color: white; }
    </style>
</head>
<body>
    <div class="cover" id="coverDiv">
        <button onclick="document.getElementById('coverInput').click()">تغيير الغلاف</button>
        <input type="file" id="coverInput" accept="image/*" style="display:none">
    </div>

    <div class="header">
        <div class="stats">
            <div class="stat"><div class="stat-num">0</div><div class="stat-label">الأصدقاء</div></div>
            <div class="stat"><div class="stat-num">0</div><div class="stat-label">التالية</div></div>
            <div class="stat"><div class="stat-num">0</div><div class="stat-label">أتابع</div></div>
            <div class="stat"><div class="stat-num">0</div><div class="stat-label">زائر</div></div>
            <div class="vip">VIP 0</div>
        </div>

        <div class="profile-left">
            <div class="avatar" id="avatarDiv">
                <div class="avatar-inner" id="avatarInner">👤</div>
                <input type="file" id="avatarInput" accept="image/*">
            </div>
            <div class="username-display" id="usernameDisplay">...</div>
            <div class="id-display" id="userIdText">ID:...</div>
        </div>
    </div>

    <div style="text-align:center;margin:10px">
        <button onclick="openEdit()" style="background:linear-gradient(90deg, #ff00ff, #9d00ff);color:#fff;padding:12px 25px;border:none;border-radius:10px;font-size:16px;box-shadow:0 4px 15px rgba(255,0,255,0.4)">✏️ تعديل الملف</button>
    </div>

    <div class="random-banner">
        <h3 id="randomUsername">جاري التحميل...</h3>
        <p style="margin:5px 0 0;font-size:13px">مستخدم مميز</p>
    </div>

    <div class="icons">
        <div><div class="icon-box">👑</div><div class="icon-label">مستواي</div></div>
        <div><div class="icon-box">🏪</div><div class="icon-label">المتجر</div></div>
        <div><div class="icon-box">⭐</div><div class="icon-label">شارة</div></div>
        <div><div class="icon-box">🛡️</div><div class="icon-label">عائلة</div></div>
    </div>

    <div class="balance">
        <div class="balance-item">
            <div class="balance-num" id="coinsNum">0</div>
            <div>💰 كونز</div>
            <div style="font-size:11px;color:#999">المحفظة</div>
        </div>
        <div class="balance-item">
            <div class="balance-num">0</div>
            <div>🫘 فول</div>
            <div style="font-size:11px;color:#999">المصروفات</div>
        </div>
    </div>

    <div class="cards">
        <div class="card" onclick="window.location.href='/agent'">👔 مركز الوكيل</div>
        <div class="card">✅ مركز المهام</div>
        <div class="card">🪙 تاجر عملات</div>
        <div class="card">✉️ دعوة الأصدقاء</div>
    </div>

    <div class="nav">
        <div class="nav-item">🏠<br>حفلة</div>
        <div class="nav-item">🎯<br>لقاء</div>
        <div class="nav-item">📦<br>صندوق الوارد</div>
        <div class="nav-item active">👤<br>أنا</div>
    </div>

    <div id="editModal">
        <div class="modal-content">
            <h3>تعديل الملف</h3>
            <input id="editUsername" placeholder="اسم المستخدم">
            <input id="editLastName" placeholder="الكنية">
            <input id="editCountry" placeholder="الدولة">
            <input id="editBirthDate" type="date" placeholder="تاريخ الميلاد">
            <select id="editGender">
                <option value="ذكر">ذكر</option>
                <option value="أنثى">أنثى</option>
            </select>
            <button class="save-btn" onclick="saveEdit()">حفظ</button>
            <button onclick="closeEdit()">اغلاق</button>
        </div>
    </div>

<script>
let currentUser = {};

async function loadMyData() {
  const token = localStorage.getItem('token');
  if (!token) return window.location.href = '/';
  const res = await fetch('/api/profile', { headers: { 'Authorization': 'Bearer ' + token } });
  const data = await res.json();
  if (data.user) {
    currentUser = data.user;
    document.getElementById('userIdText').innerText = 'ID: ' + (data.user.userId || 'غير متوفر');
    document.getElementById('usernameDisplay').innerText = data.user.username;
    document.getElementById('coinsNum').innerText = data.user.coins || 0;
    if (data.user.avatar) {
        document.getElementById('avatarInner').style.backgroundImage = `url(${data.user.avatar})`;
        document.getElementById('avatarInner').innerText = '';
    } else {
        document.getElementById('avatarInner').innerText = '👤';
    }
    if (data.user.cover) document.getElementById('coverDiv').style.backgroundImage = `url(${data.user.cover})`;
  }
}

async function loadRandomUser() {
  const saved = localStorage.getItem('randomUser');
  const savedTime = localStorage.getItem('randomUserTime');
  const now = new Date().getTime();
  if (!saved ||!savedTime || now - savedTime > 12 * 60 * 60 * 1000) {
    const res = await fetch('/api/random-user');
    const data = await res.json();
    localStorage.setItem('randomUser', data.username);
    localStorage.setItem('randomUserTime', now);
    document.getElementById('randomUsername').innerText = data.username;
  } else {
    document.getElementById('randomUsername').innerText = saved;
  }
}

function openEdit() {
  document.getElementById('editUsername').value = currentUser.username || '';
  document.getElementById('editLastName').value = currentUser.lastName || '';
  document.getElementById('editCountry').value = currentUser.country || '';
  document.getElementById('editBirthDate').value = currentUser.birthDate || '';
  document.getElementById('editGender').value = currentUser.gender || 'ذكر';
  document.getElementById('editModal').style.display = 'block';
}

function closeEdit() {
  document.getElementById('editModal').style.display = 'none';
}

async function saveEdit() {
  const token = localStorage.getItem('token');
  const res = await fetch('/api/profile', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({
      username: document.getElementById('editUsername').value,
      lastName: document.getElementById('editLastName').value,
      country: document.getElementById('editCountry').value,
      birthDate: document.getElementById('editBirthDate').value,
      gender: document.getElementById('editGender').value
    })
  });
  const data = await res.json();
  alert(data.msg || data.error);
  closeEdit();
  loadMyData();
}

document.getElementById('avatarInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('avatar', file);
  const token = localStorage.getItem('token');
  const res = await fetch('/api/upload-avatar', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token },
    body: formData
  });
  const data = await res.json();
  if (data.success) loadMyData();
  else alert(data.error);
});

document.getElementById('coverInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('cover', file);
  const token = localStorage.getItem('token');
  const res = await fetch('/api/upload-cover', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token },
    body: formData
  });
  const data = await res.json();
  if (data.success) loadMyData();
  else alert(data.error);
});

loadMyData();
loadRandomUser();
</script>
</body>
</html>
