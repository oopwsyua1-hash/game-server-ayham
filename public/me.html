<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بروفايلي - CYBER CARDS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
        }
        .user-info h1 {
            font-size: 28px;
            margin-bottom: 5px;
            color: #00ffff;
        }
        .rank {
            display: inline-block;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: #00ffff;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-box .value {
            font-size: 32px;
            font-weight: bold;
            color: #00ffff;
            margin-bottom: 5px;
        }
        .stat-box .label {
            font-size: 14px;
            color: #aaa;
        }
        .details {
            margin-top: 30px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .logout-btn {
            width: 100%;
            padding: 15px;
            margin-top: 30px;
            background: linear-gradient(45deg, #ff0080, #ff8c00);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 20px;
            color: #00ffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div id="loading" class="loading">جاري تحميل البروفايل...</div>
            
            <div id="profile-content" style="display: none;">
                <div class="header">
                    <div class="avatar" id="avatar">?</div>
                    <div class="user-info">
                        <h1 id="username">...</h1>
                        <span class="rank" id="rank">مبتدئ</span>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat-box">
                        <div class="value" id="points">0</div>
                        <div class="label">النقاط</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" id="wins">0</div>
                        <div class="label">الفوز</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" id="games">0</div>
                        <div class="label">الألعاب</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" id="level">1</div>
                        <div class="label">الليفل</div>
                    </div>
                </div>

                <div class="details">
                    <div class="detail-row">
                        <span>الإيميل:</span>
                        <span id="email">...</span>
                    </div>
                    <div class="detail-row">
                        <span>البلد:</span>
                        <span id="country">...</span>
                    </div>
                    <div class="detail-row">
                        <span>العمر:</span>
                        <span id="age">...</span>
                    </div>
                    <div class="detail-row">
                        <span>عضو منذ:</span>
                        <span id="createdAt">...</span>
                    </div>
                    <div class="detail-row">
                        <span>آخر ظهور:</span>
                        <span id="lastSeen">...</span>
                    </div>
                </div>

                <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/';
        } else {
            loadProfile();
        }

        async function loadProfile() {
            try {
                const res = await fetch('/api/profile', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!res.ok) {
                    localStorage.removeItem('token');
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('profile-content').style.display = 'block';
                
                document.getElementById('username').textContent = data.username + ' ' + (data.lastName || '');
                document.getElementById('avatar').textContent = data.username.charAt(0).toUpperCase();
                document.getElementById('rank').textContent = data.rank;
                document.getElementById('points').textContent = data.points;
                document.getElementById('wins').textContent = data.wins;
                document.getElementById('games').textContent = data.games;
                document.getElementById('level').textContent = data.level;
                document.getElementById('email').textContent = data.email;
                document.getElementById('country').textContent = data.country || 'غير محدد';
                document.getElementById('age').textContent = data.age || 'غير محدد';
                document.getElementById('createdAt').textContent = new Date(data.createdAt).toLocaleDateString('ar');
                document.getElementById('lastSeen').textContent = new Date(data.lastSeen).toLocaleString('ar');

            } catch (err) {
                console.log('Error:', err);
                document.getElementById('loading').textContent = 'خطأ بتحميل البروفايل';
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }
    </script>
</body>
</html>
