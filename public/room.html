<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة السبع</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0a0a0f; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .room-header { background: linear-gradient(135deg, #a855f7, #3b82f6); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .room-info h2 { font-size: 16px; margin-bottom: 3px; cursor: pointer; }
        .room-info h2:hover { text-decoration: underline; }
        .room-id-box { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.3); padding: 3px 8px; border-radius: 8px; }
        .room-id { font-size: 13px; font-weight: bold; }
        .copy-id { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 2px 6px; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .header-actions { display: flex; gap: 5px; }
        .header-btn { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .agency-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background: rgba(0,0,0,0.4); font-size: 12px; }
        .agency-left { display: flex; align-items: center; gap: 8px; }
        .agency-avatar { width: 32px; height: 32px; border-radius: 6px; border: 2px solid gold; object-fit: cover; }
        .lv-badge { background: #a855f7; padding: 2px 6px; border-radius: 10px; font-size: 10px; }
        .mics-wrapper { flex: 1; padding: 12px; overflow-y: auto; }
        .mics-grid { display: grid; gap: 8px; justify-items: center; }
        .mics-grid[data-layout="4*1"] { grid-template-columns: repeat(4, 1fr); }
        .mics-grid[data-layout="4*2"] { grid-template-columns: repeat(4, 1fr); }
        .mics-grid[data-layout="4*3"] { grid-template-columns: repeat(4, 1fr); }
        .mics-grid[data-layout="4*4"] { grid-template-columns: repeat(4, 1fr); }
        .mics-grid[data-layout="4*5"] { grid-template-columns: repeat(4, 1fr); }
        .mics-grid[data-layout="6*1"] { grid-template-columns: repeat(6, 1fr); }
        .mics-grid[data-layout="6*2"] { grid-template-columns: repeat(6, 1fr); }
        .mics-grid[data-layout="6*3"] { grid-template-columns: repeat(6, 1fr); }
        .mic-seat { position: relative; width: 100%; max-width: 70px; aspect-ratio: 3/4; cursor: pointer; }
        .mic-bg { width: 100%; height: 100%; background: url('https://i.imgur.com/YxQz5Zx.png') center/contain no-repeat; position: relative; }
        .mic-ring { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 70%; aspect-ratio: 1; border-radius: 50%; background: conic-gradient(from 0deg, #ff00ff, #00ffff, #ff00ff); padding: 2px; }
        .mic-ring.locked { background: conic-gradient(from 0deg, #555, #888, #555); }
        .mic-ring.muted { opacity: 0.4; }
        .mic-ring.speaking { animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(168,85,247,0.7); } 50% { box-shadow: 0 0 0 8px rgba(168,85,247,0); } }
        .mic-ring-inner { width: 100%; height: 100%; border-radius: 50%; background: #0a0a0f; display: flex; align-items: center; justify-content: center; }
        .mic-avatar { width: 90%; height: 90%; border-radius: 50%; object-fit: cover; }
        .mic-icon { font-size: 22px; color: #fff; }
        .mic-emoji { position: absolute; top: -10px; right: -5px; font-size: 22px; animation: bounce 0.5s; filter: drop-shadow(0 0 4px #000); z-index: 10; }
        @keyframes bounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
        .mic-name { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); font-size: 9px; background: rgba(0,0,0,0.7); padding: 1px 5px; border-radius: 8px; white-space: nowrap; max-width: 95%; overflow: hidden; text-overflow: ellipsis; }
        .mic-number { position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #aaa; }
        .mute-icon { position: absolute; top: 5px; left: 5px; font-size: 14px; }
        .bottom-panel { background: rgba(10,10,15,0.98); border-top: 2px solid #2a2a3e; }
        .stats-row { display: flex; justify-content: space-between; padding: 8px 15px; font-size: 12px; align-items: center; }
        .online-badge { background: linear-gradient(45deg, #ff00ff, #00ffff); padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        .control-btn { background: #1a1a2e; border: 2px solid #a855f7; border-radius: 8px; color: #fff; padding: 6px 12px; cursor: pointer; font-size: 13px; }
        .chat-container { display: none; flex-direction: column; max-height: 180px; }
        .chat-container.show { display: flex; }
        .chat-box { flex: 1; overflow-y: auto; padding: 8px 15px; font-size: 12px; border-top: 1px solid #2a2a3e; }
        .chat-msg { margin: 4px 0; }
        .chat-name { color: #a855f7; font-weight: bold; }
        .chat-input-row { display: flex; gap: 5px; padding: 8px 10px; border-top: 1px solid #2a2a3e; }
        .chat-input-row input { flex: 1; padding: 8px; background: #1a1a2e; border: 1px solid #a855f7; border-radius: 8px; color: #fff; font-size: 12px; }
        .chat-input-row button { padding: 8px 15px; background: #a855f7; border: none; border-radius: 8px; color: #fff; cursor: pointer; }
        .control-menu { display: none; position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: #1a1a2e; border: 2px solid #a855f7; border-radius: 15px; padding: 12px; z-index: 999; width: 90%; max-width: 400px; box-shadow: 0 0 25px rgba(168,85,247,0.7); }
        .control-menu.show { display: block; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .menu-item { background: #0a0a0f; border: 1px solid #2a2a3e; border-radius: 10px; padding: 12px 5px; text-align: center; cursor: pointer; transition: 0.2s; }
        .menu-item:hover { background: #a855f7; transform: scale(1.05); }
        .menu-item.active { background: #ef4444; border-color: #ef4444; }
        .menu-item-icon { font-size: 24px; display: block; margin-bottom: 4px; }
        .menu-item-text { font-size: 11px; }
        .user-menu { position: fixed; background: #1a1a2e; border: 2px solid #a855f7; border-radius: 12px; padding: 8px; display: none; z-index: 9999; min-width: 170px; box-shadow: 0 0 25px rgba(168,85,247,0.7); }
        .user-menu button { width: 100%; padding: 11px; background: #0a0a0f; border: none; color: #fff; text-align: right; cursor: pointer; margin: 3px 0; border-radius: 8px; font-size: 13px; }
        .user-menu button:hover { background: #a855f7; }
        .user-menu button.danger { background: #ef4444; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; overflow-y: auto; }
        .modal-content { background: #1a1a2e; margin: 20px; padding: 20px; border-radius: 15px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 18px; font-weight: bold; }
        .close-btn { background: #ef4444; border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        .setting-group { margin: 20px 0; padding: 15px; background: #0a0a0f; border-radius: 10px; }
        .setting-group input, .setting-group select { width: 100%; padding: 12px; background: #0a0a0f; color: #fff; border: 2px solid #a855f7; border-radius: 8px; }
        .save-btn { width: 100%; padding: 14px; background: linear-gradient(90deg, #ff00ff, #00ffff); border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .emoji-picker { display: none; grid-template-columns: repeat(6, 1fr); gap: 8px; padding: 10px; background: #0a0a0f; border-radius: 10px; margin-top: 10px; }
        .emoji-picker.show { display: grid; }
        .emoji-option { font-size: 28px; cursor: pointer; text-align: center; padding: 5px; border-radius: 8px; }
        .emoji-option:hover { background: #a855f7; }
    </style>
</head>
<body>
    <div class="room-header">
        <div class="room-info">
            <h2 id="roomName" onclick="showRenameModal()">غرفة علب</h2>
            <div class="room-id-box">
                <span>ID:</span>
                <span class="room-id" id="roomIdText">0</span>
                <button class="copy-id" onclick="copyRoomId()">نسخ</button>
            </div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="showSettings()">⚙️ اعدادات</button>
            <button class="header-btn" onclick="leaveRoom()">🚪 خروج</button>
        </div>
    </div>

    <div class="agency-bar">
        <div class="agency-left">
            <img src="https://i.imgur.com/KjQP8vL.jpg" class="agency-avatar" id="agencyAvatar">
            <span id="agencyName">وكالة السبع لتسجيل المضيفات</span>
            <span class="lv-badge">Lv.16</span>
        </div>
        <div>🔥 10</div>
    </div>

    <div class="mics-wrapper">
        <div class="mics-grid" id="micsGrid" data-layout="4*3"></div>
    </div>

    <div class="bottom-panel">
        <div class="stats-row">
            <div class="online-badge"><span id="onlineCount">0</span> 👥</div>
            <button class="control-btn" onclick="toggleControlMenu()">≡ قائمة التحكم</button>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="chat-box" id="chatBox"></div>
            <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">ارسال</button>
            </div>
        </div>
    </div>

    <div class="control-menu" id="controlMenu">
        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <div id="userMenu" class="user-menu"></div>

    <!-- مودال الاعدادات -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>اعدادات الغرفة</span>
                <button class="close-btn" onclick="closeModal('settingsModal')">×</button>
            </div>
            <div class="setting-group">
                <label>عدد مقاعد المايك</label>
                <select id="micLayoutSelect">
                    <option value="4*1">4*1 مقعد</option>
                    <option value="4*2">4*2 مقعد</option>
                    <option value="4*3">4*3 مقعد</option>
                    <option value="4*4">4*4 مقعد</option>
                    <option value="4*5">4*5 مقعد</option>
                    <option value="6*1">6*1 مقعد</option>
                    <option value="6*2">6*2 مقعد</option>
                    <option value="6*3">6*3 مقعد</option>
                </select>
            </div>
            <button class="save-btn" onclick="saveSettings()">حفظ</button>
        </div>
    </div>

    <!-- مودال تغيير الاسم -->
    <div id="renameModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>تغيير اسم الغرفة</span>
                <button class="close-btn" onclick="closeModal('renameModal')">×</button>
            </div>
            <div class="setting-group">
                <input type="text" id="newRoomName" placeholder="اسم الغرفة الجديد" maxlength="30">
            </div>
            <button class="save-btn" onclick="saveRoomName()">حفظ الاسم</button>
        </div>
    </div>

    <script>
        const socket = io();
        const token = localStorage.getItem('token');
        const roomId = Number(window.location.pathname.split('/').pop());
        let myUserId = null, myUserData = null, roomData = null, isOwner = false, isAdmin = false;
        let localStream = null, isMicOn = false, isMuted = false;
        let audioPlayer = null;

        if (!token) location.href = '/';
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

        function copyRoomId() {
            navigator.clipboard.writeText(roomId);
            alert('تم نسخ ايدي الغرفة: ' + roomId);
        }

        async function init() {
            const meRes = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } });
            myUserData = await meRes.json();
            myUserId = myUserData.userId;

            const roomRes = await fetch(`/api/room/${roomId}`);
            roomData = await roomRes.json();
            isOwner = roomData.ownerId === myUserId;
            isAdmin = roomData.admins.includes(myUserId);

            document.getElementById('roomName').textContent = roomData.name;
            document.getElementById('roomIdText').textContent = roomData.roomId;
            if(roomData.avatar) document.getElementById('agencyAvatar').src = roomData.avatar;

            renderMics(roomData.mics, roomData.micLayout);
            renderControlMenu();
            socket.emit('join-room', { roomId, userId: myUserId, token });
        }

        function renderMics(mics, layout) {
            const grid = document.getElementById('micsGrid');
            grid.setAttribute('data-layout', layout || '4*3');
            grid.innerHTML = '';
            mics.forEach((mic) => {
                const seat = document.createElement('div');
                seat.className = 'mic-seat';
                let ringContent = mic.userId
                ? `<img src="${mic.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(mic.username)}" class="mic-avatar">`
                    : mic.locked? `<div class="mic-icon">🔒</div>` : `<div class="mic-icon">+</div>`;
                seat.innerHTML = `
                    <div class="mic-bg">
                        <div class="mic-ring ${mic.locked? 'locked' : ''} ${mic.muted? 'muted' : ''}" id="ring-${mic.seat}">
                            <div class="mic-ring-inner">${ringContent}</div>
                        </div>
                        ${mic.muted? '<div class="mute-icon">🔇</div>' : ''}
                        ${mic.userId? `<div class="mic-name">${mic.username}</div>` : ''}
                        ${mic.emoji? `<div class="mic-emoji">${mic.emoji}</div>` : ''}
                        <div class="mic-number">${mic.seat}</div>
                    </div>
                `;
                seat.onclick = (e) => handleMicClick(mic, e);
                grid.appendChild(seat);
            });
        }

        function renderControlMenu() {
            const grid = document.getElementById('menuGrid');
            const myMic = roomData.mics.find(m => m.userId === myUserId);
            let items = [];

            // للكل
            items.push({ icon: '💬', text: 'الدردشة', action: 'toggleChat' });

            // للي قاعد عالمايك
            if (myMic) {
                items.push({ icon: '🎤', text: isMicOn ? 'ايقاف مايكي' : 'تشغيل مايكي', action: 'toggleMic', active: isMicOn });
                items.push({ icon: '🔇', text: isMuted ? 'الغاء الكتم' : 'كتم مايكي', action: 'toggleMute', active: isMuted });
                items.push({ icon: '😂', text: 'ايموجي', action: 'showEmojiPicker' });
            }

            // للادمن وصاحب الغرفة
            if (isOwner || isAdmin) {
                items.push({ icon: '🎵', text: 'موسيقى', action: 'playMusic' });
                items.push({ icon: '🔒', text: 'قفل مايك', action: 'lockMicMode' });
                items.push({ icon: '🚫', text: 'طرد من المايك', action: 'kickMode' });
            }

            // لصاحب الغرفة بس
            if (isOwner) {
                items.push({ icon: '⭐', text: 'اضافة ادمن', action: 'addAdminMode' });
            }

            grid.innerHTML = items.map(item => `
                <div class="menu-item ${item.active ? 'active' : ''}" onclick="${item.action}()">
                    <span class="menu-item-icon">${item.icon}</span>
                    <span class="menu-item-text">${item.text}</span>
                </div>
            `).join('');
        }

        function toggleControlMenu() {
            document.getElementById('controlMenu').classList.toggle('show');
        }

        function toggleChat() {
            document.getElementById('chatContainer').classList.toggle('show');
            toggleControlMenu();
        }

        async function toggleMic() {
            const myMic = roomData.mics.find(m => m.userId === myUserId);
            if (!myMic) return alert('اصعد عالمايك اول');
            
            if (!isMicOn) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    isMicOn = true;
                    document.getElementById(`ring-${myMic.seat}`)?.classList.add('speaking');
                    renderControlMenu();
                } catch (err) {
                    alert('الرجاء السماح بالوصول للمايك');
                }
            } else {
                localStream?.getTracks().forEach(track => track.stop());
                isMicOn = false;
                document.getElementById(`ring-${myMic.seat}`)?.classList.remove('speaking');
                renderControlMenu();
            }
            toggleControlMenu();
        }

        function toggleMute() {
            const myMic = roomData.mics.find(m => m.userId === myUserId);
            if (!myMic) return;
            socket.emit('mute-user', { roomId, ownerId: myUserId, targetUserId: myUserId });
            isMuted = !isMuted;
            renderControlMenu();
            toggleControlMenu();
        }

        function showEmojiPicker() {
            const emojis = ['😂','😍','😭','😡','❤️','💋','🚬','🤝','👏','🔥','🥰','😎'];
            const picker = document.createElement('div');
            picker.className = 'emoji-picker show';
            picker.innerHTML = emojis.map(e => `<div class="emoji-option" onclick="sendEmoji('${e}')">${e}</div>`).join('');
            document.querySelector('.control-menu').appendChild(picker);
            setTimeout(() => picker.remove(), 5000);
        }

        function playMusic() {
            alert('قريباً: تشغيل موسيقى للكل 🎵');
            toggleControlMenu();
        }

        function lockMicMode() {
            alert('اضغط على كرسي فاضي عشان تقفلو');
            toggleControlMenu();
        }

        function kickMode() {
            alert('اضغط على شخص بالمايك عشان تطردو');
            toggleControlMenu();
        }

        function addAdminMode() {
            alert('اضغط على شخص بالمايك عشان تعينو ادمن');
            toggleControlMenu();
        }

        function handleMicClick(mic, e) {
            e.stopPropagation();
            const menu = document.getElementById('userMenu');
            let html = '';

            if (mic.userId) {
                const isMe = mic.userId === myUserId;
                if (isMe) {
                    html += `<button onclick="leaveMic()">⬇️ نزول من المايك</button>`;
                } else {
                    html += `<button onclick="followUser(${mic.userId})">➕ متابعة</button>`;
                    if (isOwner || isAdmin) {
                        html += `<button class="danger" onclick="kickUser(${mic.userId})">🚫 طرد</button>`;
                        html += `<button class="danger" onclick="muteUser(${mic.userId})">🔇 كتم الصوت</button>`;
                        if (isOwner) html += `<button onclick="makeAdmin(${mic.userId})">⭐ اضافة ادمن</button>`;
                    }
                }
            } else {
                if (!mic.locked) {
                    html += `<button onclick="sitOnMic(${mic.seat})">⬆️ اصعد</button>`;
                }
                if (isOwner || isAdmin) {
                    html += `<button onclick="lockMic(${mic.seat})">${mic.locked? '🔓 فتح المايك' : '🔒 اغلاق مايك'}</button>`;
                }
            }

            menu.innerHTML = html;
            menu.style.display = 'block';
            menu.style.top = e.pageY + 'px';
            menu.style.left = e.pageX + 'px';
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.user-menu') && !e.target.closest('.mic-seat')) {
                document.getElementById('userMenu').style.display = 'none';
            }
            if (!e.target.closest('.control-menu') && !e.target.closest('.control-btn')) {
                document.getElementById('controlMenu').classList.remove('show');
            }
        });

        function sitOnMic(seat) { socket.emit('sit-mic', { roomId, seat, userId: myUserId }); document.getElementById('userMenu').style.display = 'none'; }
        function leaveMic() { 
            if(isMicOn) toggleMic();
            socket.emit('leave-mic', { roomId, userId: myUserId }); 
            document.getElementById('userMenu').style.display = 'none';
        }
        function kickUser(userId) { socket.emit('kick-user', { roomId, ownerId: myUserId, targetUserId: userId }); document.getElementById('userMenu').style.display = 'none'; }
        function lockMic(seat) { socket.emit('lock-mic', { roomId, seat, userId: myUserId }); document.getElementById('userMenu').style.display = 'none'; }
        function muteUser(userId) { socket.emit('mute-user', { roomId, ownerId: myUserId, targetUserId: userId }); document.getElementById('userMenu').style.display = 'none'; }
        function makeAdmin(userId) { socket.emit('make-admin', { roomId, ownerId: myUserId, targetUserId: userId }); document.getElementById('userMenu').style.display = 'none'; }
        function followUser(userId) { alert('تمت المتابعة'); document.getElementById('userMenu').style.display = 'none'; }
        function sendEmoji(emoji) { 
            socket.emit('send-emoji', { roomId, userId: myUserId, emoji }); 
            document.querySelector('.emoji-picker')?.remove();
            toggleControlMenu();
        }
        function leaveRoom() { location.href = '/me'; }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (msg) {
                socket.emit('chat-message', { roomId, userId: myUserId, username: myUserData.username, message: msg });
                input.value = '';
            }
        }

        function showSettings() {
            if (!isOwner) return alert('فقط صاحب الغرفة');
            document.getElementById('micLayoutSelect').value = roomData.micLayout;
            document.getElementById('settingsModal').style.display = 'block';
        }
        function showRenameModal() {
            if (!isOwner) return;
            document.getElementById('newRoomName').value = roomData.name;
            document.getElementById('renameModal').style.display = 'block';
        }
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }
        async function saveSettings() {
            const layout = document.getElementById('micLayoutSelect').value;
            await fetch('/api/room-settings', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomId: Number(roomId), micLayout: layout })
            });
            closeModal('settingsModal');
        }
        async function saveRoomName() {
            const newName = document.getElementById('newRoomName').value.trim();
            if (!newName) return alert('اكتب اسم');
            await fetch('/api/room-rename', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomId: Number(roomId), name: newName })
            });
            closeModal('renameModal');
        }

        socket.on('mic-updated', (mics) => {
            roomData.mics = mics;
            renderMics(mics, roomData.micLayout);
            renderControlMenu();
        });

        socket.on('room-updated', (newRoom) => {
            roomData = newRoom;
            document.getElementById('roomName').textContent = newRoom.name;
            renderMics(newRoom.mics, newRoom.micLayout);
        });

        socket.on('chat-message', (data) => {
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<span class="chat-name">${data.username}:</span> ${data.message}`;
            document.getElementById('chatBox').appendChild(div);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        });

        socket.on('user-kicked', (data) => {
            if (data.userId === myUserId) {
                if(isMicOn) toggleMic();
                alert('تم طردك من المايك');
            }
        });

        socket.on('admin-added', (data) => {
            if (data.userId === myUserId) {
                isAdmin = true;
                alert('تم تعيينك ادمن');
                renderControlMenu();
            }
        });

        socket.on('online-count', (count) => {
            document.getElementById('onlineCount').textContent = count;
        });

        init();
    </script>
</body>
</html>
