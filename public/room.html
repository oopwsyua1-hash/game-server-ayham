<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وكالة السبع الحلبي</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',Tahoma}
body{overflow:hidden;background:#000}

/* الدخولية الذهبية 13 ثانية فيديو */
.entry-video-overlay{position:fixed;inset:0;background:#000;z-index:99999;display:flex;align-items:center;justify-content:center}
.entry-video-overlay.hide{display:none}
.entry-video-overlay video{width:100%;height:100%;object-fit:cover;opacity:0.5}
.entry-video-info{position:absolute;display:flex;flex-direction:column;align-items:center;gap:20px;z-index:10}
.entry-video-info img{width:200px;height:200px;border-radius:50%;border:8px solid gold;box-shadow:0 0 60px gold,0 0 100px #ff6b00;animation:avatarEntry 13s ease-in-out}
@keyframes avatarEntry{0%{transform:scale(0) rotate(0deg)}10%{transform:scale(1.2) rotate(360deg)}90%{transform:scale(1.1)}100%{transform:scale(1);opacity:0}}
.entry-text{text-align:center}
.entry-crown{font-size:100px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.entry-name{font-size:60px;font-weight:900;color:gold;text-shadow:0 0 30px gold,0 0 60px #ff6b00}
.entry-vip{font-size:40px;color:#fff;background:linear-gradient(45deg,gold,#ff6b00);padding:10px 30px;border-radius:30px;display:inline-block;margin:10px 0}
.entry-title{font-size:35px;color:#fff;text-shadow:0 0 20px #fff}

#agency{width:100vw;height:100vh;background:url('https://i.ibb.co/7jXqZ4J/lion-bg.jpg') center/cover;position:relative}

.top-bar{position:absolute;top:0;width:100%;padding:15px 20px;background:linear-gradient(180deg,rgba(0,0,0,0.8),transparent);display:flex;justify-content:space-between;align-items:center;z-index:100}
.speaker-btn{width:45px;height:45px;background:linear-gradient(45deg,#ffa500,#ff6b00);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:3px solid gold}
.top-center{text-align:center;color:#fff}
.top-center .title{font-size:14px;opacity:0.8}
.top-center .id-lv{background:rgba(0,0,0,0.6);padding:5px 15px;border-radius:20px;margin-top:5px;display:inline-block}
.top-right{width:80px;height:80px;border:4px solid gold;border-radius:15px;overflow:hidden}
.top-right img{width:100%;height:100%;object-fit:cover}

.seats-area{position:absolute;top:120px;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:repeat(4,1fr);gap:15px;width:90%;max-width:600px}
.gold-seat{aspect-ratio:1;background:url('https://i.ibb.co/3cqJXqZ/gold-seat.png') center/contain no-repeat;position:relative;display:flex;align-items:center;justify-content:center}
.seat-circle{width:65%;height:65%;border-radius:50%;border:4px solid;animation:rainbowBorder 3s linear infinite;position:relative;overflow:hidden;background:rgba(0,0,0,0.5)}
@keyframes rainbowBorder{0%{border-color:#ff0000}16%{border-color:#ff7f00}33%{border-color:#ffff00}50%{border-color:#00ff00}66%{border-color:#0000ff}83%{border-color:#4b0082}100%{border-color:#9400d3}}
.seat-circle.locked::after{content:'🔒';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:35px;background:rgba(0,0,0,0.7)}
.seat-circle.empty::after{content:'+';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:50px;color:gold}
.seat-circle img{width:100%;height:100%;object-fit:cover}
.seat-num{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);background:gold;color:#000;padding:2px 8px;border-radius:10px;font-weight:900;font-size:12px}

.stats-bar{position:absolute;top:380px;left:50%;transform:translateX(-50%);display:flex;gap:20px;align-items:center}
.people-count{background:rgba(139,0,139,0.8);padding:10px 20px;border-radius:25px;border:2px solid #ff00ff;color:#fff;font-weight:bold;display:flex;align-items:center;gap:8px}
.ranking{display:flex;gap:5px}
.rank-badge{width:45px;height:45px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;border:3px solid}
.rank-1{background:linear-gradient(45deg,gold,#ff6b00);border-color:gold}
.rank-2{background:linear-gradient(45deg,#c0c0c0,#808080);border-color:silver}
.rank-3{background:linear-gradient(45deg,#cd7f32,#8b4513);border-color:#cd7f32}

.owner-frame{position:absolute;bottom:180px;left:50%;transform:translateX(-50%);width:300px;height:300px}
.wreath{position:absolute;inset:0;background:url('https://i.ibb.co/0jZqX4J/wreath.png') center/contain no-repeat;animation:rotateSlow 20s linear infinite}
@keyframes rotateSlow{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.owner-photo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70%;height:70%;border-radius:50%;overflow:hidden;border:5px solid gold;box-shadow:0 0 40px gold}
.owner-photo img{width:100%;height:100%;object-fit:cover}

.welcome-box{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:85%;background:rgba(0,0,0,0.85);padding:15px;border-radius:15px;border:2px solid gold;text-align:center;color:gold}

.bottom-bar{position:fixed;bottom:0;width:100%;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.95));padding:15px;display:flex;justify-content:space-around;align-items:center}
.bottom-btn{width:55px;height:55px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:28px;border:none;cursor:pointer}
.btn-gift{background:linear-gradient(45deg,#ff6b00,#ff0000)}
.btn-party{background:linear-gradient(45deg,#ff00ff,#9400d3)}
.btn-chat{background:linear-gradient(45deg,#00bfff,#0080ff)}
.btn-mic{background:linear-gradient(45deg,#808080,#404040)}
.btn-speaker{background:linear-gradient(45deg,#808080,#404040)}

.settings-btn{position:fixed;top:15px;left:15px;background:linear-gradient(45deg,gold,#ff6b00);border:none;padding:12px 25px;border-radius:25px;font-weight:900;color:#000;cursor:pointer;z-index:200;box-shadow:0 0 20px gold}
</style>
</head>
<body>

<div id="entryVideoOverlay" class="entry-video-overlay hide">
  <video id="entryVideo" autoplay muted loop>
    <source src="" type="video/mp4">
  </video>
  <div class="entry-video-info">
    <img id="entryAvatar" src="">
    <div class="entry-text">
      <div class="entry-crown">👑</div>
      <div class="entry-name" id="entryName">السبع الحلبي</div>
      <div class="entry-vip">VIP <span id="entryVipId">777</span></div>
      <div class="entry-title">دخل الوكالة</div>
    </div>
  </div>
</div>

<div id="agency">
  <button class="settings-btn" onclick="toggleSettings()">⚙️ اعدادات الوكالة</button>

  <div class="top-bar">
    <div class="speaker-btn">📢</div>
    <div class="top-center">
      <div class="title">للتسجيل المضيفات</div>
      <div class="id-lv">Lv.16 💎 <span id="vipId">000</span> ID</div>
    </div>
    <div class="top-right">
      <img src="https://i.ibb.co/3cqJXqZ/frame.png" alt="frame">
    </div>
  </div>

  <div class="seats-area" id="seatsArea"></div>

  <div class="stats-bar">
    <div class="people-count">
      <span>👥</span>
      <span id="peopleCount">0</span>
    </div>
    <div class="ranking">
      <div class="rank-badge rank-1">1</div>
      <div class="rank-badge rank-2">2</div>
      <div class="rank-badge rank-3">3</div>
    </div>
  </div>

  <div class="owner-frame">
    <div class="wreath"></div>
    <div class="owner-photo">
      <img id="ownerImg" src="https://ui-avatars.com/api/?name=السبع&background=a855f7&color=fff" alt="المالك">
    </div>
  </div>

  <div class="welcome-box">
    <div class="emoji">😊</div>
    <div class="text">مرحباً بكم في وكالة السبع الحلبي! نتمنى لكم أوقات طيبة<br>سيتم الابلاغ وحظر أي مستخدم يخالف لوائح التطبيق</div>
  </div>

  <div class="bottom-bar">
    <button class="bottom-btn btn-gift">🎁</button>
    <button class="bottom-btn btn-party">🎉</button>
    <button class="bottom-btn btn-chat">💬</button>
    <button class="bottom-btn btn-mic">🎤</button>
    <button class="bottom-btn btn-speaker">🔊</button>
  </div>
</div>

<script>
const socket = io();
const userId = localStorage.getItem('userId');
const token = localStorage.getItem('token');
const urlParams = new URLSearchParams(window.location.search);
const ownerId = urlParams.get('owner') || userId;
const roomId = `room_${ownerId}`;
let roomData = {};

if(!token) location.href = '/login';

if(userId === ownerId) {
  socket.emit('create-room', {userId});
} else {
  socket.emit('join-room', {roomId, userId});
}

socket.on('golden-entry-video', (data) => {
  const overlay = document.getElementById('entryVideoOverlay');
  const video = document.getElementById('entryVideo');
  const avatar = document.getElementById('entryAvatar');
  const name = document.getElementById('entryName');
  const vipId = document.getElementById('entryVipId');
  
  video.src = data.videoUrl;
  avatar.src = data.avatar;
  name.textContent = data.username;
  vipId.textContent = data.vipId;
  
  overlay.classList.remove('hide');
  video.play();
  
  setTimeout(() => {
    overlay.classList.add('hide');
    video.pause();
    video.src = '';
  }, data.duration);
});

socket.on('room-data', (data) => {
  roomData = data;
  updateUI();
});

socket.on('room-update', (data) => {
  roomData = data;
  updateUI();
});

function updateUI() {
  if(roomData.ownerData) {
    document.getElementById('vipId').textContent = roomData.ownerData.vipId;
    document.getElementById('ownerImg').src = roomData.ownerData.avatar || `https://ui-avatars.com/api/?name=${roomData.ownerData.username}&background=a855f7&color=fff`;
  }
  document.getElementById('peopleCount').textContent = roomData.members?.size || 0;
  renderSeats();
}

function renderSeats() {
  const area = document.getElementById('seatsArea');
  area.innerHTML = '';
  const seats = roomData.seats || 12;
  
  for(let i=1; i<=seats; i++) {
    const seat = document.createElement('div');
    seat.className = 'gold-seat';
    const circle = document.createElement('div');
    circle.className = 'seat-circle empty';
    if([8,10,11].includes(i)) circle.className = 'seat-circle locked';
    seat.appendChild(circle);
    seat.innerHTML += `<div class="seat-num">${i}</div>`;
    area.appendChild(seat);
  }
}

function toggleSettings(){alert('اعدادات الوكالة')}
</script>
</body>
</html>
