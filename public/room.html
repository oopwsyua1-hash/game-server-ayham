<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غرفة السبع الحلبي</title>
<script src="/socket.io/socket.io.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0a0a14; color: #fff; padding-bottom: 70px; }
.entry-screen {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background: #000;
  z-index: 9999; display: none; justify-content: center; align-items: center;
  overflow: hidden;
}
.entry-video {
  width: 100vw; height: 100vh; object-fit: cover;
  position: absolute; top: 0; left: 0;
  opacity: 0.75;
  filter: blur(1px);
}
.entry-text {
  color: #FFD700; font-size: 36px; font-weight: bold;
  text-shadow: 0 0 30px #FFD700, 0 0 60px #ff00ff;
  animation: textPulse 1s infinite; z-index: 10;
  position: relative;
}
@keyframes textPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }
.header { background: linear-gradient(90deg, #141428, #1a1a2e); padding: 15px; border-bottom: 3px solid #ff00ff; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 10px rgba(255,0,255,0.3); position: relative; z-index: 100; }
.header h1 { color: #ff00ff; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px #ff00ff; }
.header span { cursor: pointer; transition: 0.3s; }
.header span:hover { color: #ff00ff; }
.lion-container { text-align: center; padding: 20px 0; background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%); position: relative; z-index: 100; }
.lion-img { width: 120px; height: 120px; border-radius: 50%; animation: lionPulse 2.5s ease infinite; filter: drop-shadow(0 0 20px #FFD700); border: 3px solid #FFD700; object-fit: cover; }
@keyframes lionPulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px #FFD700); border-color: #FFD700; } 50% { transform: scale(1.2); filter: drop-shadow(0 0 35px #FFD700) drop-shadow(0 0 50px #ff00ff); border-color: #ff00ff; } }
.owner-badge { display: inline-block; background: linear-gradient(45deg, #FFD700, #ff00ff); color: #000; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 10px; animation: badgeGlow 2s ease infinite; }
@keyframes badgeGlow { 0%, 100% { box-shadow: 0 0 10px #FFD700; } 50% { box-shadow: 0 0 20px #ff00ff; } }
.reactions { display: flex; justify-content: center; gap: 15px; padding: 15px; background: #141428; margin: 0 15px; border-radius: 15px; border: 1px solid #ff00ff; position: relative; z-index: 100; }
.reaction-btn { font-size: 30px; cursor: pointer; transition: transform 0.2s; background: none; border: none; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
.reaction-btn:hover { transform: scale(1.4) rotate(10deg); }
.mics-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; max-width: 550px; margin: 0 auto; position: relative; z-index: 100; }
.mic { aspect-ratio: 1; background: #1a1a2e; border-radius: 12px; border: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; font-size: 10px; transition: all 0.3s; }
.mic:hover { border-color: #ff00ff; transform: translateY(-3px); }
.mic.taken { border-color: #a855f7; background: #2d1b4e; box-shadow: 0 0 10px #a855f7; }
.mic.owner { border-color: #FFD700; background: linear-gradient(135deg, #4a3c00, #2d1b4e); box-shadow: 0 0 20px #FFD700; animation: ownerGlow 2s ease infinite; }
.mic.closed { border-color: #ff0000; background: #3a1a1a; opacity: 0.4; cursor: not-allowed; }
@keyframes ownerGlow { 0%, 100% { box-shadow: 0 0 15px #FFD700; } 50% { box-shadow: 0 0 30px #FFD700, 0 0 40px #ff00ff; } }
.mic-icon { font-size: 22px; margin-bottom: 4px; }
.mic-name { font-size: 9px; text-align: center; max-width: 100%; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 3px; }
.mic-number { position: absolute; top: 3px; left: 3px; font-size: 10px; color: #666; background: rgba(0,0,0,0.5); padding: 1px 4px; border-radius: 5px; }
.users-list { background: #141428; margin: 15px; border-radius: 15px; padding: 15px; max-height: 250px; overflow-y: auto; border: 1px solid #ff00ff; position: relative; z-index: 100; }
.users-list h3 { margin-bottom: 12px; color: #ff00ff; font-size: 15px; }
.user-item { padding: 10px; border-bottom: 1px solid #1a1a2e; display: flex; justify-content: space-between; align-items: center; font-size: 13px; transition: 0.3s; }
.user-item:hover { background: rgba(255,0,255,0.1); }
.user-item:last-child { border-bottom: none; }
.user-level { color: #00ffff; font-size: 11px; font-weight: bold; }
.user-vip { color: #FFD700; font-size: 11px; margin-right: 5px; }
.admin-actions { display: flex; gap: 6px; }
.admin-btn { padding: 5px 10px; background: linear-gradient(45deg, #ff0000, #cc0000); border: none; border-radius: 6px; color: white; font-size: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
.admin-btn:hover { transform: scale(1.1); box-shadow: 0 0 10px #ff0000; }
.footer { position: fixed; bottom: 0; width: 100%; background: #141428; border-top: 3px solid #ff00ff; display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; box-shadow: 0 -2px 10px rgba(255,0,255,0.3); }
.footer-btn { background: none; border: none; color: #aaa; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.3s; }
.footer-btn:hover { color: #ff00ff; transform: translateY(-3px); }
.footer-btn.active { color: #ff00ff; }
.footer-btn-icon { font-size: 22px; }
</style>
</head>
<body>
<div class="entry-screen" id="entryScreen">
  <video class="entry-video" id="entryVideo" playsinline autoplay></video>
  <div class="entry-text" id="entryText"></div>
</div>

<div class="header">
  <span onclick="location.href='/me'">← رجوع</span>
  <h1>🎤 غرفة السبع الحلبي - 20 مايك</h1>
  <span>👥 <span id="userCount">0</span></span>
</div>

<div class="lion-container">
  <img class="lion-img" src="https://i.imgur.com/8QJZQxG.png" alt="السبع الحلبي">
  <div class="owner-badge">👑 ادارة عامة 10000 TOP</div>
</div>

<div class="reactions" id="reactions" style="display:none">
  <button class="reaction-btn" onclick="sendReaction('😂')">😂</button>
  <button class="reaction-btn" onclick="sendReaction('❤️')">❤️</button>
  <button class="reaction-btn" onclick="sendReaction('😍')">😍</button>
  <button class="reaction-btn" onclick="sendReaction('🎉')">🎉</button>
  <button class="reaction-btn" onclick="sendReaction('😢')">😢</button>
</div>

<div class="mics-grid" id="micsGrid"></div>

<div class="users-list">
  <h3>المتواجدين (<span id="totalUsers">0</span>)</h3>
  <div id="usersList"></div>
</div>

<div class="footer">
  <button class="footer-btn" onclick="scrollToUsers()">
    <span class="footer-btn-icon">👥</span>
    <span>المتواجدين</span>
  </button>
  <button class="footer-btn">
    <span class="footer-btn-icon">🛡️</span>
    <span>الادمن</span>
  </button>
  <button class="footer-btn" onclick="logout()">
    <span class="footer-btn-icon">🚪</span>
    <span>خروج</span>
  </button>
  <button class="footer-btn" onclick="location.href='/me'">
    <span class="footer-btn-icon">➕</span>
    <span>انشاء غرفة</span>
  </button>
  <button class="footer-btn" id="micBtn">
    <span class="footer-btn-icon">🎤</span>
    <span>صعود مايك</span>
  </button>
</div>

<script>
const socket = io();
const token = localStorage.getItem('token');
const urlParams = new URLSearchParams(window.location.search);
const roomId = urlParams.get('roomId') || '10000';
let myUser = null;
let currentRoom = null;
let myMicIndex = -1;

if (!token) { alert('لازم تسجل دخول اول'); location.href = '/'; }

socket.emit('joinRoom', { roomId, token });

socket.on('ownerEntry', (data) => {
  const screen = document.getElementById('entryScreen');
  const video = document.getElementById('entryVideo');
  const text = document.getElementById('entryText');

  video.src = data.video;
  video.muted = false;
  video.loop = false;
  video.playsInline = true;
  video.controls = false;
  text.textContent = data.text;
  screen.style.display = 'flex';

  video.play().catch(e => {
    video.muted = true;
    video.play().then(() => {
      setTimeout(() => { video.muted = false; }, 800);
    });
  });

  setTimeout(() => {
    screen.style.display = 'none';
    video.pause();
    video.src = '';
  }, data.duration * 1000);
});

socket.on('roomUpdate', (room) => {
  currentRoom = room;
  updateMics(room.mics);
  updateUsers(room.users);
  document.getElementById('userCount').textContent = room.users.length;
  document.getElementById('totalUsers').textContent = room.users.length;
});

function updateMics(mics) {
