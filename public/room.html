<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>إمبراطورية السبع - التحكم بالمايكات</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #1a0000, #4a0000);
      color: #fff; font-family: 'Cairo', sans-serif;
      overflow: hidden; height: 100vh; display: flex; flex-direction: column;
    }

    /* لوحة الإعدادات */
    #settingsPanel {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #111; border: 2px solid #FFD700; border-radius: 15px;
      padding: 20px; z-index: 10001; display: none; width: 80%; text-align: center;
    }
    .settings-btn {
      background: #FFD700; color: #000; border: none; padding: 10px;
      margin: 5px; border-radius: 5px; cursor: pointer; font-weight: bold;
    }

    /* شبكة المايكات المرنة */
    .mics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* الافتراضي 4 بالعرض */
      gap: 10px; padding: 15px; flex-shrink: 0;
      max-height: 50vh; overflow-y: auto;
    }
    .mic {
      background: #1a1a2e; border-radius: 12px; border: 2px solid #FFD700;
      height: 85px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; position: relative;
    }
    .mic-number {
      position: absolute; top: 5px; left: 5px; background: #FFD700;
      color: #000; border-radius: 50%; width: 18px; height: 18px;
      font-size: 10px; display: flex; align-items: center; justify-content: center;
    }
    .mic img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #FFD700; }
    .mic-name { font-size: 9px; margin-top: 5px; color: #FFD700; }

    /* الشات */
    .chat-box {
      flex-grow: 1; background: rgba(0,0,0,0.5);
      border-top: 2px solid #FFD700; margin-top: 10px;
      display: flex; flex-direction: column;
    }
    #chatMessages { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
    .chat-input { display: flex; padding: 10px; background: #000; }
    .chat-input input { flex: 1; background: #111; border: 1px solid #FFD700; color: #fff; border-radius: 20px; padding: 8px 15px; }
    .chat-input button { background: none; border: none; font-size: 22px; cursor: pointer; margin-left: 10px; }
  </style>
</head>
<body>

  <!-- الهيدر مع زر الإعدادات -->
  <div style="padding:15px; display:flex; justify-content:space-between; align-items:center; background:#000;">
    <div style="color:#FFD700; font-weight:bold;">👑 إمبراطورية السبع</div>
    <button onclick="toggleSettings()" style="background:none; border:none; color:#FFD700; font-size:20px;">⚙️</button>
  </div>

  <!-- لوحة التحكم بالمايكات -->
  <div id="settingsPanel">
    <h3 style="color:#FFD700; margin-bottom:15px;">إعدادات المايكات</h3>
    <button class="settings-btn" onclick="updateMicsCount(6)">6 مايكات</button>
    <button class="settings-btn" onclick="updateMicsCount(8)">8 مايكات</button>
    <button class="settings-btn" onclick="updateMicsCount(10)">10 مايكات</button>
    <button class="settings-btn" onclick="updateMicsCount(20)">20 مايك</button>
    <button class="settings-btn" onclick="updateMicsCount(30)">30 مايك</button>
    <br><br>
    <button onclick="toggleSettings()" style="color:#fff; background:red; border:none; padding:5px 15px; border-radius:5px;">إغلاق</button>
  </div>

  <!-- شبكة المايكات -->
  <div class="mics-grid" id="micsGrid"></div>

  <!-- الشات -->
  <div class="chat-box">
    <div id="chatMessages"></div>
    <div class="chat-input">
      <button onclick="alert('قريباً')">🎁</button>
      <input id="chatInput" placeholder="اكتب رسالة للإمبراطورية...">
      <button onclick="sendChat()" style="color:#FFD700; font-size:16px;">إرسال</button>
    </div>
  </div>

<script>
const socket = io();
let currentMics = 8; // العدد الافتراضي

function drawMics(count) {
  const grid = document.getElementById('micsGrid');
  grid.innerHTML = '';
  // تعديل التوزيع حسب العدد
  if (count > 10) grid.style.gridTemplateColumns = 'repeat(5, 1fr)';
  else grid.style.gridTemplateColumns = 'repeat(4, 1fr)';

  for (let i = 0; i < count; i++) {
    grid.innerHTML += `
      <div class="mic" id="mic${i}">
        <div class="mic-number">${i+1}</div>
        <div style="font-size:30px">🎤</div>
        <div class="mic-name">فارغ</div>
      </div>`;
  }
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}

function updateMicsCount(count) {
  currentMics = count;
  drawMics(count);
  toggleSettings();
  // إرسال التحديث للسيرفر ليعرف الجميع بتغيير العدد
  socket.emit('adminChangeMics', { count }); 
}

// البدء بـ 8 مايكات
drawMics(8);

socket.on('roomUpdate', (data) => {
  // تحديث البيانات على المايكات الموجودة فقط
  data.mics.forEach((micUser, i) => {
    const mic = document.getElementById(`mic${i}`);
    if (mic && micUser && micUser !== 'closed') {
      mic.innerHTML = `<div class="mic-number">${i+1}</div><img src="${micUser.avatar}"><div class="mic-name">${micUser.username}</div>`;
    }
  });
});

function sendChat() {
  const input = document.getElementById('chatInput');
  if (input.value.trim()) {
    socket.emit('sendMessage', { roomId: 'VIP-10000', text: input.value });
    input.value = '';
  }
}

socket.on('newMessage', (msg) => {
  const chat = document.getElementById('chatMessages');
  chat.innerHTML += `<div><span style="color:#FFD700;">${msg.username}:</span> ${msg.text}</div>`;
  chat.scrollTop = chat.scrollHeight;
});
</script>
</body>
</html>
