<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غرفة السبع الحلبي</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a0000, #4a0000);
      font-family: 'Cairo', sans-serif;
      color: #FFD700;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* دخول المالك فل سكرين */
   .entry-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #000;
      z-index: 9999; display: none; justify-content: center; align-items: center;
      overflow: hidden;
    }
   .entry-video {
      width: 100vw; height: 100vh; object-fit: cover;
      position: absolute; top: 0; left: 0;
      opacity: 0.75;
      filter: blur(1px);
    }
   .entry-text {
      color: #FFD700; font-size: 36px; font-weight: bold;
      text-shadow: 0 0 30px #FFD700, 0 0 60px #ff00ff;
      animation: textPulse 1s infinite; z-index: 10;
      position: relative;
    }
    @keyframes textPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

   .room-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 10px;
      position: relative;
    }

   .room-header {
      background: rgba(0,0,0,0.6);
      border: 2px solid #FFD700;
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      margin-bottom: 15px;
      backdrop-filter: blur(5px);
    }

   .room-title {
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 0 10px #FFD700;
    }

    /* تثبيت المايكات 100% */
   .mics-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
      padding: 15px;
      max-width: 550px;
      margin: 0 auto;
      position: relative;
      z-index: 100;
      width: 100%;
      height: 420px; /* ارتفاع ثابت */
      min-height: 420px; /* منع التصغير */
      max-height: 420px; /* منع التكبير */
    }

   .mic-slot {
      background: rgba(0,0,0,0.5);
      border: 2px solid #FFD700;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 100%; /* ياخد كامل حجم الخلية */
      min-height: 90px; /* ارتفاع ثابت لكل مايك */
      max-height: 90px;
    }

   .mic-slot:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #FFD700;
    }

   .mic-slot.taken {
      background: rgba(255,215,0,0.2);
      border-color: #ff00ff;
    }

   .mic-slot.closed {
      background: rgba(255,0,0,0.3);
      border-color: #ff0000;
      cursor: not-allowed;
    }

   .mic-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 2px solid #FFD700;
      object-fit: cover;
      margin-bottom: 5px;
    }

   .mic-name {
      font-size: 10px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      font-weight: bold;
    }

   .mic-level {
      font-size: 8px;
      color: #ff00ff;
      margin-top: 2px;
    }

   .mic-number {
      position: absolute;
      top: 2px;
      left: 2px;
      background: #FFD700;
      color: #000;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

   .users-list {
      background: rgba(0,0,0,0.6);
      border: 2px solid #FFD700;
      border-radius: 15px;
      padding: 10px;
      margin-top: 15px;
      max-height: 200px;
      overflow-y: auto;
    }

   .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid rgba(255,215,0,0.3);
    }

   .admin-btn {
      background: linear-gradient(45deg, #ff0000, #ff6600);
      border: none;
      color: white;
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 10px;
      cursor: pointer;
      margin: 0 2px;
    }

   .reaction {
      position: absolute;
      font-size: 30px;
      animation: floatUp 2s ease-out forwards;
      pointer-events: none;
      z-index: 1000;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

   .kicked-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,0,0,0.9);
      color: white;
      padding: 20px;
      border-radius: 15px;
      font-size: 20px;
      z-index: 10000;
      display: none;
    }
  </style>
</head>
<body>
  <!-- شاشة دخول المالك -->
  <div class="entry-screen" id="entryScreen">
    <video class="entry-video" id="entryVideo" playsinline autoplay></video>
    <div class="entry-text" id="entryText"></div>
  </div>

  <!-- رسالة الطرد -->
  <div class="kicked-msg" id="kickedMsg">تم طردك من الغرفة 👢</div>

  <div class="room-container">
    <div class="room-header">
      <div class="room-title">👑 غرفة السبع الحلبي الرسمية</div>
      <div id="roomId">Room: VIP-10000</div>
    </div>

    <!-- شبكة المايكات الثابتة 5x4 = 20 -->
    <div class="mics-grid" id="micsGrid"></div>

    <!-- قائمة المستخدمين -->
    <div class="users-list">
      <div style="text-align:center;font-weight:bold;margin-bottom:10px;">المستخدمين بالغرفة</div>
      <div id="usersList"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io();
    const roomId = 'VIP-10000';
    const token = localStorage.getItem('token');
    let myUser = JSON.parse(localStorage.getItem('user') || '{}');
    let isOwner = myUser.email === 'm1234ahmad@gmail.com';
    let currentRoom = null;

    if (!token) location.href = '/';

    // انشاء 20 مايك ثابت
    const micsGrid = document.getElementById('micsGrid');
    for (let i = 0; i < 20; i++) {
      const mic = document.createElement('div');
      mic.className = 'mic-slot';
      mic.dataset.index = i;
      mic.innerHTML = `
        <div class="mic-number">${i + 1}</div>
        <div style="font-size:24px;">🎤</div>
        <div class="mic-name">فارغ</div>
      `;
      mic.onclick = () => takeMic(i);
      micsGrid.appendChild(mic);
    }

    // دخول الغرفة
    socket.emit('joinRoom', { roomId, token });

    // دخول المالك
    socket.on('ownerEntry', (data) => {
      const screen = document.getElementById('entryScreen');
      const video = document.getElementById('entryVideo');
      const text = document.getElementById('entryText');

      video.src = data.video;
      video.muted = false;
      video.loop = false;
      video.playsInline = true;
      video.controls = false;
      text.textContent = data.text;
      screen.style.display = 'flex';

      const playPromise = video.play();
      if (playPromise!== undefined) {
        playPromise.catch(() => {
          video.muted = true;
          video.play().then(() => {
            setTimeout(() => { video.muted = false; }, 500);
          });
        });
      }

      setTimeout(() => {
        screen.style.display = 'none';
        video.pause();
        video.src = '';
      }, data.duration * 1000);
    });

    // تحديث الغرفة
    socket.on('roomUpdate', (room) => {
      currentRoom = room;
      updateMics(room);
      updateUsers(room);
    });

    // تحديث المايكات بدون تحريك
    function updateMics(room) {
      const slots = document.querySelectorAll('.mic-slot');
      slots.forEach((slot, i) => {
        const micUserId = room.mics[i];
        slot.className = 'mic-slot';
        slot.innerHTML = `<div class="mic-number">${i + 1}</div>`;

        if (micUserId === 'closed') {
          slot.classList.add('closed');
          slot.innerHTML += `<div style="font-size:24px;">🔒</div><div class="mic-name">مغلق</div>`;
        } else if (micUserId) {
          const user = room.users.find(u => u.socketId === micUserId);
          if (user) {
            slot.classList.add('taken');
            slot.innerHTML += `
              <img class="mic-avatar" src="https://i.imgur.com/8QJZQxG.png" alt="lion">
              <div class="mic-name">${user.username}</div>
              <div class="mic-level">${user.level}</div>
            `;
            slot.onclick = () => {
              if (user.userId === myUser._id) leaveMic();
              else if (isOwner) sendReaction(i);
            };
          }
        } else {
          slot.innerHTML += `<div style="font-size:24px;">🎤</div><div class="mic-name">فارغ</div>`;
          slot.onclick = () => takeMic(i);
        }
      });
    }

    function updateUsers(room) {
      const list = document.getElementById('usersList');
      list.innerHTML = '';
      room.users.forEach(u => {
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `
          <span>${u.username} - ${u.level}</span>
          ${isOwner && u.userId!== myUser._id? `
            <div>
              <button class="admin-btn" onclick="adminAction('KICK','${u.userId}')">طرد</button>
              <button class="admin-btn" onclick="adminAction('CLOSE_MIC','${u.userId}')">قفل مايك</button>
            </div>
          ` : ''}
        `;
        list.appendChild(div);
      });
    }

    function takeMic(index) {
      socket.emit('takeMic', { roomId, micIndex: index });
    }

    function leaveMic() {
      socket.emit('leaveMic', { roomId });
    }

    function adminAction(action, targetUserId) {
      socket.emit('adminAction', { action, targetUserId, roomId });
    }

    function sendReaction(micIndex) {
      const emojis = ['👑','🔥','❤️','⚡','💎'];
      const emoji = emojis[Math.floor(Math.random() * emojis.length)];
      socket.emit('sendReaction', { roomId, micIndex, emoji });
    }

    socket.on('reaction', ({ micIndex, emoji }) => {
      const slot = document.querySelectorAll('.mic-slot')[micIndex];
      const react = document.createElement('div');
      react.className = 'reaction';
      react.textContent = emoji;
      react.style.left = Math.random() * 60 + 20 + '%';
      slot.appendChild(react);
      setTimeout(() => react.remove(), 2000);
    });

    socket.on('kicked', () => {
      document.getElementById('kickedMsg').style.display = 'block';
      setTimeout(() => location.href = '/', 2000);
    });
  </script>
</body>
</html>
