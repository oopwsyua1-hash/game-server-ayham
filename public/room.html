<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وكالة السبع السوري</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #0a0a0a; color: #fff; overflow: hidden; }
        
        /* دخولية المالك */
        .owner-entry { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 9999; display: none; 
            justify-content: center; align-items: center; flex-direction: column;
        }
        .owner-entry video { width: 80%; max-width: 600px; border: 3px solid gold; border-radius: 10px; }
        .owner-entry-text { 
            font-size: 28px; color: gold; margin-top: 20px; 
            animation: pulse 1s infinite; text-shadow: 0 0 20px gold;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        
        /* الشريط العلوي */
        .top-bar { 
            background: linear-gradient(90deg, #1a1a1a, #2a2a2a); 
            padding: 10px; display: flex; justify-content: space-between; 
            border-bottom: 2px solid gold; align-items: center;
        }
        .room-info { display: flex; align-items: center; gap: 10px; }
        .room-name { font-size: 18px; color: gold; font-weight: bold; }
        .room-id { background: #333; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
        .heat { color: #ff6b6b; font-weight: bold; }
        .users-count { background: #333; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
        
        /* كرسي الملك */
        .king-chair { 
            text-align: center; padding: 15px; 
            background: linear-gradient(180deg, #1a1a1a, #0a0a0a);
            position: relative; height: 160px;
        }
        .king-img { 
            width: 80px; height: 80px; border-radius: 50%; 
            border: 3px solid gold; box-shadow: 0 0 20px gold;
            animation: breathe 3s infinite; object-fit: cover;
        }
        @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .king-name { color: gold; font-size: 20px; margin-top: 10px; text-shadow: 0 0 10px gold; }
        
        /* المايكات 20 مايك 4x5 */
        .mics-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 8px; padding: 10px; max-width: 400px; margin: 0 auto;
        }
        .mic { 
            background: #1a1a1a; border: 2px solid #444; border-radius: 10px; 
            padding: 8px; text-align: center; position: relative; 
            height: 85px; cursor: pointer; transition: all 0.3s;
        }
        .mic.gold { border-color: gold; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .mic.occupied { border-color: #00ff88; }
        .mic-number { 
            position: absolute; top: 2px; right: 2px; background: gold; 
            color: #000; width: 18px; height: 18px; border-radius: 50%; 
            font-size: 10px; font-weight: bold; display: flex; 
            align-items: center; justify-content: center;
        }
        .mic-avatar { 
            width: 40px; height: 40px; border-radius: 50%; 
            margin: 5px auto; background: #333; border: 2px solid #666;
            object-fit: cover;
        }
        .mic-name { 
            font-size: 10px; margin-top: 3px; white-space: nowrap; 
            overflow: hidden; text-overflow: ellipsis;
        }
        .mic-lock { position: absolute; top: 2px; left: 2px; font-size: 12px; }
        .mic-reaction { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            font-size: 24px; animation: floatUp 2s forwards;
        }
        @keyframes floatUp { 0%{opacity:1;top:-15px} 100%{opacity:0;top:-50px} }
        .pulse-name { animation: pulseGold 2s infinite; }
        @keyframes pulseGold { 0%,100%{text-shadow:0 0 5px gold} 50%{text-shadow:0 0 20px gold, 0 0 30px gold} }
        
        /* ازرار المالك الخاصة */
        .owner-panel { 
            display: none; position: fixed; bottom: 70px; right: 10px; 
            background: #1a1a1a; border: 2px solid gold; border-radius: 10px; 
            padding: 10px; z-index: 1000; width: 200px;
        }
        .owner-btn { 
            display: block; width: 100%; margin: 5px 0; padding: 8px; 
            background: linear-gradient(45deg, #b8860b, #ffd700); 
            border: none; border-radius: 5px; color: #000; font-weight: bold; cursor: pointer;
        }
        .owner-btn:hover { transform: scale(1.05); }
        
        /* الشريط السفلي */
        .bottom-bar { 
            position: fixed; bottom: 0; width: 100%; background: #1a1a1a; 
            display: flex; justify-content: space-around; padding: 10px; 
            border-top: 2px solid gold;
        }
        .bottom-btn { 
            background: #333; border: none; color: #fff; padding: 8px 12px; 
            border-radius: 20px; cursor: pointer; font-size: 12px;
        }
        .bottom-btn:active { background: #555; }
        
        /* الدردشة */
        .chat-box { 
            position: fixed; bottom: 60px; left: 0; width: 100%; height: 250px; 
            background: rgba(26,26,26,0.98); display: none; flex-direction: column;
            border-top: 2px solid gold;
        }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-msg { margin: 5px 0; padding: 5px; background: #222; border-radius: 5px; }
        .chat-msg b { color: gold; }
        .chat-input-area { display: flex; padding: 10px; gap: 5px; }
        .chat-input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid #444; background: #333; color: #fff; }
        
        /* قائمة المستخدمين */
        .users-list {
            position: fixed; top: 50px; right: 10px; width: 250px; max-height: 400px;
            background: #1a1a1a; border: 2px solid gold; border-radius: 10px;
            display: none; overflow-y: auto; z-index: 1000; padding: 10px;
        }
        .user-item { padding: 8px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .user-item.owner { color: gold; font-weight: bold; }
        
        .error-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #ff3333; color: #fff; padding: 20px; border-radius: 10px;
            display: none; z-index: 10000; text-align: center;
        }
    </style>
</head>
<body>
    <!-- دخولية المالك -->
    <div class="owner-entry" id="ownerEntry">
        <video id="entryVideo" autoplay muted></video>
        <div class="owner-entry-text" id="entryText">👑 دخول حساب الادارة الرسمي 👑</div>
    </div>

    <!-- رسالة خطأ -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- الشريط العلوي -->
    <div class="top-bar">
        <div class="room-info">
            <span class="room-name">وكالة السبع السوري</span>
            <span class="room-id" id="roomId">ID: main</span>
        </div>
        <div style="display:flex;gap:10px;">
            <span class="users-count">👥 <span id="usersCount">0</span></span>
            <span class="heat">🔥 <span id="heatCount">0</span></span>
        </div>
    </div>

    <!-- كرسي الملك -->
    <div class="king-chair">
        <img src="" class="king-img" id="kingImg">
        <div class="king-name pulse-name" id="kingName">السبع الحلبي</div>
    </div>

    <!-- المايكات 20 -->
    <div class="mics-grid" id="micsGrid"></div>

    <!-- ازرار المالك -->
    <div class="owner-panel" id="ownerPanel">
        <button class="owner-btn" onclick="banUser()">🚫 باند حساب</button>
        <button class="owner-btn" onclick="showReports()">📊 البلاغات</button>
        <button class="owner-btn" onclick="manageIds()">🆔 نظام الايدي</button>
        <button class="owner-btn" onclick="fullControl()">⚙️ تحكم كامل</button>
    </div>

    <!-- قائمة المستخدمين -->
    <div class="users-list" id="usersList"></div>

    <!-- الدردشة -->
    <div class="chat-box" id="chatBox">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="اكتب رسالة...">
            <button class="bottom-btn" onclick="sendMessage()">ارسال</button>
        </div>
    </div>

    <!-- الشريط السفلي -->
    <div class="bottom-bar">
        <button class="bottom-btn" onclick="toggleChat()">💬 شات</button>
        <button class="bottom-btn" onclick="toggleMic()">🎤 مايك</button>
        <button class="bottom-btn" onclick="showEmojis()">😂 ايموجي</button>
        <button class="bottom-btn" id="ownerBtn" onclick="toggleOwnerPanel()">👑 المالك</button>
        <button class="bottom-btn" onclick="showUsers()">👥 متواجدين</button>
    </div>

<script>
    const socket = io();
    const token = localStorage.getItem('token');
    const roomId = new URLSearchParams(window.location.search).get('room') || 'main';
    let currentUser = null;
    let isOwner = false;
    let myMicIndex = -1;

    if (!token) {
        window.location.href = '/login.html';
    }

    document.getElementById('roomId').textContent = 'ID: ' + roomId;

    // انشاء 20 مايك
    const micsGrid = document.getElementById('micsGrid');
    for(let i=0; i<20; i++){
        micsGrid.innerHTML += `
            <div class="mic gold" onclick="clickMic(${i})" id="mic${i}">
                <div class="mic-number">${i+1}</div>
                <div class="mic-lock">🔒</div>
                <img class="mic-avatar" src="">
                <div class="mic-name">فارغ</div>
            </div>
        `;
    }

    // دخول الغرفة
    socket.emit('joinRoom', { roomId, token });

    // استقبال دخولية المالك
    socket.on('ownerEntry', (data) => {
        const entryDiv = document.getElementById('ownerEntry');
        const video = document.getElementById('entryVideo');
        const text = document.getElementById('entryText');
        
        video.src = data.video;
        text.textContent = data.text + ' - ' + data.username;
        entryDiv.style.display = 'flex';
        video.play();
        
        setTimeout(() => {
            entryDiv.style.display = 'none';
        }, data.duration * 1000);
    });

    // تحديث الغرفة
    socket.on('roomUpdate', (room) => {
        const myUser = room.users.find(u => u.socketId === socket.id);
        if(myUser) {
            currentUser = myUser;
            isOwner = myUser.isOwner;
            document.getElementById('ownerBtn').style.display = isOwner ? 'block' : 'none';
            if(isOwner) {
                document.getElementById('kingImg').src = myUser.profilePic || '';
                document.getElementById('kingName').textContent = myUser.username;
            }
        }
        
        document.getElementById('usersCount').textContent = room.users.length;
        
        // تحديث المايكات
        room.mics.forEach((mic, i) => {
            const micDiv = document.getElementById(`mic${i}`);
            const micAvatar = micDiv.querySelector('.mic-avatar');
            const micName = micDiv.querySelector('.mic-name');
            
            if(mic) {
                const user = room.users.find(u => u.socketId === mic);
                if(user) {
                    micDiv.classList.add('occupied');
                    micAvatar.src = user.profilePic || '';
                    micName.textContent = user.username;
                    if(user.isOwner) micName.classList.add('pulse-name');
                    else micName.classList.remove('pulse-name');
                    
                    if(mic === socket.id) myMicIndex = i;
                }
            } else {
                micDiv.classList.remove('occupied');
                micAvatar.src = '';
                micName.textContent = 'فارغ';
                micName.classList.remove('pulse-name');
            }
        });
        
        updateUsersList(room.users);
    });

    // تحديث قائمة المستخدمين
    function updateUsersList(users) {
        const list = document.getElementById('usersList');
        list.innerHTML = users.map(u => `
            <div class="user-item ${u.isOwner ? 'owner' : ''}">
                <span>${u.isOwner ? '👑 ' : ''}${u.username}</span>
                <span>LV${u.level}</span>
            </div>
        `).join('');
    }

    // ايموجي على المايك
    socket.on('reaction', ({ micIndex, emoji }) => {
        const micDiv = document.getElementById(`mic${micIndex}`);
        const reaction = document.createElement('div');
        reaction.className = 'mic-reaction';
        reaction.textContent = emoji;
        micDiv.appendChild(reaction);
        setTimeout(() => reaction.remove(), 2000);
    });

    // رسائل جديدة
    socket.on('newMessage', (data) => {
        const div = document.createElement('div');
        div.className = 'chat-msg';
        div.innerHTML = `<b>${data.username}:</b> ${data.message}`;
        document.getElementById('chatMessages').appendChild(div);
        document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    });

    // اخطاء
    socket.on('error', (data) => {
        showError(data.message);
    });

    socket.on('kicked', () => {
        showError('تم طردك من الغرفة');
        setTimeout(() => window.location.href = '/', 2000);
    });

    socket.on('removedFromMic', () => {
        showError('تم انزالك من المايك');
    });

    function showError(msg) {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 3000);
    }

    function clickMic(index) {
        socket.emit('takeMic', { roomId, micIndex: index });
    }

    function toggleOwnerPanel() {
        if(!isOwner) return showError('هاي بس للمالك');
        const panel = document.getElementById('ownerPanel');
        panel.style.display = panel.style.display === 'block'?'none' : 'block';
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        if(input.value.trim()) {
            socket.emit('sendMessage', { roomId, message: input.value });
            input.value = '';
        }
    }

    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendMessage();
    });

    function toggleChat() {
        const chat = document.getElementById('chatBox');
        chat.style.display = chat.style.display === 'flex'?'none' : 'flex';
    }

    function showEmojis() {
        if(myMicIndex === -1) return showError('لازم تكون على المايك');
        const emojis = ['😂','😍','❤️','🎉','😢','💨','🫂','💕','🔥','👏'];
        const emoji = emojis[Math.floor(Math.random()*emojis.length)];
        socket.emit('sendReaction', { roomId, micIndex: myMicIndex, emoji });
    }

    function showUsers() {
        const list = document.getElementById('usersList');
        list.style.display = list.style.display === 'block'?'none' : 'block';
    }

    function toggleMic() {
        showError('الميزة قيد التطوير');
    }

    function banUser() {
        const userId = prompt('حط ID المستخدم للباند:');
        const reason = prompt('سبب الباند:');
        if(userId && reason) {
            fetch('/api/admin/ban', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ targetUserId: userId, reason })
            }).then(res => res.json()).then(data => showError(data.message));
        }
    }

    function showReports() {
        fetch('/api/admin/reports', {
            headers: { 'Authorization': 'Bearer ' + token }
        }).then(res => res.json()).then(reports => {
            alert('عدد البلاغات: ' + reports.length);
        });
    }

    function manageIds() {
        showError('الميزة قيد التطوير');
    }

    function fullControl() {
        showError('الميزة قيد التطوير');
    }
</script>
</body>
</html>
