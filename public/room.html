<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غرفة السبع الحلبي</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a14; color: #fff; padding-bottom: 80px; }
    #entryOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; justify-content: center; align-items: center; }
    #entryVideo { width: 100%; height: 100%; object-fit: cover; }
    #entryText { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #FFD700; font-size: 28px; font-weight: bold; text-shadow: 0 0 20px #FFD700; animation: pulse 1s infinite; text-align: center; }
    @keyframes pulse { 0%,100% { scale: 1; } 50% { scale: 1.1; } }
   .lion-header { width: 100%; height: 120px; background: #000; display: flex; justify-content: center; align-items: center; border-bottom: 2px solid #FFD700; }
   .lion-img { width: 100px; height: 100px; animation: lionPulse 2s ease-in-out infinite; filter: drop-shadow(0 0 15px #FFD700); }
    @keyframes lionPulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px #FFD700); } 50% { transform: scale(1.1); filter: drop-shadow(0 0 30px #FFA500); } }
   .header { background: #141428; padding: 10px 15px; border-bottom: 1px solid #ff00ff; text-align: center; }
   .header h1 { font-size: 18px; }
   .container { padding: 15px; max-width: 600px; margin: 0 auto; }
   .mics-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin: 15px 0; }
   .mic-slot { background: #141428; padding: 6px 3px; border-radius: 8px; text-align: center; cursor: pointer; border: 2px solid #1a1a2e; min-height: 65px; font-size: 10px; position: relative; transition: all 0.2s; }
   .mic-slot:hover { transform: scale(1.05); }
   .mic-slot.taken { background: #2d1b69; border-color: #a855f7; }
   .mic-slot.closed { background: #3a1a1a; border-color: #ff0000; cursor: not-allowed; }
