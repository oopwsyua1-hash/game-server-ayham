<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الغرفة الصوتية</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; margin: 0; padding: 20px; text-align: center; }
    button { padding: 12px 24px; margin: 10px; border: none; border-radius: 8px; background: #7c3aed; color: #fff; cursor: pointer; font-size: 16px; }
    .users { margin-top: 20px; }
  </style>
</head>
<body>
  <h2 id="room-name">غرفة صوتية</h2>
  <button onclick="goBack()">رجوع</button>
  <button onclick="toggleMic()" id="mic-btn">تشغيل المايك</button>
  
  <div class="users">
    <h3>المتواجدين:</h3>
    <div id="users-list"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const roomId = new URLSearchParams(window.location.search).get('id');
    let myId = null;
    let micOn = false;
    
    document.getElementById('room-name').innerText = `غرفة: ${roomId}`;
    
    fetch('/me').then(r => r.json()).then(data => {
      myId = data.userId;
      socket.emit('join-room', roomId, data.username);
    });
    
    socket.on('user-connected', username => {
      addUser(username);
    });
    
    socket.on('user-disconnected', username => {
      removeUser(username);
    });
    
    function addUser(username) {
      const div = document.createElement('div');
      div.id = `user-${username}`;
      div.innerText = username;
      document.getElementById('users-list').appendChild(div);
    }
    
    function removeUser(username) {
      const el = document.getElementById(`user-${username}`);
      if (el) el.remove();
    }
    
    function goBack() {
      window.location.href = '/';
    }
    
    function toggleMic() {
      micOn =!micOn;
      document.getElementById('mic-btn').innerText = micOn? 'ايقاف المايك' : 'تشغيل المايك';
      // هون بعدين منضيف كود WebRTC للصوت الحقيقي
    }
  </script>
</body>
</html>
