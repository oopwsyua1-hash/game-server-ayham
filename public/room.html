<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وكالة السبع السوري</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #0a0a0a; color: #fff; overflow: hidden; }
       .owner-entry { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; }
       .owner-entry video { width: 80%; max-width: 600px; border: 3px solid gold; border-radius: 10px; }
       .owner-entry-text { font-size: 28px; color: gold; margin-top: 20px; animation: pulse 1s infinite; text-shadow: 0 0 20px gold; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
       .top-bar { background: linear-gradient(90deg, #1a1a1a, #2a2a2a); padding: 10px; display: flex; justify-content: space-between; border-bottom: 2px solid gold; align-items: center; }
       .room-name { font-size: 18px; color: gold; font-weight: bold; }
       .room-id { background: #333; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
       .users-count { background: #333; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
       .king-chair { text-align: center; padding: 15px; background: linear-gradient(180deg, #1a1a1a, #0a0a0a); height: 160px; }
       .king-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid gold; box-shadow: 0 0 20px gold; object-fit: cover; }
       .king-name { color: gold; font-size: 20px; margin-top: 10px; text-shadow: 0 0 10px gold; }
       .mics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; max-width: 400px; margin: 0 auto; }
       .mic { background: #1a1a1a; border: 2px solid #444; border-radius: 10px; padding: 8px; text-align: center; position: relative; height: 85px; cursor: pointer; }
       .mic.gold { border-color: gold; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
       .mic.occupied { border-color: #00ff88; }
       .mic-number { position: absolute; top: 2px; right: 2px; background: gold; color: #000; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
       .mic-avatar { width: 40px; height: 40px; border-radius: 50%; margin: 5px auto; background: #333; border: 2px solid #666; object-fit: cover; }
       .mic-name { font-size: 10px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
       .mic-lock { position: absolute; top: 2px; left: 2px; font-size: 12px; }
       .mic-reaction { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 24px; animation: floatUp 2s forwards; }
        @keyframes floatUp { 0%{opacity:1;top:-15px} 100%{opacity:0;top:-50px} }
       .pulse-name { animation: pulseGold 2s infinite; }
        @keyframes pulseGold { 0%,100%{text-shadow:0 0 5px gold} 50%{text-shadow:0 0 20px gold, 0 0 30px gold} }
       .owner-panel { display: none; position: fixed; bottom: 70px; right: 10px; background: #1a1a1a; border: 2px solid gold; border-radius: 10px; padding: 10px; z-index: 1000; width: 200px; }
       .owner-btn { display: block; width: 100%; margin: 5px 0; padding: 8px; background: linear-gradient(45deg, #b8860b, #ffd700); border: none; border-radius: 5px; color: #000; font-weight: bold; cursor: pointer; }
       .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 10px; border-top: 2px solid gold; }
       .bottom-btn { background: #333; border: none; color: #fff; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
       .chat-box { position: fixed; bottom: 60px; left: 0; width: 100%; height: 250px; background: rgba(26,26,26,0.98); display: none; flex-direction: column; border-top: 2px solid gold; }
       .chat-messages { flex: 1; overflow-y: auto; padding: 10px; }
       .chat-msg { margin: 5px 0; padding: 5px; background: #222; border-radius: 5px; }
       .chat-msg b { color: gold; }
       .chat-input-area { display: flex; padding: 10px; gap: 5px; }
       .chat-input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid #444; background: #333; color: #fff; }
       .error-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #ff3333; color: #fff; padding: 20px; border-radius: 10px; display: none; z-index: 10000; text-align: center; }
    </style>
</head>
<body>
    <div class="owner-entry" id="ownerEntry">
        <video id="entryVideo" autoplay muted></video>
        <div class="owner-entry-text" id="entryText">👑 دخول حساب الادارة الرسمي 👑</div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="top-bar">
        <div class="room-name">وكالة السبع السوري</div>
        <div class="room-id" id="roomId">ID: main</div>
        <div class="users-count">👥 <span id="usersCount">0</span></div>
    </div>
    <div class="king-chair">
        <img src="" class="king-img" id="kingImg">
        <div class="king-name pulse-name" id="kingName">السبع الحلبي</div>
    </div>
    <div class="mics-grid" id="micsGrid"></div>
    <div class="owner-panel" id="ownerPanel">
        <button class="owner-btn" onclick="banUser()">🚫 باند حساب</button>
        <button class="owner-btn" onclick="showReports()">📊 البلاغات</button>
    </div>
    <div class="chat-box" id="chatBox">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="اكتب رسالة...">
            <button class="bottom-btn" onclick="sendMessage()">ارسال</button>
        </div>
    </div>
    <div class="bottom-bar">
        <button class="bottom-btn" onclick="toggleChat()">💬 شات</button>
        <button class="bottom-btn" onclick="showEmojis()">😂 ايموجي</button>
        <button class="bottom-btn" id="ownerBtn" onclick="toggleOwnerPanel()">👑 المالك</button>
        <button class="bottom-btn" onclick="window.location.href='/me'">👤 ملفي</button>
    </div>

<script>
    const socket = io();
    const token = localStorage.getItem('token');
    const roomId = new URLSearchParams(window.location.search).get('room') || 'main';
    let currentUser = null;
    let isOwner = false;
    let myMicIndex = -1;

    if (!token) window.location.href = '/login.html';
    document.getElementById('roomId').textContent = 'ID: ' + roomId;

    const micsGrid = document.getElementById('micsGrid');
    for(let i=0; i<20; i++){
        micsGrid.innerHTML += `<div class="mic gold" onclick="clickMic(${i})" id="mic${i}"><div class="mic-number">${i+1}</div><div class="mic-lock">🔒</div><img class="mic-avatar" src=""><div class="mic-name">فارغ</div></div>`;
    }

    socket.emit('joinRoom', { roomId, token });

    socket.on('ownerEntry', (data) => {
        const entryDiv = document.getElementById('ownerEntry');
        const video = document.getElementById('entryVideo');
        const text = document.getElementById('entryText');
        video.src = data.video;
        text.textContent = data.text + ' - ' + data.username;
        entryDiv.style.display = 'flex';
        video.play();
        setTimeout(() => entryDiv.style.display = 'none', data.duration * 1000);
    });

    socket.on('roomUpdate', (room) => {
        const myUser = room.users.find(u => u.socketId === socket.id);
        if(myUser) {
            currentUser = myUser;
            isOwner = myUser.isOwner;
            document.getElementById('ownerBtn').style.display = isOwner? 'block' : 'none';
            if(isOwner) {
                document.getElementById('kingImg').src = myUser.profilePic || '';
                document.getElementById('kingName').textContent = myUser.username;
            }
        }
        document.getElementById('usersCount').textContent = room.users.length;
        room.mics.forEach((mic, i) => {
            const micDiv = document.getElementById(`mic${i}`);
            const micAvatar = micDiv.querySelector('.mic-avatar');
            const micName = micDiv.querySelector('.mic-name');
            if(mic) {
                const user = room.users.find(u => u.socketId === mic);
                if(user) {
                    micDiv.classList.add('occupied');
                    micAvatar.src = user.profilePic || '';
                    micName.textContent = user.username;
                    if(user.isOwner) micName.classList.add('pulse-name');
                    else micName.classList.remove('pulse-name');
                    if(mic === socket.id) myMicIndex = i;
                }
            } else {
                micDiv.classList.remove('occupied');
                micAvatar.src = '';
                micName.textContent = 'فارغ';
                micName.classList.remove('pulse-name');
            }
        });
    });

    socket.on('reaction', ({ micIndex, emoji }) => {
        const micDiv = document.getElementById(`mic${micIndex}`);
        const reaction = document.createElement('div');
        reaction.className = 'mic-reaction';
        reaction.textContent = emoji;
        micDiv.appendChild(reaction);
        setTimeout(() => reaction.remove(), 2000);
    });

    socket.on('newMessage', (data) => {
        const div = document.createElement('div');
        div.className = 'chat-msg';
        div.innerHTML = `<b>${data.username}:</b> ${data.message}`;
        document.getElementById('chatMessages').appendChild(div);
        document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    });

    socket.on('error', (data) => showError(data.message));
    socket.on('kicked', () => { showError('تم طردك من الغرفة'); setTimeout(() => window.location.href = '/', 2000); });

    function showError(msg) {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 3000);
    }

    function clickMic(index) { socket.emit('takeMic', { roomId, micIndex: index }); }
    function toggleOwnerPanel() { if(!isOwner) return showError('هاي بس للمالك'); const panel = document.getElementById('ownerPanel'); panel.style.display = panel.style.display === 'block'?'none' : 'block'; }
    function sendMessage() { const input = document.getElementById('chatInput'); if(input.value.trim()) { socket.emit('sendMessage', { roomId, message: input.value }); input.value = ''; } }
    document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    function toggleChat() { const chat = document.getElementById('chatBox'); chat.style.display = chat.style.display === 'flex'?'none' : 'flex'; }
    function showEmojis() { if(myMicIndex === -1) return showError('لازم تكون على المايك'); const emojis = ['😂','😍','❤️','🎉','😢','🔥','👏']; const emoji = emojis[Math.floor(Math.random()*emojis.length)]; socket.emit('sendReaction', { roomId, micIndex: myMicIndex, emoji }); }
    function banUser() { const userId = prompt('حط ID المستخدم للباند:'); const reason = prompt('سبب الباند:'); if(userId && reason) { fetch('/api/admin/ban', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ targetUserId: userId, reason }) }).then(res => res.json()).then(data => showError(data.message)); } }
    function showReports() {
