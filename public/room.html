<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الغرفة الصوتية</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; }
      .stage { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; }
      .seat { background: #1a1a1a; border-radius: 50%; width: 80px; height: 80px;
               display: flex; align-items: center; justify-content: center; border: 3px solid #333; }
      .seat.active { border-color: #ff006e; box-shadow: 0 0 15px #ff006e; }
      .controls { position: fixed; bottom: 20px; width: 100%; text-align: center; }
      .btn { background: #ff006e; border: none; color: #fff; padding: 15px 25px;
              border-radius: 30px; font-size: 16px; margin: 0 10px; }
    </style>
</head>
<body>
    <h2 id="roomName" style="text-align: center; padding: 20px;">جاري الدخول...</h2>

    <div class="stage" id="stage">
        <!-- الكراسي رح تطلع هون -->
    </div>

    <div class="controls">
        <button class="btn" id="micBtn" onclick="toggleMic()">🎤 اطلع ع المايك</button>
        <button class="btn" onclick="leaveRoom()">🚪 اطلع من الغرفة</button>
    </div>

    <script>
        const socket = io();
        const roomId = new URLSearchParams(window.location.search).get('id');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        let localStream;
        let isOnMic = false;
        const peers = {};

        // 1. جيب المايك
        async function initMic() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log('المايك شغال');
            } catch (e) {
                alert('لازم تسمح للمايك عشان تفوت: ' + e.message);
            }
        }

        // 2. فوت الغرفة
        socket.emit('join-room', roomId, user);

        // 3. لما تكبس ع المايك
        async function toggleMic() {
            if (!localStream) await initMic();
            isOnMic =!isOnMic;
            document.getElementById('micBtn').innerText = isOnMic? '🔇 انزل' : '🎤 اطلع ع المايك';
            document.getElementById('micBtn').style.background = isOnMic? '#2a2a2a' : '#ff006e';
            socket.emit('toggle-mic', roomId, user.id, isOnMic);
        }

        function leaveRoom() {
            socket.emit('leave-room', roomId, user.id);
            window.location.href = '/';
        }

        // 4. WebRTC P2P - هون السحر كله
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        socket.on('user-joined', userId => {
            const pc = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.onicecandidate = e => e.candidate && socket.emit('ice-candidate', roomId, userId, e.candidate);
            pc.ontrack = e => addAudioStream(userId, e.streams[0]);
            pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => {
                socket.emit('offer', roomId, userId, pc.localDescription);
            });
            peers[userId] = pc;
        });

        socket.on('offer', async (userId, offer) => {
            const pc = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.onicecandidate = e => e.candidate && socket.emit('ice-candidate', roomId, userId, e.candidate);
            pc.ontrack = e => addAudioStream(userId, e.streams[0]);
            await pc.setRemoteDescription(offer);
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('answer', roomId, userId, answer);
            peers[userId] = pc;
        });

        socket.on('answer', (userId, answer) => peers[userId]?.setRemoteDescription(answer));
        socket.on('ice-candidate', (userId, candidate) => peers[userId]?.addIceCandidate(candidate));

        function addAudioStream(userId, stream) {
            let audio = document.getElementById(userId);
            if (!audio) {
                audio = document.createElement('audio');
                audio.id = userId;
                audio.autoplay = true;
                document.body.appendChild(audio);
            }
            audio.srcObject = stream;
        }

        initMic();
    </script>
</body>
</html>
