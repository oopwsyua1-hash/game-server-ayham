<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غرفة السبع الحلبي</title>
<script src="/socket.io/socket.io.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0a0a14; color: #fff; }
#entryOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; justify-content: center; align-items: center; }
#entryVideo { width: 100%; height: 100%; object-fit: cover; }
#entryText { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #FFD700; font-size: 28px; font-weight: bold; text-shadow: 0 0 20px #FFD700; animation: pulse 1s infinite; text-align: center; }
@keyframes pulse { 0%,100% { scale: 1; } 50% { scale: 1.1; } }
.header { background: #141428; padding: 15px; border-bottom: 2px solid #ff00ff; }
.container { padding: 20px; max-width: 600px; margin: 0 auto; }
.mics-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin: 20px 0; }
.mic-slot { background: #141428; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid #1a1a2e; min-height: 80px; font-size: 11px; }
.mic-slot.taken { background: #2d1b69; border-color: #a855f7; }
.mic-slot.closed { background: #3a1a1a; border-color: #ff0000; cursor: not-allowed; }
.mic-slot.owner { background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; font-weight: bold; box-shadow: 0 0 20px #FFD700; }
.users-list { background: #141428; padding: 15px; border-radius: 10px; margin-top: 20px; }
.user-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #1a1a2e; font-size: 14px; align-items: center; }
.admin-btn { background: #ef4444; border: none; color: #fff; padding: 4px 8px; border-radius: 5px; cursor: pointer; margin: 0 2px; font-size: 11px; }
</style>
</head>
<body>
<div id="entryOverlay">
    <video id="entryVideo" autoplay></video>
    <div id="entryText"></div>
</div>
<div class="header"><h1>🎤 غرفة السبع الحلبي - 20 مايك</h1></div>
<div class="container">
    <div class="mics-grid" id="micsGrid"></div>
    <div class="users-list"><h3>👥 المتواجدين</h3><div id="usersList"></div></div>
</div>
<script>
const socket = io();
const token = localStorage.getItem('token');
const urlParams = new URLSearchParams(window.location.search);
const ROOM_ID = urlParams.get('roomId') || '10000';
let myUserId = null;
let isOwner = false;

if (!token) location.href = '/';
socket.emit('joinRoom', { roomId: ROOM_ID, token });

socket.on('ownerEntry', (data) => {
    const overlay = document.getElementById('entryOverlay');
    const video = document.getElementById('entryVideo');
    const text = document.getElementById('entryText');
    video.src = data.video;
    text.textContent = data.text;
    overlay.style.display = 'flex';
    video.play();
    setTimeout(() => overlay.style.display = 'none', data.duration * 1000);
});

socket.on('roomUpdate', (roomData) => {
    const micsGrid = document.getElementById('micsGrid');
    const usersList = document.getElementById('usersList');
    micsGrid.innerHTML = '';
    usersList.innerHTML = '';

    for (let i = 0; i < 20; i++) {
        const micDiv = document.createElement('div');
        micDiv.className = 'mic-slot';
        const micData = roomData.mics[i];

        if (micData === 'closed') {
            micDiv.classList.add('closed');
            micDiv.innerHTML = '🔒<br>مغلق';
        } else if (micData) {
            const userOnMic = roomData.users.find(u => u.socketId === micData);
            if (userOnMic) {
                micDiv.classList.add('taken');
                micDiv.innerHTML = `🎤<br>${userOnMic.username}<br>${userOnMic.level}`;
                if (userOnMic.level === "10000 TOP") {
                    micDiv.classList.add('owner');
                    if (userOnMic.userId === myUserId) isOwner = true;
                }
                if (userOnMic.socketId === socket.id) {
                    micDiv.onclick = () => socket.emit('leaveMic', { roomId: ROOM_ID });
                }
            }
        } else {
            micDiv.innerHTML = '🎤<br>فارغ';
            micDiv.onclick = () => socket.emit('takeMic', { roomId: ROOM_ID, micIndex: i });
        }
        micsGrid.appendChild(micDiv);
    }

    roomData.users.forEach(user => {
        if (!myUserId) myUserId = user.userId;
        const row = document.createElement('div');
        row.className = 'user-row';
        row.innerHTML = `<span>${user.username} - ${user.level} ${user.level === "10000 TOP"? '👑' : ''}</span>
            <div>${isOwner && user.level!== "10000 TOP"? `
                <button class="admin-btn" onclick="adminAction('KICK', '${user.userId}')">طرد</button>
                <button class="admin-btn" onclick="adminAction('CLOSE_MIC', '${user.userId}')">غلق</button>` : ''}
            </div>`;
        usersList.appendChild(row);
    });
});

function adminAction(action, userId) {
    socket.emit('adminAction', { action, targetUserId: userId, roomId: ROOM_ID });
}
</script>
</body>
</html>
